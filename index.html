<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>Музыка к венчанию</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  :root {
    --bg: #08080a;
    --bg-card: rgba(20, 20, 24, 0.6);
    --bg-card-solid: #18181c;
    --bg-elev: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --text: #f0f0f3;
    --text-dim: #9c9ca3;
    --text-muted: #6c6c72;
    --accent: #d4a45c;
    --accent-bright: #ecc380;
    --accent-soft: rgba(212, 164, 92, 0.18);
    --warn: #fbbf24;
    --good: #84cc16;
    --bad: #ef4444;
    --shadow-card: 0 8px 32px -4px rgba(0, 0, 0, 0.5), 0 2px 8px -2px rgba(0, 0, 0, 0.4);
  }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden; min-height: 100vh;
  }
  [hidden] { display: none !important; }

  /* ===== Language toggle (always-on, top-right) ===== */
  .lang-toggle {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    right: calc(10px + env(safe-area-inset-right));
    z-index: 250;
    display: flex;
    background: rgba(20, 20, 24, 0.7);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .lang-toggle button {
    appearance: none;
    background: transparent;
    color: var(--text-muted);
    border: 0;
    border-radius: 999px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-toggle button.active {
    background: var(--accent);
    color: #0a0a0d;
  }

  /* ===== Onboarding ===== */
  #onboarding {
    min-height: 100vh; min-height: 100dvh;
    padding: 32px 22px calc(32px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
  }
  #onboarding::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 30%, rgba(212,164,92,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(212,164,92,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: -1;
  }
  .ob-inner { width: 100%; max-width: 440px; }
  .ob-hero { text-align: center; margin-bottom: 36px; }
  .ob-hero .ob-emoji { font-size: 38px; line-height: 1; margin-bottom: 14px; }
  .ob-hero h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.05; }
  .ob-hero h1 .accent {
    background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .ob-hero .ob-sub { margin: 12px 0 0; color: var(--text-dim); font-size: 14px; }
  .ob-block { margin-bottom: 22px; }
  .ob-label {
    display: block; font-size: 12px; color: var(--text-muted);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
  }
  .ob-pick { display: flex; gap: 10px; }
  .ob-pick button {
    flex: 1; appearance: none;
    background: var(--bg-card);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    color: var(--text); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 8px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 60px;
    transition: all 0.2s ease;
  }
  .ob-pick button.active {
    background: linear-gradient(135deg, var(--accent-bright), var(--accent));
    color: #0a0a0d; border-color: var(--accent);
    box-shadow: 0 8px 24px -8px var(--accent);
  }
  .ob-login {
    margin-top: 18px; padding: 14px 16px;
    background: rgba(251, 191, 36, 0.06); border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 12px; font-size: 13px; line-height: 1.5;
  }
  .ob-login strong { color: var(--warn); font-weight: 700; }
  .ob-login a { color: var(--warn); text-decoration: underline; font-weight: 600; }
  .ob-start {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 100%);
    color: #0a0a0d; border: 0; border-radius: 16px;
    padding: 20px 22px;
    font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 28px;
    box-shadow: 0 12px 32px -8px var(--accent);
    transition: transform 0.15s, opacity 0.15s;
  }
  .ob-start:active { transform: scale(0.98); }
  .ob-start:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; background: var(--bg-card-solid); color: var(--text-muted); }

  .screen { min-height: 100vh; min-height: 100dvh; padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
  .screen-header { padding: 22px 18px 16px; text-align: center; position: relative; }
  .screen-header h1 {
    margin: 0; font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim);
  }
  .screen-header .greeting { margin: 8px 0 0; color: var(--text); font-size: 16px; font-weight: 500; }
  .screen-header .greeting .name {
    color: var(--accent-bright); cursor: pointer;
    border-bottom: 1px dotted var(--accent-soft);
  }

  .back-bar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(8,8,10,0.75);
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    min-height: 56px;
  }
  .back-btn {
    appearance: none; background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .back-btn:active { transform: scale(0.93); }
  .back-bar-title { flex: 1; min-width: 0; padding-right: 80px; /* space for lang-toggle overlap */ }
  .back-bar-title .bb-name {
    font-size: 14px; font-weight: 700; letter-spacing: 0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .back-bar-title .bb-context {
    font-size: 11px; color: var(--text-dim); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .cat-tiles {
    padding: 8px 16px;
    display: flex; flex-direction: column; gap: 12px;
    max-width: 640px; margin: 0 auto;
  }
  .cat-tile {
    appearance: none; text-align: left;
    background: var(--bg-card);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    color: var(--text);
    border: 1px solid var(--border); border-radius: 18px;
    padding: 18px 20px;
    font-family: inherit; cursor: pointer;
    transition: all 0.2s;
    display: block; width: 100%;
  }
  .cat-tile:active { transform: scale(0.98); }
  .cat-tile:hover { border-color: var(--border-strong); }
  .cat-tile.has-progress { border-color: rgba(212, 164, 92, 0.25); }
  .cat-tile .ct-name {
    font-size: 13px; font-weight: 700; color: var(--accent-bright);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .cat-tile .ct-stage {
    margin-top: 6px; font-size: 18px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .cat-tile .ct-context {
    margin-top: 8px; font-size: 13px;
    color: var(--text-muted); line-height: 1.45;
  }
  .cat-tile .ct-meta {
    margin-top: 14px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--text-muted);
  }
  .cat-tile .ct-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; background: var(--bg-elev);
    border-radius: 999px; font-weight: 600;
  }
  .cat-tile.has-progress .ct-pill.with-comments {
    background: rgba(212, 164, 92, 0.15);
    color: var(--accent-bright);
  }

  .home-footer { padding: 28px 16px 0; max-width: 640px; margin: 0 auto; }
  .primary-button {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--accent-bright), var(--accent));
    color: #0a0a0d; border: 0; border-radius: 16px;
    padding: 17px 22px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 12px 32px -8px var(--accent);
    transition: transform 0.15s, opacity 0.15s;
  }
  .primary-button:active { transform: scale(0.98); }
  .primary-button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
  .send-hint { margin-top: 10px; font-size: 12px; color: var(--text-muted); text-align: center; }

  .cat-add { padding: 14px 16px 0; max-width: 640px; margin: 0 auto; }
  .cat-add button {
    width: 100%; appearance: none;
    background: var(--bg-card);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    color: var(--text);
    border: 1px dashed var(--border-strong); border-radius: 14px;
    padding: 14px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 48px;
    transition: all 0.2s;
  }
  .cat-add button:hover { border-color: var(--accent); color: var(--accent-bright); }
  .cat-add button:active { transform: scale(0.98); }

  .track-list {
    padding: 14px 16px 0;
    display: flex; flex-direction: column; gap: 10px;
    max-width: 640px; margin: 0 auto;
  }
  .track-card {
    background: var(--bg-card);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.3s;
  }
  .track-card.expanded {
    border-color: var(--accent);
    box-shadow: 0 12px 36px -12px rgba(212, 164, 92, 0.4);
  }
  .track-card.has-comment { border-color: rgba(212, 164, 92, 0.3); }
  .track-card-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .tc-artwork {
    width: 52px; height: 52px;
    flex-shrink: 0;
    background: var(--bg-elev) center/cover no-repeat;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .tc-text { flex: 1; min-width: 0; }
  .tc-title {
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.005em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tc-artist {
    margin-top: 2px;
    font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tc-meta {
    margin-top: 5px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-muted);
  }
  .tc-meta .badge {
    display: inline-flex; align-items: center;
    padding: 2px 7px;
    background: var(--bg-elev);
    border-radius: 999px; font-weight: 600;
  }
  .tc-meta .badge.added-arthur { color: #93c5fd; background: rgba(147, 197, 253, 0.1); }
  .tc-meta .badge.added-yula { color: #f9a8d4; background: rgba(249, 168, 212, 0.1); }
  .tc-meta .badge.has-comment { color: var(--accent-bright); background: var(--accent-soft); }
  .tc-actions { display: flex; align-items: center; gap: 6px; }
  .tc-actions button {
    appearance: none; background: transparent; color: var(--text-dim);
    border: 0; cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 16px;
    transition: all 0.15s;
  }
  .tc-actions button:hover { background: var(--bg-elev); color: var(--text); }
  .tc-actions .tc-remove:hover { color: var(--bad); background: rgba(239, 68, 68, 0.1); }

  .track-card-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .track-card.expanded .track-card-body { max-height: 800px; }
  .track-card-body-inner { padding: 0 16px 16px; }

  .player-embed {
    position: relative;
    width: 100%; height: 175px;
    border-radius: 14px; overflow: hidden;
    background: var(--bg-card-solid);
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .player-embed iframe { width: 100%; height: 100%; border: 0; background: transparent; }
  .player-embed.loading::before {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 13px;
  }
  .player-embed.loading[data-i18n-loading]::before {
    content: attr(data-i18n-loading);
  }
  .player-embed.error {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: var(--text-dim); font-size: 13px;
    text-align: center; padding: 16px;
  }
  .player-embed.error::before { content: "⚠️"; font-size: 22px; margin-bottom: 6px; }

  .comment-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    margin-bottom: 8px;
  }
  textarea.comment {
    width: 100%; min-height: 90px;
    padding: 14px 16px;
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    font-family: inherit; font-size: 16px; line-height: 1.45;
    resize: none; overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  textarea.comment::placeholder { color: var(--text-muted); }
  textarea.comment:focus {
    outline: none; border-color: var(--accent);
    background: rgba(212,164,92,0.05);
  }
  .saved-flag {
    display: block; text-align: right;
    font-size: 11px; color: var(--accent-bright);
    margin-top: 6px; opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-flag.show { opacity: 1; }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 200; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .modal-backdrop.show { opacity: 1; pointer-events: auto; }
  .search-modal {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 88vh; max-height: 88dvh;
    background: rgba(20, 20, 24, 0.97);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border-radius: 22px 22px 0 0;
    border: 1px solid var(--border); border-bottom: 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.2, 0.8, 0.3, 1);
    box-shadow: 0 -16px 48px -8px rgba(0,0,0,0.6);
    display: flex; flex-direction: column;
  }
  .search-modal.show { transform: translateY(0); }
  .sm-grab {
    flex-shrink: 0; width: 36px; height: 4px;
    background: var(--border-strong);
    border-radius: 999px;
    margin: 10px auto 4px;
  }
  .sm-header { flex-shrink: 0; padding: 8px 18px 0; }
  .sm-title {
    text-align: center; font-size: 14px; font-weight: 600;
    color: var(--text-dim); margin-bottom: 14px;
  }
  .sm-title .target { color: var(--accent-bright); }
  .sm-search {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 0 14px;
  }
  .sm-search:focus-within { border-color: var(--accent); }
  .sm-search-icon { font-size: 16px; color: var(--text-dim); }
  .sm-search input {
    flex: 1; appearance: none;
    background: transparent; color: var(--text); border: 0;
    padding: 14px 0;
    font-family: inherit; font-size: 16px;
  }
  .sm-search input::placeholder { color: var(--text-muted); }
  .sm-search input:focus { outline: none; }
  .sm-results {
    flex: 1; min-height: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px 18px calc(20px + env(safe-area-inset-bottom));
  }
  .sm-status { text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px 0; }
  .sm-result {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 12px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .sm-result:hover { background: var(--bg-elev); }
  .sm-result:active { transform: scale(0.98); }
  .sm-art {
    width: 48px; height: 48px;
    flex-shrink: 0;
    border-radius: 6px;
    background: var(--bg-elev) center/cover no-repeat;
  }
  .sm-text { flex: 1; min-width: 0; }
  .sm-rtitle {
    font-weight: 600; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sm-rartist {
    margin-top: 2px;
    font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sm-add {
    appearance: none;
    background: var(--accent); color: #0a0a0d;
    border: 0; border-radius: 999px;
    width: 36px; height: 36px;
    font-size: 18px; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
    transition: transform 0.1s, background 0.15s;
  }
  .sm-add:active { transform: scale(0.92); }
  .sm-add:disabled { background: var(--bg-elev); color: var(--text-muted); }

  .toast {
    position: fixed; bottom: calc(28px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(28, 28, 32, 0.95);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border); color: var(--text);
    padding: 12px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    z-index: 300; opacity: 0;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
    pointer-events: none;
    max-width: calc(100% - 32px); text-align: center;
    box-shadow: 0 12px 36px -8px rgba(0,0,0,0.6);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LANGUAGE TOGGLE -->
<div class="lang-toggle" id="lang-toggle">
  <button type="button" data-lang="ru">RU</button>
  <button type="button" data-lang="en">EN</button>
</div>

<!-- ONBOARDING -->
<div id="onboarding" hidden>
  <div class="ob-inner">
    <div class="ob-hero">
      <div class="ob-emoji">🎵</div>
      <h1><span data-i18n="ob.titlePrefix"></span><span class="accent" data-i18n="ob.titleAccent"></span></h1>
      <div class="ob-sub" data-i18n="ob.subtitle"></div>
    </div>

    <div class="ob-block">
      <span class="ob-label" data-i18n="ob.who"></span>
      <div class="ob-pick" id="ob-user-pick" role="radiogroup">
        <button type="button" data-user="Юля" role="radio">💗 Юля</button>
        <button type="button" data-user="Артур" role="radio">💙 Артур</button>
      </div>
    </div>

    <div class="ob-block">
      <span class="ob-label" data-i18n="ob.service"></span>
      <div class="ob-pick" id="ob-service-pick" role="radiogroup">
        <button type="button" data-service="apple" role="radio">🍎 Apple Music</button>
        <button type="button" data-service="spotify" role="radio">🟢 Spotify</button>
      </div>
    </div>

    <div id="ob-login" class="ob-login" hidden></div>

    <button type="button" id="ob-start" class="ob-start" disabled data-i18n="ob.start"></button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen" hidden>
  <header class="screen-header">
    <h1 data-i18n="home.title"></h1>
    <div class="greeting"><span data-i18n="home.hi"></span><span id="home-user-name" class="name" role="button"></span></div>
  </header>
  <div id="cat-tiles" class="cat-tiles"></div>
  <div class="home-footer">
    <button id="send-report" class="primary-button" data-i18n="home.sendBtn"></button>
    <div id="send-status" class="send-hint"></div>
  </div>
</div>

<!-- CATEGORY -->
<div id="category" class="screen" hidden>
  <div class="back-bar">
    <button type="button" class="back-btn" id="cat-back" data-i18n-aria="cat.back">←</button>
    <div class="back-bar-title">
      <div class="bb-name" id="cat-name"></div>
      <div class="bb-context" id="cat-context"></div>
    </div>

      pluralTrack:   (n) => n === 1 ? 'track' : 'tracks',
      pluralComment: (n) => n === 1 ? 'comment' : 'comments',
      locale: 'en-US'
    }
  };

  function ruPlural(n, one, few, many) {
    const m10 = Math.abs(n) % 10;
    const m100 = Math.abs(n) % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
    return many;
  }

  let lang = (() => {
    try { return localStorage.getItem(K_LANG) || 'ru'; } catch (e) { return 'ru'; }
  })();
  if (!T[lang]) lang = 'ru';

  function t(key, params = {}) {
    const val = T[lang]?.[key] ?? T.ru[key] ?? key;
    if (typeof val === 'function') return val(params);
    if (typeof val !== 'string') return val;
    return val.replace(/\{(\w+)\}/g, (_, k) => params[k] ?? `{${k}}`);
  }
  function plural(n, kind) {
    const fn = T[lang]['plural' + kind] || T.ru['plural' + kind];
    return fn(n);
  }
  function fmtDate(ms) {
    if (!ms) return '';
    return new Date(ms).toLocaleDateString(T[lang].locale, { day: 'numeric', month: 'short' });
  }

  /* ===== state ===== */
  const CATEGORIES_ORDER = ['Лаунж', 'LOVERS', 'Торт', 'DJ Микки', 'Юля', 'Вилла'];
  let userName = lsGet(K_NAME, '');
  let service = lsGet(K_SERVICE, '');
  let audit = (() => { try { return JSON.parse(lsGet(K_AUDIT, '{}')) || {}; } catch (e) { return {}; } })();
  let allTracks = [];
  let currentCategory = null;
  let expandedTrackId = null;

  function lsGet(k, dflt) { try { const v = localStorage.getItem(k); return v == null ? dflt : v; } catch (e) { return dflt; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ===== translation application ===== */
  function applyStaticTranslations() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPlaceholder);
    });
    document.querySelectorAll('[data-i18n-aria]').forEach(el => {
      el.setAttribute('aria-label', t(el.dataset.i18nAria));
    });
    document.querySelectorAll('[data-i18n-loading-key]').forEach(el => {
      el.setAttribute('data-i18n-loading', t(el.dataset.i18nLoadingKey));
    });
    document.querySelectorAll('.player-embed.loading').forEach(el => {
      el.setAttribute('data-i18n-loading', t('embed.loading'));
    });
    // login banner
    if (pickedService) updateLoginHint();
  }
  function setLang(newLang) {
    if (!T[newLang] || newLang === lang) return;
    lang = newLang;
    lsSet(K_LANG, lang);
    applyStaticTranslations();
    updateLangToggleUI();
    // re-render dynamic views
    if (!document.getElementById('home').hidden) renderHome();
    if (!document.getElementById('category').hidden && currentCategory) {
      const cat = currentCategory;
      document.getElementById('cat-name').textContent = t(`cat.${cat}.stage`);
      document.getElementById('cat-context').textContent = t(`cat.${cat}.context`);
      renderCategoryTracks();
    }
    if (document.getElementById('search-modal').classList.contains('show')) {
      document.getElementById('sm-target').textContent = t(`cat.${currentCategory}.short`);
      // reset search status to initial
      const r = document.getElementById('sm-results');
      if (r.querySelector('.sm-status') && !r.querySelector('.sm-result')) {
        r.innerHTML = `<div class="sm-status">${escapeHtml(t('search.initial'))}</div>`;
      }
    }
  }
  function updateLangToggleUI() {
    document.querySelectorAll('#lang-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
  }
  document.querySelectorAll('#lang-toggle button').forEach(b => {
    b.addEventListener('click', () => setLang(b.dataset.lang));
  });

  /* ===== onboarding ===== */
  const onboardingEl = document.getElementById('onboarding');
  const homeEl = document.getElementById('home');
  const categoryEl = document.getElementById('category');
  const obStart = document.getElementById('ob-start');
  const obLogin = document.getElementById('ob-login');
  let pickedUser = '';
  let pickedService = '';

  function updateObStart() { obStart.disabled = !(pickedUser && pickedService); }
  function updateLoginHint() {
    if (!pickedService) { obLogin.hidden = true; return; }
    obLogin.hidden = false;
    const href = pickedService === 'apple' ? 'https://music.apple.com' : 'https://open.spotify.com';
    const name = pickedService === 'apple' ? 'Apple Music' : 'Spotify';
    obLogin.innerHTML = t('ob.loginHTML', { href: escapeHtml(href), name: escapeHtml(name) });
  }
  document.querySelectorAll('#ob-user-pick button').forEach(b => {
    b.addEventListener('click', () => {
      pickedUser = b.dataset.user;
      document.querySelectorAll('#ob-user-pick button').forEach(x => x.classList.toggle('active', x === b));
      updateObStart();
    });
  });
  document.querySelectorAll('#ob-service-pick button').forEach(b => {
    b.addEventListener('click', () => {
      pickedService = b.dataset.service;
      document.querySelectorAll('#ob-service-pick button').forEach(x => x.classList.toggle('active', x === b));
      updateLoginHint();
      updateObStart();
    });
  });
  obStart.addEventListener('click', () => {
    if (obStart.disabled) return;
    userName = pickedUser;
    service = pickedService;
    lsSet(K_NAME, userName);
    lsSet(K_SERVICE, service);
    bootApp();
  });

  function showOnboarding() {
    homeEl.hidden = true; categoryEl.hidden = true;
    onboardingEl.hidden = false;
    if (userName) {
      pickedUser = userName;
      document.querySelectorAll('#ob-user-pick button').forEach(b => b.classList.toggle('active', b.dataset.user === userName));
    }
    if (service) {
      pickedService = service;
      document.querySelectorAll('#ob-service-pick button').forEach(b => b.classList.toggle('active', b.dataset.service === service));
      updateLoginHint();
    }
    updateObStart();
  }

  /* ===== API ===== */
  async function apiGetTracks() {
    try {
      const r = await fetch(`${API_BASE}/api/tracks`);
      if (!r.ok) return [];
      const d = await r.json();
      return d.tracks || [];
    } catch (e) { return []; }
  }
  async function apiAddTrack({ artist, title, category, spotify_id, artwork_url }) {
    try {
      const r = await fetch(`${API_BASE}/api/tracks/add`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ artist, title, category, spotify_id, artwork_url, by: userName })
      });
      return await r.json();
    } catch (e) { return { ok: false }; }
  }
  async function apiRemoveTrack(id) {
    try {
      const r = await fetch(`${API_BASE}/api/tracks/remove`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, by: userName })
      });
      return await r.json();
    } catch (e) { return { ok: false }; }
  }
  let saveDebounceTimer;
  function apiSaveDebounced() {
    clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(apiSaveNow, 500);
  }
  async function apiSaveNow() {
    if (!userName || !service) return;
    try {
      await fetch(`${API_BASE}/api/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: userName, service, tracks: audit })
      });
    } catch (e) {}
  }
  async function apiSubmit() {
    if (!userName || !service) return { ok: false };
    try {
      const r = await fetch(`${API_BASE}/api/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: userName, service, tracks: audit })
      });
      if (!r.ok) return { ok: false, status: r.status };
      return await r.json();
    } catch (e) { return { ok: false }; }
  }

  async function itunesSearch(query, opts = {}) {
    const term = encodeURIComponent(query);
    const country = opts.country || 'us';
    const limit = opts.limit || 12;
    try {
      const r = await fetch(`https://itunes.apple.com/search?term=${term}&entity=song&limit=${limit}&media=music&country=${country}`);
      if (!r.ok) return [];
      const d = await r.json();
      return (d.results || []).map(hit => ({
        artist: hit.artistName, title: hit.trackName,
        artworkUrl100: hit.artworkUrl100,
        artwork: hit.artworkUrl100 ? hit.artworkUrl100.replace('100x100bb', '600x600bb') : null,
        trackId: hit.trackId, trackViewUrl: hit.trackViewUrl,
        embedUrl: hit.trackViewUrl ? hit.trackViewUrl.replace(/^https?:\/\/music\.apple\.com\//, 'https://embed.music.apple.com/') : null
      })).filter(t => t.artist && t.title);
    } catch (e) { return []; }
  }
  const trackLookupCache = new Map();
  async function lookupApple(track) {
    if (trackLookupCache.has(track.id)) return trackLookupCache.get(track.id);
    let result = null;
    for (const c of ['us', 'ru', 'fr']) {
      const hits = await itunesSearch(`${track.artist} ${track.title}`, { country: c, limit: 1 });
      if (hits.length) { result = hits[0]; break; }
    }
    trackLookupCache.set(track.id, result);
    return result;
  }

  /* ===== Home ===== */
  function renderHome() {
    document.getElementById('home-user-name').textContent = userName;
    const tiles = document.getElementById('cat-tiles');
    const tracksByCat = new Map(CATEGORIES_ORDER.map(c => [c, []]));
    for (const tk of allTracks) {
      if (tracksByCat.has(tk.category)) tracksByCat.get(tk.category).push(tk);
    }
    tiles.innerHTML = CATEGORIES_ORDER.map(cat => {
      const arr = tracksByCat.get(cat);
      const count = arr.length;
      const commented = arr.filter(tk => (audit[tk.id] && audit[tk.id].comment && audit[tk.id].comment.trim())).length;
      const hasProg = commented > 0;
      return `<button class="cat-tile${hasProg ? ' has-progress' : ''}" data-cat="${escapeHtml(cat)}">
        <div class="ct-name">${escapeHtml(t(`cat.${cat}.short`))}</div>
        <div class="ct-stage">${escapeHtml(t(`cat.${cat}.stage`))}</div>
        <div class="ct-context">${escapeHtml(t(`cat.${cat}.context`))}</div>
        <div class="ct-meta">
          <span class="ct-pill">${count} ${escapeHtml(plural(count, 'Track'))}</span>
          ${commented > 0 ? `<span class="ct-pill with-comments">✓ ${commented} ${escapeHtml(plural(commented, 'Comment'))}</span>` : ''}
        </div>
      </button>`;
    }).join('');
    tiles.querySelectorAll('.cat-tile').forEach(b => {
      b.addEventListener('click', () => enterCategory(b.dataset.cat));
    });
  }
  function showHome() {
    onboardingEl.hidden = true;
    categoryEl.hidden = true;
    homeEl.hidden = false;
    currentCategory = null;
    expandedTrackId = null;
    renderHome();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ===== Category ===== */
  function enterCategory(catKey) {
    if (!CATEGORIES_ORDER.includes(catKey)) return;
    currentCategory = catKey;
    document.getElementById('cat-name').textContent = t(`cat.${catKey}.stage`);
    document.getElementById('cat-context').textContent = t(`cat.${catKey}.context`);
    homeEl.hidden = true; onboardingEl.hidden = true;
    categoryEl.hidden = false;
    expandedTrackId = null;
    renderCategoryTracks();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
  function renderCategoryTracks() {
    const list = document.getElementById('track-list');
    const items = allTracks.filter(tk => tk.category === currentCategory);
    if (items.length === 0) {
      list.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:32px 0;font-size:14px">${escapeHtml(t('cat.empty'))}</div>`;
      return;
    }
    list.innerHTML = items.map(tk => {
      const c = audit[tk.id] || {};
      const has = c.comment && c.comment.trim();
      const expanded = expandedTrackId === tk.id;
      const addedBadgeClass = tk.added_by === 'Артур' ? 'added-arthur' : 'added-yula';
      const addedLabel = t('addedBy', { name: tk.added_by, date: fmtDate(tk.added_at) });
      const artworkBg = tk.artwork ? `style="background-image:url('${escapeHtml(tk.artwork)}')"` : '';
      return `<div class="track-card${expanded ? ' expanded' : ''}${has ? ' has-comment' : ''}" data-id="${tk.id}">
        <div class="track-card-head">
          <div class="tc-artwork" ${artworkBg}>${tk.artwork ? '' : '🎵'}</div>
          <div class="tc-text">
            <div class="tc-title">${escapeHtml(tk.title)}</div>
            <div class="tc-artist">${escapeHtml(tk.artist)}</div>
            <div class="tc-meta">
              <span class="badge ${addedBadgeClass}">${escapeHtml(addedLabel)}</span>
              ${has ? `<span class="badge has-comment">${escapeHtml(t('card.hasComment'))}</span>` : ''}
            </div>
          </div>
          <div class="tc-actions">
            <button type="button" class="tc-remove" data-action="remove" aria-label="${escapeHtml(t('card.removeAria'))}">✕</button>
          </div>
        </div>
        <div class="track-card-body">
          <div class="track-card-body-inner">
            <div class="player-embed loading" data-i18n-loading="${escapeHtml(t('embed.loading'))}"></div>
            <div class="comment-label">${escapeHtml(t('card.commentLabel'))}</div>
            <textarea class="comment" placeholder="${escapeHtml(t('card.commentPlaceholder'))}"></textarea>
            <span class="saved-flag">${escapeHtml(t('card.saved'))}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.track-card').forEach(card => {
      const id = Number(card.dataset.id);
      const head = card.querySelector('.track-card-head');
      head.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        toggleExpand(id);
      });
      const removeBtn = card.querySelector('.tc-remove');
      if (removeBtn) {
        removeBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const tk = allTracks.find(x => x.id === id);
          if (!tk) return;
          if (!window.confirm(t('confirm.remove', { title: tk.title }))) return;
          const res = await apiRemoveTrack(id);
          if (res.ok) {
            showToast(t('toast.removed'));
            await reloadTracks();
            renderCategoryTracks();
          } else {
            showToast(t('toast.removeFailed'));
          }
        });
      }
      const ta = card.querySelector('textarea.comment');
      if (ta) {
        ta.value = (audit[id] && audit[id].comment) || '';
        autoGrow(ta);
        let timer;
        ta.addEventListener('input', () => {
          autoGrow(ta);
          if (!audit[id]) audit[id] = {};
          audit[id].comment = ta.value;
          clearTimeout(timer);
          timer = setTimeout(() => {
            lsSet(K_AUDIT, JSON.stringify(audit));
            apiSaveDebounced();
            const f = card.querySelector('.saved-flag');
            f.classList.add('show');
            setTimeout(() => f.classList.remove('show'), 1400);
            const has = ta.value && ta.value.trim();
            card.classList.toggle('has-comment', !!has);
            const badgeRow = card.querySelector('.tc-meta');
            let badge = badgeRow.querySelector('.badge.has-comment');
            if (has && !badge) {
              badge = document.createElement('span');
              badge.className = 'badge has-comment';
              badge.textContent = t('card.hasComment');
              badgeRow.appendChild(badge);
            } else if (!has && badge) {
              badge.remove();
            }
          }, 400);
        });
      }
    });
    if (expandedTrackId) {
      const card = list.querySelector(`.track-card[data-id="${expandedTrackId}"]`);
      if (card) renderEmbedInCard(card);
    }
  }
  function autoGrow(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.max(90, ta.scrollHeight) + 'px';
  }
  function toggleExpand(id) {
    const list = document.getElementById('track-list');
    const cards = list.querySelectorAll('.track-card');
    if (expandedTrackId === id) {
      expandedTrackId = null;
      cards.forEach(c => {
        if (c.classList.contains('expanded')) {
          const slot = c.querySelector('.player-embed');
          slot.innerHTML = ''; slot.classList.remove('error'); slot.classList.add('loading');
          c.classList.remove('expanded');
        }
      });
      return;
    }
    cards.forEach(c => {
      if (c.classList.contains('expanded')) {
        const slot = c.querySelector('.player-embed');
        slot.innerHTML = ''; slot.classList.remove('error'); slot.classList.add('loading');
        c.classList.remove('expanded');
      }
    });
    expandedTrackId = id;
    const target = list.querySelector(`.track-card[data-id="${id}"]`);
    if (target) {
      target.classList.add('expanded');
      renderEmbedInCard(target);
      setTimeout(() => {
        const rect = target.getBoundingClientRect();
        if (rect.top < 80 || rect.bottom > window.innerHeight - 40) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 80);
    }
  }
  async function renderEmbedInCard(card) {
    const id = Number(card.dataset.id);
    const track = allTracks.find(tk => tk.id === id);
    if (!track) return;
    const slot = card.querySelector('.player-embed');
    slot.innerHTML = ''; slot.classList.remove('error'); slot.classList.add('loading');
    if (service === 'spotify' && track.spotify_id) {
      slot.classList.remove('loading');
      const iframe = document.createElement('iframe');
      iframe.src = `https://open.spotify.com/embed/track/${track.spotify_id}?utm_source=generator`;
      iframe.allow = 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture';
      iframe.loading = 'lazy';
      slot.appendChild(iframe);
      return;
    }
    const data = await lookupApple(track);
    if (expandedTrackId !== id) return;
    slot.classList.remove('loading');
    if (!data || !data.embedUrl) {
      slot.classList.add('error');
      slot.textContent = t('embed.notFound');
      return;
    }
    const iframe = document.createElement('iframe');
    iframe.src = data.embedUrl;
    iframe.allow = 'autoplay *; encrypted-media *;';
    iframe.setAttribute('sandbox', 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation');
    iframe.loading = 'lazy';
    slot.appendChild(iframe);
  }

  /* ===== Search modal ===== */
  const modalBackdrop = document.getElementById('modal-backdrop');
  const searchModal = document.getElementById('search-modal');
  const smInput = document.getElementById('sm-input');
  const smResults = document.getElementById('sm-results');
  const smTarget = document.getElementById('sm-target');

  function openSearch() {
    if (!currentCategory) return;
    smTarget.textContent = t(`cat.${currentCategory}.short`);
    smInput.value = '';
    smResults.innerHTML = `<div class="sm-status">${escapeHtml(t('search.initial'))}</div>`;
    searchModal.classList.add('show');
    modalBackdrop.classList.add('show');
    setTimeout(() => smInput.focus(), 200);
  }
  function closeSearch() {
    searchModal.classList.remove('show');
    modalBackdrop.classList.remove('show');
  }
  document.getElementById('open-search').addEventListener('click', openSearch);
  modalBackdrop.addEventListener('click', closeSearch);

  let searchTimer = null, searchRunId = 0;
  smInput.addEventListener('input', () => {
    const q = smInput.value.trim();
    clearTimeout(searchTimer);
    if (!q) {
      smResults.innerHTML = `<div class="sm-status">${escapeHtml(t('search.initial'))}</div>`;
      return;
    }
    smResults.innerHTML = `<div class="sm-status">${escapeHtml(t('search.searching'))}</div>`;
    const myRun = ++searchRunId;
    searchTimer = setTimeout(async () => {
      const [us, ru] = await Promise.all([
        itunesSearch(q, { country: 'us', limit: 10 }),
        itunesSearch(q, { country: 'ru', limit: 10 })
      ]);
      if (myRun !== searchRunId) return;
      const seen = new Set(); const merged = [];
      for (const h of [...us, ...ru]) {
        const key = `${h.artist.toLowerCase().trim()}|${h.title.toLowerCase().trim()}`;
        if (seen.has(key)) continue;
        seen.add(key); merged.push(h);
        if (merged.length >= 14) break;
      }
      if (merged.length === 0) {
        smResults.innerHTML = `<div class="sm-status">${escapeHtml(t('search.noResults'))}</div>`;
        return;
      }
      smResults.innerHTML = merged.map((h, i) => `
        <div class="sm-result" data-idx="${i}">
          <div class="sm-art" style="background-image:url('${escapeHtml(h.artworkUrl100 || '')}')"></div>
          <div class="sm-text">
            <div class="sm-rtitle">${escapeHtml(h.title)}</div>
            <div class="sm-rartist">${escapeHtml(h.artist)}</div>
          </div>
          <button class="sm-add" type="button" aria-label="${escapeHtml(t('search.add'))}">+</button>
        </div>
      `).join('');
      smResults.querySelectorAll('.sm-result').forEach(row => {
        row.addEventListener('click', async () => {
          const idx = Number(row.dataset.idx);
          const h = merged[idx];
          const btn = row.querySelector('.sm-add');
          btn.disabled = true; btn.textContent = '…';
          const res = await apiAddTrack({
            artist: h.artist, title: h.title,
            category: currentCategory,
            artwork_url: h.artwork || null, spotify_id: null
          });
          if (res.ok) {
            btn.textContent = '✓';
            await reloadTracks();
            renderCategoryTracks();
            setTimeout(() => closeSearch(), 380);
            showToast(t('toast.added'));
          } else {
            btn.textContent = '+'; btn.disabled = false;
            showToast(t('toast.addFailed'));
          }
        });
      });
    }, 350);
  });

  /* ===== misc handlers ===== */
  document.getElementById('home-user-name').addEventListener('click', () => {
    const next = userName === 'Юля' ? 'Артур' : 'Юля';
    if (!window.confirm(t('confirm.switch', { name: next }))) return;
    userName = next;
    lsSet(K_NAME, userName);
    document.getElementById('home-user-name').textContent = userName;
    apiSaveDebounced();
    renderHome();
  });
  document.getElementById('cat-back').addEventListener('click', showHome);

  const sendBtn = document.getElementById('send-report');
  const sendStatus = document.getElementById('send-status');
  sendBtn.addEventListener('click', async () => {
    if (!window.confirm(t('confirm.send'))) return;
    sendBtn.disabled = true;
    const orig = t('home.sendBtn');
    sendBtn.textContent = t('sending');
    const res = await apiSubmit();
    sendBtn.disabled = false;
    sendBtn.textContent = orig;
    if (res && res.ok) {
      sendStatus.textContent = t('home.sendStatus', { n: res.submit_count || 1 });
      showToast(res.emailed ? t('toast.sent') : t('toast.savedPending'));
    } else {
      showToast(t('toast.failed'));
    }
  });

  const toast = document.getElementById('toast');
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 2600);
  }

  /* ===== boot ===== */
  async function reloadTracks() { allTracks = await apiGetTracks(); }
  async function bootApp() {
    await reloadTracks();
    apiSaveDebounced();
    showHome();
  }

  applyStaticTranslations();
  updateLangToggleUI();
  if (userName && service) bootApp();
  else showOnboarding();
})();
</script>
</body>
</html>
