    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: rgba(217, 102, 102, 0.95);
    color: #fff;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 6px 20px rgba(217, 102, 102, 0.35);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s var(--ease-out);
    cursor: pointer;
    max-width: calc(100vw - 32px);
  }
  .unsaved-badge.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .unsaved-badge .unsaved-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: pulse 1.4s ease-in-out infinite; }
  .unsaved-badge:active { transform: translate(-50%, 1px); }

  /* ===== Rating + Mine removed (per spec) ===== */
  .rating { display: none !important; }
  #mine-btn { display: none !important; }

  /* ===== Category picker screen =====
     Lives in normal document flow (no position:fixed) so that
     body.allow-scroll lets the page scroll naturally on phones.
     Top padding accounts for the fixed top-bar (chip + icon-buttons). */
  #cat-picker[hidden] { display: none !important; }
  #cat-picker {
    padding-top: calc(86px + env(safe-area-inset-top));
    padding-left: 16px;
    padding-right: 16px;
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
    display: block;
    background: var(--bg);
    min-height: 100vh;
  }
  #cat-picker > * { max-width: 760px; width: 100%; margin-left: auto; margin-right: auto; }
  #cat-picker h2 {
    font-family: var(--font-display);
    font-weight: 400; font-size: 32px; line-height: 1.05;
    letter-spacing: -0.018em; margin: 18px 0 6px; text-align: center;
  }
  #cat-picker h2 em { font-style: italic; color: var(--gold-bright); }
  #cat-picker .pick-sub {
    text-align: center; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.18em; color: var(--text-muted);
    font-weight: 700; margin-bottom: 26px;
  }
  .cat-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 520px) { .cat-grid { grid-template-columns: 1fr 1fr; } }
  .cat-tile {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 22px 22px 20px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: 18px;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.16s var(--ease-out), border-color 0.16s, background 0.16s;
    position: relative;
    overflow: hidden;
  }
  .cat-tile:hover { transform: translateY(-2px); border-color: var(--line-2); background: rgba(255,255,255,0.06); }
  .cat-tile:active { transform: translateY(1px); }
  .cat-tile .cat-nm {
    font-family: var(--font-display);
    font-weight: 400; font-size: 26px;
    letter-spacing: -0.015em;
    margin-bottom: 4px;
  }
  .cat-tile .cat-ctx {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .cat-tile.lovers {
    background: linear-gradient(135deg, rgba(249,168,212,0.18), rgba(212,164,92,0.18));
    border-color: rgba(249,168,212,0.35);
  }
  .cat-tile.lovers .cat-nm { color: var(--pink); }
  .cat-tile.lovers::after {
    content: '↗';
    position: absolute; top: 16px; right: 18px;
    font-size: 18px; color: var(--pink); opacity: 0.7;
  }
  .cat-tile.general {
    background: rgba(212,164,92,0.08);
    border-color: rgba(212,164,92,0.3);
  }
  .cat-tile.general .cat-nm { color: var(--gold-bright); }

  /* Category pill in top bar (during discovery) */
  .cat-current {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--text);
    /* Larger so mom can read at a glance. Bumped from 12 → 14px to match
       the rest of the bumped UI typography. */
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    min-width: 0;
    max-width: 100%;
    min-height: 42px;
  }
  .cat-current strong {
    color: var(--gold-bright);
    margin-left: 4px;
    /* Long category names (e.g. "DJ Микки") get an ellipsis instead of
       expanding past the screen edge and pushing the filter icon off. */
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 38vw;
    display: inline-block;
  }
  .cat-current svg { width: 14px; height: 14px; opacity: 0.7; flex-shrink: 0; }

  /* Stream filter chip — icon-only, matches the style of other top-bar
     icon-buttons so a long category name (e.g. "DJ Микки") never pushes it
     off-screen. Active filter = solid gold so mom sees at a glance that a
     filter is on. */
  .stream-filter-chip {
    appearance: none;
    flex-shrink: 0;
    width: 42px; height: 42px;
    /* Conic lavender → cyan gradient — unique, can't be confused with the
       gold accents elsewhere. Filter is "analytical" so the cool palette
       fits its function (slice / refine) versus the warm action chips. */
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.32) 0%, transparent 55%),
      conic-gradient(from 200deg,
        rgb(167,139,250) 0deg,
        rgb(103,232,249) 180deg,
        rgb(167,139,250) 360deg);
    border: 1px solid rgba(167,139,250,0.50);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: #0a0a0d;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, filter 0.22s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    box-shadow:
      0 6px 16px -6px rgba(167,139,250,0.55),
      inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .stream-filter-chip svg { width: 19px; height: 19px; stroke: #1a0b25; }
  .stream-filter-chip:hover { transform: scale(1.06) rotate(-4deg); filter: brightness(1.08); }
  .stream-filter-chip:active { transform: scale(0.94); }
  .stream-filter-chip.has-filter {
    box-shadow:
      0 10px 24px -6px rgba(167,139,250,0.75),
      0 4px 12px -2px rgba(103,232,249,0.5),
      inset 0 1px 0 rgba(255,255,255,0.4);
    animation: filterPulse 2.6s ease-in-out infinite;
  }
  @keyframes filterPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  /* Tiny white dot at the corner emphasises the active state at a glance. */
  .stream-filter-chip.has-filter::after {
    content: '';
    position: absolute; top: 2px; right: 2px;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 999px;
    box-shadow: 0 0 0 2px rgb(244,114,182), 0 0 10px rgba(244,114,182,0.7);
  }
  body.guest-mode .stream-filter-chip { display: none; }

  /* Stream filter overlay internals */
  /* ===== Per-overlay unique identities =====
     Each overlay carries its own colour personality so mom (and Артур)
     instantly knows which screen they're on. The accent flows from a
     header tint into the title color and a subtle radial bloom behind
     content. */
  .overlay.overlay--filter {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(167,139,250,0.20) 0%, transparent 65%),
      radial-gradient(ellipse 60% 45% at 50% 100%, rgba(103,232,249,0.13) 0%, transparent 65%),
      rgba(16, 10, 22, 0.96);
  }
  .ov-header--filter { border-bottom-color: rgba(167,139,250,0.25); }
  .ov-header--filter .ov-title { color: rgb(167,139,250); }

  .overlay.overlay--search {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(103,232,249,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(167,139,250,0.10) 0%, transparent 65%),
      rgba(10, 18, 24, 0.96);
  }
  .overlay--search .ov-title { color: rgb(103,232,249); }
  .overlay--search .ov-header { border-bottom-color: rgba(103,232,249,0.25); }

  .overlay.overlay--all {
    background:
      radial-gradient(ellipse 70% 50% at 30% 0%, rgba(244,114,182,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 60% 45% at 80% 100%, rgba(253,186,116,0.13) 0%, transparent 65%),
      rgba(22, 12, 18, 0.96);
  }
  .overlay--all .ov-title { color: rgb(244,114,182); }
  .overlay--all .ov-header { border-bottom-color: rgba(244,114,182,0.25); }

  .overlay.overlay--settings {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(252,211,77,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 60% 45% at 50% 100%, rgba(244,114,182,0.11) 0%, transparent 65%),
      rgba(20, 14, 8, 0.96);
  }
  .overlay--settings .ov-title { color: rgb(252,211,77); }
  .overlay--settings .ov-header { border-bottom-color: rgba(252,211,77,0.30); }

  .overlay.overlay--add {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(134,239,172,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 60% 45% at 30% 100%, rgba(253,186,116,0.11) 0%, transparent 65%),
      rgba(10, 22, 16, 0.96);
  }
  .overlay--add .ov-title { color: rgb(134,239,172); }
  .overlay--add .ov-header { border-bottom-color: rgba(134,239,172,0.25); }

  .overlay.overlay--trash {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(217,102,102,0.14) 0%, transparent 65%),
      radial-gradient(ellipse 60% 45% at 50% 100%, rgba(167,139,250,0.09) 0%, transparent 65%),
      rgba(18, 10, 10, 0.96);
  }
  .overlay--trash .ov-title { color: rgb(217,102,102); }
  .overlay--trash .ov-header { border-bottom-color: rgba(217,102,102,0.25); }

  /* Collapsible accordion section — genre / artist. Tap head → expand body. */
  .sf-accordion {
    margin-bottom: 14px;
    background:
      linear-gradient(180deg, rgba(167,139,250,0.05), transparent 60%),
      var(--surface);
    border: 1px solid rgba(167,139,250,0.22);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.22s, box-shadow 0.22s;
  }
  .sf-accordion[open] {
    border-color: rgba(167,139,250,0.50);
    box-shadow: 0 14px 32px -12px rgba(167,139,250,0.35);
  }
  .sf-accordion__head {
    list-style: none;
    cursor: pointer;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    min-height: 56px;
    user-select: none;
  }
  .sf-accordion__head::-webkit-details-marker { display: none; }
  .sf-accordion__title {
    font: 700 16px/1 var(--font-body);
    color: var(--text);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .sf-accordion__pick {
    flex: 1;
    text-align: right;
    font: 600 14px var(--font-body);
    color: rgb(167,139,250);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sf-accordion__caret {
    width: 16px; height: 16px;
    color: var(--text-dim);
    transition: transform 0.22s;
    flex-shrink: 0;
  }
  .sf-accordion[open] .sf-accordion__caret { transform: rotate(180deg); }
  .sf-accordion__body {
    padding: 4px 18px 20px;
    border-top: 1px solid rgba(167,139,250,0.18);
  }
  .sf-genres {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .sf-genres button {
    appearance: none;
    background: rgba(167,139,250,0.06);
    border: 1px solid rgba(167,139,250,0.22);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 999px;
    font: 600 14px var(--font-body);
    cursor: pointer;
    transition: all 0.18s cubic-bezier(.2,.8,.2,1);
    min-height: 44px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .sf-genres button:hover {
    background: rgba(167,139,250,0.14);
    border-color: rgba(167,139,250,0.40);
  }
  .sf-genres button.selected {
    background: linear-gradient(180deg, rgba(167,139,250,0.32), rgba(167,139,250,0.14));
    color: #fff;
    border-color: rgba(167,139,250,0.85);
    box-shadow: 0 6px 18px -6px rgba(167,139,250,0.55);
  }
  .sf-genres .sf-count {
    font: 700 12px var(--font-body);
    color: rgba(167,139,250,0.85);
    opacity: 0.85;
  }
  .sf-empty {
    text-align: center;
    padding: 20px 12px;
    color: var(--text-muted);
    font: 600 13px var(--font-body);
    letter-spacing: 0.02em;
  }
  .sf-artist-input {
    width: 100%; min-height: 50px;
    padding: 14px 18px;
    background: rgba(103,232,249,0.05);
    border: 1px solid rgba(103,232,249,0.30);
    border-radius: 14px;
    color: var(--text);
    font: 400 17px var(--font-body);
    box-sizing: border-box;
    transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
  }
  .sf-artist-input:focus {
    outline: none;
    border-color: rgba(103,232,249,0.75);
    background: rgba(103,232,249,0.10);
    box-shadow: 0 0 0 4px rgba(103,232,249,0.10);
  }
  .sf-artist-suggestions {
    margin-top: 8px;
    display: flex; flex-direction: column; gap: 4px;
    max-height: 240px; overflow-y: auto;
  }
  .sf-artist-suggestions button {
    appearance: none;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font: 600 14px var(--font-body);
    cursor: pointer;
    text-align: left;
    display: flex; justify-content: space-between; align-items: center;
    min-height: 44px;
  }
  .sf-artist-suggestions button:hover { background: rgba(212,164,92,0.10); }
  .sf-artist-suggestions button.selected { background: rgba(212,164,92,0.20); color: var(--gold-bright); }
  .sf-artist-suggestions .sf-count { font: 700 12px var(--font-body); color: var(--text-muted); }
  .sf-actions {
    display: flex; gap: 10px;
    margin-top: 24px;
    position: sticky; bottom: 0;
    background: linear-gradient(180deg, transparent, var(--bg) 30%);
    padding-top: 16px;
  }
  .sf-btn {
    appearance: none;
    flex: 1;
    padding: 14px 18px;
    border-radius: 12px;
    font: 700 14px var(--font-body);
    cursor: pointer;
    transition: all 0.18s;
    min-height: 48px;
  }
  .sf-btn--clear {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--text-dim);
  }
  .sf-btn--clear:hover { background: var(--surface-2); color: var(--text); }
  .sf-btn--apply {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
    border: 0;
    box-shadow: 0 12px 28px -8px rgba(212,164,92,0.4);
  }
  .sf-btn--apply:hover { transform: translateY(-1px); }
  .sf-btn--apply:active { transform: translateY(0); }

  /* ===== Save indicator on card comment ===== */
  .save-indicator {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 6px;
    padding: 4px 10px 4px 8px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s var(--ease-out), background 0.3s, color 0.3s, border-color 0.3s;
  }
  .save-indicator.show { opacity: 1; }
  .save-indicator.saving { color: var(--gold-bright); border-color: rgba(var(--art-r), var(--art-g), var(--art-b), 0.4); }
  .save-indicator.saving .dot { animation: pulse 1s ease-in-out infinite; }
  .save-indicator.saved { color: var(--green); border-color: rgba(125, 211, 163, 0.35); }
  .save-indicator.error { color: var(--bad); border-color: rgba(217, 102, 102, 0.35); }
  .save-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* ===== Activity feed ===== */
  .activity-list {}
  .activity-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .activity-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .activity-icon.add { background: rgba(125, 211, 163, 0.14); color: var(--green); }
  .activity-icon.remove { background: rgba(217, 102, 102, 0.14); color: var(--bad); }
  .activity-icon svg { width: 16px; height: 16px; }
  .activity-text { flex: 1; min-width: 0; }
  .activity-headline { font-size: 14px; font-weight: 500; line-height: 1.4; }
  .activity-headline strong { font-weight: 700; color: var(--gold-bright); }
  .activity-track { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
  .activity-undo {
    appearance: none; background: transparent;
    color: var(--gold-bright);
    border: 0;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    padding: 6px 0 0;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .activity-undo:hover { color: var(--text); }

  /* ===== Settings overlay ===== */
  .set-section {
    margin-bottom: 26px;
  }
  .set-section h4 {
    margin: 0 0 12px;
    color: var(--text-muted);
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .seg {
    display: flex; gap: 4px;
    padding: 4px;
    background: var(--surface-2);
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .seg button {
    flex: 1; appearance: none;
    background: transparent; color: var(--text-dim);
    border: 0; border-radius: 9px;
    padding: 12px 14px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 44px;
  }
  .seg button.active {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
    box-shadow: 0 6px 16px -6px var(--gold);
  }
  .set-row {
    width: 100%; appearance: none;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    text-align: left;
    transition: background 0.18s, border-color 0.18s;
  }
  .set-row:hover { background: var(--surface-2); border-color: var(--line-2); }
  .set-row .sr-ico {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-bright);
    flex-shrink: 0;
  }
  .set-row .sr-ico svg { width: 18px; height: 18px; }
  .set-row .sr-main { flex: 1; min-width: 0; }
  .set-row .sr-h { font-size: 16px; font-weight: 600; }
  .set-row .sr-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .set-row .sr-arrow { color: var(--text-muted); flex-shrink: 0; }
  .set-row .sr-arrow svg { width: 16px; height: 16px; }
  .send-btn {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d; border: 0;
    border-radius: var(--radius);
    padding: 18px 22px;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 16px 32px -12px var(--gold);
    transition: transform 0.15s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 56px;
    letter-spacing: 0.02em;
  }
  .send-btn:active { transform: scale(0.98); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  /* ===== Add-song overlay ===== */
  .add-form {
    display: flex; flex-direction: column; gap: 16px;
    max-width: 480px; margin: 0 auto;
  }
  .add-target {
    padding: 10px 14px;
    background: rgba(212, 164, 92, 0.08);
    border: 1px solid rgba(212, 164, 92, 0.22);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  .add-target strong { color: var(--gold-bright); font-weight: 700; }
  .add-hint {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .add-parsed {
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .add-parsed .ap-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; margin-right: 6px; }
  .add-parsed .ap-art { color: var(--gold-bright); font-weight: 700; }
  .add-parsed .ap-sep { color: var(--text-muted); margin: 0 6px; }
  .add-field label {
    display: block;
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.18em; font-weight: 700;
    margin-bottom: 8px;
  }
  .add-field input {
    width: 100%; padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 22px; font-weight: 400;
    letter-spacing: -0.015em;
    -webkit-appearance: none; appearance: none;
    transition: border-color 0.18s, background 0.18s;
    min-height: 56px;
  }
  .add-field input:focus { outline: none; border-color: var(--gold); background: rgba(212,164,92,0.04); }
  .add-field input::placeholder { color: var(--text-muted); font-style: italic; }
  .add-preview {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    color: var(--text-dim);
    font-size: 13px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .add-preview.is-exact { border-color: rgba(231, 102, 102, 0.45); background: rgba(231, 102, 102, 0.06); }
  .add-preview.is-found { border-color: rgba(212, 164, 92, 0.4); }
  .add-preview .pv-thumb {
    width: 100%; aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000 center/cover no-repeat;
  }
  .add-preview .pv-thumb.empty { display: none; }
  .add-preview .pv-row { color: var(--text); font-weight: 600; }
  .add-preview .pv-hint { color: var(--text-muted); font-size: 12px; }
  .add-preview .pv-link { display: inline-block; color: var(--gold-bright); text-decoration: underline; font-size: 12px; }
  .add-similar { display: flex; flex-direction: column; gap: 6px; }
  .add-similar .as-head { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; }
  .add-similar .as-item { padding: 8px 10px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); border-radius: 8px; font-size: 13px; }
  .add-similar .as-item .as-by { color: var(--text-muted); font-size: 11px; margin-left: 6px; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: calc(96px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%) translateY(8px);
    background: rgba(22, 22, 26, 0.96);
    backdrop-filter: blur(24px) saturate(1.5); -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px 22px;
    border-radius: 999px;

<script>
(async function() {
  'use strict';
  /* ===== Constants ===== */
  const API = 'https://api.akoev.com';
  const K_NAME = 'venchanie_user_name_v2';   // localStorage now (was sessionStorage)
  const K_LANG = 'venchanie_lang_v1';
  const K_DRAFTS = 'venchanie_drafts_v1';
  // State-version handshake: bump STATE_VERSION whenever a dev change leaves
  // existing phones with stale "stale-replay" data that could push junk
  // actions to the server. SURGICAL: only wipes card snapshots (server is
  // source of truth, can be re-fetched). The pending action queue is NOT
  // wiped — it gets a best-effort sendBeacon flush right here so any items

    ['252 211 77',  '253 186 116'],  // 16 gold → peach
    ['234 179 8',   '202 138 4'],    // 17 deep gold → bronze
    ['232 232 220', '252 211 77'],   // 18 cream → gold
    ['250 204 21',  '244 114 182'],  // 19 sunburst → rose

    ['180 100 100', '252 211 77'],   // 20 maroon → gold
    ['161 98 7',    '253 186 116'],  // 21 cognac → peach

  const GENRE_FAMILY = {

    'Эстрада':     [0, 1, 2, 3, 4, 19, 22],
    'R&B':         [2, 4, 13, 14, 19],
    'Рок':         [5, 6, 7, 21, 20],
    'Электроника': [8, 11, 13, 15, 9],
    'Чилл':        [8, 9, 10, 11, 12],
    'Хип-хоп':     [13, 14, 15, 4, 2],
    'Джаз':        [16, 17, 18, 19, 20],
    'Классика':    [18, 16, 17, 19, 11],
    'Шансон':      [20, 21, 23, 17],
    'Кантри':      [22, 21, 10, 16],

    // ids feels varied (D1 inserts often land in chunks of similar genre).

  function fmt(n) { return new Intl.NumberFormat(lang === 'ru' ? 'ru-RU' : 'en-US').format(n); }

    if (min < 60) return lang === 'ru' ? `${min} мин назад` : `${min} min ago`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return lang === 'ru' ? `${hr} ч назад` : `${hr}h ago`;
    const day = Math.floor(hr / 24);

  /* ===== Album-color extraction ===== */
  let colorThief = null;

    return null;

      r = Math.round(r + (255 - r) * lift);
      g = Math.round(g + (255 - g) * lift);
      b = Math.round(b + (255 - b) * lift);

    return [r, g, b];

    const [r, g, b] = refineColor(rgb);

    root.style.setProperty('--art-r', r);
    root.style.setProperty('--art-g', g);
    root.style.setProperty('--art-b', b);

  function resetAlbumColor() {

    root.style.setProperty('--art-b', b);

    const ct = getColorThief();

    if (colorCache.has(imgUrl)) { applyAlbumColor(colorCache.get(imgUrl)); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';

  /* ===== fetch with retry + timeout =====
     20s timeout (was 6s) — iPhone on weak cellular can take that long to
     complete an HTTPS POST after waking from background. 3 retries with
     exponential backoff. */
  async function fetchWithRetry(url, opts, retries = 3, timeoutMs = 20000) {
    let lastErr = null;
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const ctrl = new AbortController();
        const tm = setTimeout(() => ctrl.abort(), timeoutMs);
        const r = await fetch(url, Object.assign({}, opts || {}, { signal: ctrl.signal, cache: 'no-store' }));
        clearTimeout(tm);
        return r;
      } catch (e) {

  /* ===== Diag: silent telemetry for chasing save failures =====

  function diag(kind, payload) {

      if (navigator.sendBeacon) {
        const blob = new Blob([body], { type: 'text/plain' });
        navigator.sendBeacon(`${API}/api/diag`, blob);
      } else {
        fetch(`${API}/api/diag`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body, keepalive: true }).catch(()=>{});
      }
    } catch (e) { /* ignore */ }

  // 2000-char comment cap or the row budget. dedupe so a hot loop doesn't
  // spam the server.
  let _lastErrSig = '';
  let _lastErrAt = 0;
  function reportClientError(kind, info) {
    const sig = kind + '|' + (info?.message || '') + '|' + (info?.source || '');
    const now = Date.now();
    if (sig === _lastErrSig && now - _lastErrAt < 5000) return;
    _lastErrSig = sig; _lastErrAt = now;
    diag(kind, {
      message: String(info?.message || '').slice(0, 500),
      source: String(info?.source || '').slice(0, 200),
      line: info?.line || null,
      col: info?.col || null,
      stack: String(info?.stack || '').slice(0, 1500)

    reportClientError('window_error', {

    reportClientError('unhandled_rejection', {
      message: (r && r.message) || String(r || 'unknown'),
      stack: r?.stack
    });
  });

  /* ===== Bulletproof action queue =====

  const Q_KEY = 'venchanie_pending_actions_v1';

  // whether the localStorage write succeeded. Used as the source-of-truth for
  // qFlushBeacon on page-unload so a quota-exceeded localStorage write

  // actions to vanish on tab-close — the beacon still fires from RAM.
  const qMirror = [];
  function qGet() {

    // landed in localStorage AND in mirror only appears once.
    const raw = lsGetJSON(Q_KEY, []);
    const persisted = Array.isArray(raw)
      ? raw.filter(x => x && typeof x === 'object' && typeof x.song_id === 'number')
      : (() => { try { diag('queue_corrupt_reset', {}); } catch {} return []; })();

    const byId = new Map();
    for (const x of persisted) if (x && x._id) byId.set(x._id, x);

  const Q_CAP = 5000;

      try {
        const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain' });

      } catch (e) { /* fire-and-forget */ }

  }

  async function apiAction(payload) {
    // 1) ALWAYS enqueue first — this is the durable write.
    const itemId = qEnqueue(payload);
    // 2) Try to drain immediately. We DO NOT touch the unsaved-badge here:
    //    during a normal save the item lives in the queue for ~200ms while
    //    we POST to the server, and surfacing a red "Не отправлено" badge
    //    for that window makes successful saves look like errors.
    //    qDrain's finally block calls refreshUnsavedBadge — that's the only
    //    place where the badge state reflects the true post-drain queue.
    await qDrain();
    // Read this item's drain outcome:
    //   'ok'     — server accepted (2xx)
    //   'failed' — server rejected with 4xx (e.g. 403 guest-category-mismatch,
    //              409 comment-without-prior-action) → drained but NOT saved
    //   undefined — still in queue (network failure / 5xx / transient) →
    //              will retry, treat as not-yet-ok so callers don't celebrate
    const outcome = drainOutcomes.get(itemId);
    drainOutcomes.delete(itemId);

    if (outcome === 'ok') return { ok: true };

    // not-confirmed-yet (queue badge already shows the unsaved count).
    return { ok: false, queued: true };

  /* ===== Reconciliation =====
     Periodically (and on boot/visibility-visible) pull what the server thinks
     it has saved for this user, and compare against our local snapshots. If a
     local snapshot has rating/category/comment that the server is MISSING,
     re-queue the action. Belt-and-suspenders against silent save failures. */
  async function reconcileWithServer() {
    if (!userName || !ALLOWED_USERS.has(userName)) return;
    let serverState;
    try {
      const r = await fetchWithRetry(`${API}/api/state?user=${encodeURIComponent(userName)}`, {}, 2, 20000);
      if (!r.ok) { diag('recon_fetch_bad', { status: r.status }); return; }
      serverState = await r.json();
    } catch (e) {
      diag('recon_fetch_err', { err: String(e?.message || e) });
      return;
    }
    const byId = new Map();
    for (const a of (serverState.actions || [])) byId.set(a.song_id, a);
    const draftsById = new Map();
    for (const d of (serverState.drafts || [])) draftsById.set(d.song_id, d);
    let resent = 0;
    const localSnaps = lsGetJSON(K_SNAPSHOTS, {});
    for (const sidStr of Object.keys(localSnaps)) {
      const sid = parseInt(sidStr, 10);
      if (!sid) continue;
      const snap = localSnaps[sidStr] || {};
      const server = byId.get(sid);
      const cats = (snap.categories || '').split(',').filter(Boolean).join(',');
      const localRating = snap.rating || 0;
      const localComment = (snap.comment || '').trim();
      const serverRating = server?.rating || 0;
      const serverCats = server?.category || '';
      const serverComment = (server?.comment || '').trim();
      // Server-authoritative window: if the server has a row that was written
      // meaningfully AFTER our local snapshot's ts (60s skew tolerance for
      // phone clocks lagging Cloudflare time), trust the server. Drop the
      // snapshot and skip resend. Legacy snapshots without ts get treated as
      // ts=0 so the first reconcile picks up the server's view.
      const SKEW_MS = 60000;
      const snapTs = (typeof snap.ts === 'number') ? snap.ts : 0;
      if (server && server.created_at && server.created_at > snapTs + SKEW_MS) {
        delete localSnaps[sidStr];
        continue;
      }
      const ratingMismatch = (localRating > 0 && serverRating !== localRating);
      const catsMismatch = (cats && serverCats !== cats);
      const commentMismatch = (localComment && serverComment !== localComment);
      const hasAnyDelta = ratingMismatch || catsMismatch || commentMismatch;
      // Comment-only snapshot (no rating, no cat): the comment lives in the
      // drafts table on the server, NOT in library_actions. Pushing it as
      // action='comment' gets 409'd by the server forever. Route to drafts
      // — but DON'T overwrite an existing matching server-side comment; that
      // would demote a committed comment to a draft. Drop the snapshot if
      // the server already has this exact text.
      if (!cats && localRating === 0 && localComment) {
        if (serverComment === localComment) {
          delete localSnaps[sidStr];
          continue;
        }
        apiDraftPush(sid, localComment).catch(() => {});
        delete localSnaps[sidStr];
        continue;
      }
      if (hasAnyDelta) {
        let action;
        if (cats) action = 'assign';
        else if (localRating > 0) action = 'rate';
        else action = 'comment';
        const payload = { song_id: sid, user: userName, action };
        if (cats) payload.category = cats;
        if (localRating > 0) payload.rating = localRating;
        if (localComment) payload.comment = localComment;
        qEnqueue(payload);
        resent++;
      }
      const allMatch = (localRating === serverRating) && ((cats || '') === (serverCats || '')) && (localComment === serverComment);
      if (!hasAnyDelta && allMatch) delete localSnaps[sidStr];
    }
    lsSetJSON(K_SNAPSHOTS, localSnaps);
    // Also push any local drafts that the server doesn't have yet
    const localDrafts = lsGetJSON(K_DRAFTS, {});
    for (const sidStr of Object.keys(localDrafts)) {
      const sid = parseInt(sidStr, 10);
      const txt = (localDrafts[sidStr] || '').trim();
      if (!txt) continue;
      const sd = draftsById.get(sid);
      if (!sd || (sd.comment || '') !== txt) {
        apiDraftPush(sid, txt).catch(() => {});
      }
    }
    if (resent > 0) {
      diag('recon_resent', { count: resent });
      // qDrain's finally calls refreshUnsavedBadge — don't surface red
      // before we've even tried to send the just-resent items.
      qDrain();
    }
  }
  /* ===== Unsaved-changes badge =====
     A small pill near the top showing how many actions are queued. Tapping

  function refreshUnsavedBadge() {
    const el = document.getElementById('unsaved-badge');
    if (!el) return;
    const n = qGet().length;

      const clearedCategory = !cats && !!(song.my_category);
      const clearedRating = !currentRating && !!(song.my_rating);
      const action = cats ? 'assign' : (currentRating ? 'rate' : 'skip');
      // Skip if there is nothing to save — but ALWAYS save when there's any state
      // OR when user actively cleared a prior server-known value.
      const hasState = currentRating > 0 || selectedCategories.size > 0 || (commentEdited && (comment || ta?.dataset.edited === '1'));
      if (!hasState && action === 'skip' && !clearedCategory && !clearedRating) return true;
      const payload = { song_id: song.id, user: userName, action };
      if (cats) payload.category = cats;
      if (currentRating) payload.rating = currentRating;
      if (commentEdited) payload.comment = comment;
      else if (comment) payload.comment = comment;
      // Server reads `clear` and explicitly NULLs those fields, overriding the
      // COALESCE-preserve default. Without this, "untag" actions silently no-op.
      const clearList = [];
      if (clearedCategory) clearList.push('category');
      if (clearedRating) clearList.push('rating');
      if (clearList.length) payload.clear = clearList;
      showSaveIndicator('saving');
      const res = await apiAction(payload);
      if (res.ok) {
        showSaveIndicator('saved');
        // Sync the local song object so a back-navigation through seenStack
        // shows the just-saved values instead of stale my_* fields.
        if (song) {
          if (commentEdited || comment) song.my_comment = comment;
          if (cats) song.my_category = cats;
          else if (clearedCategory) song.my_category = null;
          if (currentRating) song.my_rating = currentRating;
          else if (clearedRating) song.my_rating = null;
        }
        return true;
      }
      // Item is in the queue and will retry — don't scare the user with red.
      // Show 'saving' so they know it's in flight.
      showSaveIndicator('saving');
      return false;
    }
    function persistCard() { return persistNow(); } // rating/category callers
    function persistCardDebounced() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => persistNow(), 800);
    }
    // Expose flush so overlay-open / unload handlers can force a save.
    window.__flushCardSave = () => persistNow().catch(() => {});

    // Skip / back buttons removed — navigation is swipe (mobile) + arrow keys
    // (desktop). The 'Удалить из списка' link stays.
    document.getElementById('remove-link')?.addEventListener('click', () => onRemoveCurrent());
    document.getElementById('meta-delete')?.addEventListener('click', () => onRemoveCurrent());

    cardHost.querySelectorAll('.cat-pill').forEach(b => b.addEventListener('click', () => {
      setDirty(true);
      const cat = b.dataset.cat;
      if (selectedCategories.has(cat)) { selectedCategories.delete(cat); b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); }
      else { selectedCategories.add(cat); b.classList.add('selected'); b.setAttribute('aria-pressed', 'true'); }
      // Local snapshot first — survives reload even if server save fails
      snapshotSet(song.id, { categories: [...selectedCategories].join(','), rating: currentRating });
      const hint = document.getElementById('rating-hint');
      if (hint) {
        if (currentRating) hint.textContent = t('rating.hint.set', { n: currentRating });
        else hint.textContent = selectedCategories.size ? t('rating.hint.with_cat') : t('rating.hint.empty');
      }
      persistCard();
    }));
    cardHost.querySelectorAll('.rating-btn').forEach(b => b.addEventListener('click', () => {
      const r = parseInt(b.dataset.r, 10);
      if (currentRating === r) {
        currentRating = 0;
        cardHost.querySelectorAll('.rating-btn').forEach(x => { x.classList.remove('filled'); x.setAttribute('aria-pressed', 'false'); });
      } else {
        currentRating = r;
        cardHost.querySelectorAll('.rating-btn').forEach(x => {
          const on = parseInt(x.dataset.r, 10) <= r;
          x.classList.toggle('filled', on);
          x.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
      }
      // Local snapshot FIRST — guarantees survival even if network fails or tab is killed
      snapshotSet(song.id, { rating: currentRating, categories: [...selectedCategories].join(',') });
      const hint = document.getElementById('rating-hint');
      if (hint) hint.textContent = currentRating ? t('rating.hint.set', { n: currentRating }) : (selectedCategories.size ? t('rating.hint.with_cat') : t('rating.hint.empty'));
      persistCard();
    }));
    const ta = document.getElementById('comment-input');
    // iOS keyboard handling: when the textarea is focused, the soft keyboard
    // slides up ~280-340px. With body.discovery-locked + overflow:hidden the
    // user cannot scroll the textarea + rating row + cats summary back into
    // view. Two-pronged fix:
    //   1. scrollIntoView({block:'center'}) on focus brings the textarea
    //      into the visible viewport BEFORE the keyboard finishes animating.
    //   2. visualViewport listener sets a `--kbd-offset` CSS var so the
    //      stage shifts up by the keyboard height, ensuring rating buttons
    //      stay reachable even while typing.
    ta.addEventListener('focus', () => {
      // Force a kbd-offset recompute on focus — iOS Safari sometimes fires
      // the visualViewport `resize` BEFORE the keyboard reaches its final
      // height; this guarantees we re-measure when the keyboard is up.
      setTimeout(() => { try { recomputeKbdOffset(); } catch {} }, 250);
      // Scroll the textarea into view inside the OWN scroller (#card-host) —
      // a bare scrollIntoView would target window/body which are
      // overflow:hidden and ignore the call. Compute the offset manually.
      setTimeout(() => {
        try {
          const host = document.getElementById('card-host');
          if (host && ta.offsetTop != null) {
            const target = ta.offsetTop - host.clientHeight / 2 + ta.offsetHeight / 2;
            host.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
          }
        } catch {}
      }, 300);
    });
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      ta.dataset.edited = '1';
      setDirty(true);
      saveDraft(song.id, ta.value);
      snapshotSet(song.id, { comment: ta.value });
      // Debounce server-side draft push by 800ms so we don't flood the API.
      // Timer is held on `window` so act() can cancel it before the late
      // push fires for an already-committed card — otherwise a stale draft
      // re-appears on the server after the row was supposed to be cleared.
      if (window.__draftTimer) clearTimeout(window.__draftTimer);
      window.__draftTimer = setTimeout(() => apiDraftPush(song.id, ta.value).catch(() => {}), 800);
      if (currentRating > 0 || selectedCategories.size > 0) {
        persistCardDebounced();
      } else {
        showSaveIndicator('saved');
      }
    });
    ta.dataset.edited = '0';
    if (ta.value) {
      setTimeout(() => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }, 0);
    }

    // Swipe gestures: left = skip, right = back
    setupCardSwipe(cardEl);

    // Mount YouTube
    mountYouTube(song);

    // Multi-user comments — show what others have written for this song
    loadOthersComments(song.id);
  }

  function renderOcEntry(e) {
    const cls = e.user_name === 'Юля' ? 'is-yula' : e.user_name === 'Артур' ? 'is-arthur' : '';
    const initial = (e.user_name || '?')[0];

  async function loadOthersComments(songId) {

        <div class="oc-rest">${restEntries.map(renderOcEntry).join('')}</div>

  function setupCardSwipe(el) {
    if (!el) return;
    let startX = 0, startY = 0, startT = 0, tracking = false;
    el.addEventListener('touchstart', (e) => {
      // Ignore swipes that start inside the YouTube iframe or scrollable comment
      if (e.target.closest('iframe') || e.target.closest('textarea') || e.target.closest('button')) { tracking = false; return; }
      const tch = e.touches[0];
      startX = tch.clientX; startY = tch.clientY; startT = Date.now();
      tracking = true;
    }, { passive: true });
    el.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      const tch = (e.changedTouches && e.changedTouches[0]) || null;
      if (!tch) return;
      const dx = tch.clientX - startX;
      const dy = tch.clientY - startY;
      const dt = Date.now() - startT;
      // Horizontal flick: |dx| > 70px, |dy| < 60px, dt < 700ms
      if (dt > 700) return;
      if (Math.abs(dx) < 70) return;
      if (Math.abs(dy) > 60) return;
      if (dx < 0) commitAndAdvance();
      else goBack();
    }, { passive: true });
    // Android Chrome / Samsung Internet can interrupt a touch with a system
    // gesture (pull-to-refresh, back-swipe). Make sure we don't leave the
    // tracker dangling — that would mis-fire the next legitimate touch.
    el.addEventListener('touchcancel', () => { tracking = false; }, { passive: true });
  }
  // Read cardDirty without exposing it globally (it lives inside the renderCard
  // closure). The latest cardDirty is mirrored onto cardEl.dataset for swipe.
  function cardDirtyFlag() {
    return cardEl?.dataset?.dirty === '1';
  }
  // Commit whatever state the user has on the current card and advance to the
  // next. Used by swipe-left and right-arrow-key (no Дальше button anymore).
  // Reads ALL .cat-pill.selected, so a song tagged into multiple categories
  // (e.g. LOVERS + DJ Микки) gets stored with all of them in one shot.
  function commitAndAdvance() {
    if (!cardEl) return;
    const cats = [...cardHost.querySelectorAll('.cat-pill.selected')].map(p => p.dataset.cat).filter(Boolean);
    if (cats.length) act('assign', cats.join(','));
    else if (cardDirtyFlag()) act('skip');
    else advanceWithoutSave();
  }

  function renderEmpty() {

    resetAlbumColor();

      ? (isGuest ? `Пока пусто` : `В разделе «${escapeHtml(inCat)}» пока пусто`)

        <button class="empty-cta" type="button" id="empty-pick" style="background:transparent;color:var(--text);border:1px solid var(--line-2);box-shadow:none">Сменить раздел</button>
        <button class="empty-cta" type="button" id="empty-all" style="background:transparent;color:var(--text-dim);border:1px dashed var(--line-2);box-shadow:none">${escapeHtml(t('empty.all'))}</button>

    document.getElementById('empty-all')?.addEventListener('click', openAll);

  /* ===== Player mount: YouTube primary + Spotify/SoundCloud/Apple fallbacks ===== */
  async function mountYouTube(song) {
    const wrap = document.getElementById('yt-wrap');
    const fb = document.getElementById('player-fallback');
    if (!wrap) return;
    let videoId = song.youtube_id;
    if (!videoId) {
      const r = await apiYouTube(song.id);
      if (currentSong?.id !== song.id) return;
      videoId = r?.youtube_id;
    }
    if (currentSong?.id !== song.id) return;
    wrap.classList.remove('loading');
    if (videoId) {
      mountYTIframe(wrap, videoId);
      extractAlbumColor(`https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`);
    } else {
      wrap.classList.add('error');
      wrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>${escapeHtml(lang === 'ru' ? 'Не нашлось на YouTube' : 'Not on YouTube')}</div>`;
      resetAlbumColor();
    }
    // Discreet retry handle, NOT a banner. Renders as a tiny ↻ refresh icon
    // tucked into the top-right corner of the video frame. Tappable but
    // doesn't compete with the title / artist for attention. The big
    // "Не работает?" text label is gone — most users won't need this,
    // and the visual hierarchy now belongs to the song metadata.
    if (fb) {
      fb.hidden = true; // keep the legacy node empty
      // Drop any old retry icon from a previous mount, then add a fresh one.
      const oldIcon = wrap.querySelector('.yt-retry');
      if (oldIcon) oldIcon.remove();
      const icon = document.createElement('button');
      icon.type = 'button';
      icon.className = 'yt-retry';
      icon.title = t('player.notWorking');
      icon.setAttribute('aria-label', t('player.notWorking'));
      icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>';
      icon.addEventListener('click', (e) => { e.stopPropagation(); tryAnotherVideo(song); });
      wrap.appendChild(icon);
    }
    // Mirror tucked-away pattern for the delete control. Lives in the
    // video's top-LEFT corner, mirrors the retry icon on the right. Owners
    // only; guests have it hidden via body.guest-mode.
    const oldDel = wrap.querySelector('.yt-delete');
    if (oldDel) oldDel.remove();
    if (!document.body.classList.contains('guest-mode')) {
      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'yt-delete';
      del.title = t('card.remove');
      del.setAttribute('aria-label', t('card.remove'));
      del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
      del.addEventListener('click', (e) => { e.stopPropagation(); onRemoveCurrent(); });
      wrap.appendChild(del);
    }
  }
  // Track whether the user has interacted at all this session. iOS Safari and
  // some Android browsers block iframe autoplay until first gesture; sending
  // autoplay=1 then doesn't help and just looks broken. Enable autoplay only
  // once we've seen a real tap.
  let hasUserGesture = false;
  // Once we've seen ONE gesture, the flag stays true; no need to keep listening.
  window.addEventListener('pointerdown', () => { hasUserGesture = true; }, { once: true, capture: true });
  window.addEventListener('touchstart', () => { hasUserGesture = true; }, { once: true, capture: true, passive: true });
  // Track which video IDs we've already tried per song so re-resolve doesn't
  // loop on the same broken video.
  const ytTried = new Map();
  let ytMsgAbort = null;
  let ytWatchdogTimer = null;
  function mountYTIframe(wrap, videoId) {
    const songRef = currentSong;
    if (songRef) {
      if (!ytTried.has(songRef.id)) ytTried.set(songRef.id, new Set());
      ytTried.get(songRef.id).add(videoId);
    }
    const iframe = document.createElement('iframe');
    const ap = hasUserGesture ? '1' : '0';
    // enablejsapi lets us hear postMessage events. We listen for both error
    // signals (onError / errorCode) AND life signals (onReady / onStateChange);
    // the watchdog below uses absence of any life signal to detect a stuck
    // "Повторите попытку позже" error screen that YouTube draws without ever
    // emitting an onError event.
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=${ap}&modestbranding=1&rel=0&iv_load_policy=3&playsinline=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
    iframe.title = 'YouTube плеер';
    iframe.allowFullscreen = true;
    // No iframe.loading='lazy' — iOS Safari can fail to fire load on
    // dynamically-inserted lazy iframes even when visible; the player is the
    // primary intent of the page so we want eager-load.
    wrap.innerHTML = '';
    wrap.appendChild(iframe);
    // Stay in `.loading` (shimmer overlay covers the iframe) until we hear
    // a life signal — then we switch to `.playing` + `.alive` and the iframe
    // fades into view. The user never sees a stuck YT error screen.
    wrap.classList.add('loading');
    wrap.classList.remove('playing', 'alive', 'error');
    wrap.dataset.svc = 'yt';
    // Tear down any prior message listener — without this, every card mount
    // leaks one (success path never removes it). After 50 cards we'd have 50
    // listeners each holding a songRef closure.
    if (ytMsgAbort) ytMsgAbort.abort();
    ytMsgAbort = new AbortController();
    if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
    let ytAlive = false;
    const onMsg = (e) => {
      // Accept by origin first — iOS Safari occasionally hands back a fresh
      // Window proxy whose identity check (===) fails for the first ~50 ms
      // after appendChild, causing legit early life-signals to be dropped.
      // Origin check is reliable across browsers. Our iframe only ever uses
      // youtube.com/embed (never youtube-nocookie), so a single host check.
      const goodOrigin = e.origin === 'https://www.youtube.com';
      if (!goodOrigin && e.source !== iframe.contentWindow) return;
      let d = e.data;
      if (typeof d === 'string') { try { d = JSON.parse(d); } catch { return; } }
      if (!d || typeof d !== 'object') return;
      // Error signals → instant alternate-video attempt. Cover every known
      // shape YouTube uses (onError event, infoDelivery with errorCode field,
      // and any future variant that exposes a numeric errorCode at top level).
      const err = (d.event === 'onError') ||
                  (d.info && typeof d.info.errorCode !== 'undefined') ||
                  (typeof d.errorCode !== 'undefined');
      if (err) {
        ytMsgAbort?.abort();
        if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
        if (!songRef || currentSong?.id !== songRef.id) return;
        tryAnotherVideo(songRef);
        return;
      }
      // Permissive life-signal: ANY structured message from the iframe means
      // YouTube's player JS has loaded (an embed-blocked error page never
      // posts messages). This is more robust than enumerating event names,
      // which vary across YT iframe versions and Safari / Chrome / Edge.
      if (!ytAlive) {
        ytAlive = true;
        if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
        wrap.classList.remove('loading');
        wrap.classList.add('playing', 'alive');
      }
    };
    window.addEventListener('message', onMsg, { signal: ytMsgAbort.signal });
    // Multi-shot "listening" handshake — first delivery sometimes lands
    // before the player has wired up its listener; retry until we've heard
    // back or hit four attempts. Each retry is cheap (1 postMessage call).
    const wakeListening = (delay, tries) => {
      setTimeout(() => {
        // Bail if user moved on — no point waking a player that's not in view.
        if (!songRef || currentSong?.id !== songRef.id) return;
        if (ytAlive) return;
        try { iframe.contentWindow?.postMessage('{"event":"listening"}', '*'); } catch {}
        if (tries > 1) wakeListening(1200, tries - 1);
      }, delay);
    };
    wakeListening(500, 4);
    // Watchdog: if 7s after mount we still haven't heard a single life signal
    // from the iframe, assume the embed silently failed (region-block, embed
    // disabled, "Повторите попытку позже" — none of these emit onError). Try
    // a different video ID instead of leaving the user staring at the error.
    ytWatchdogTimer = setTimeout(() => {
      ytWatchdogTimer = null;
      if (ytAlive) return;
      if (!songRef || currentSong?.id !== songRef.id) return;
      console.warn('YT watchdog: no life signal in 7s for ' + videoId + ', trying alternate');
      ytMsgAbort?.abort();
      tryAnotherVideo(songRef);
    }, 7000);
  }
  // Per-song retry counter — reset whenever renderCard mounts a new song so a
  // fresh track gets a fresh budget. Capped at MAX_YT_ATTEMPTS to avoid infinite
  // spinning if YouTube genuinely has no playable version of this track.
  let ytAttempt = 0;
  const MAX_YT_ATTEMPTS = 6;
  /* Aggressive auto-recovery: when a YouTube embed fails (either via onError
     postMessage, the 7-second watchdog, or a stuck "Повторите попытку позже"
     screen), we immediately:
       1. Tear the failed iframe down so the user never sees the YT error UI.
       2. Show a discreet local loading spinner.
       3. Hit /api/youtube/reresolve for a different ID, excluding everything
          we've already tried for this song.
       4. Mount the new ID and let the same flow catch its failure too.
     We loop up to MAX_YT_ATTEMPTS times before surrendering with a clean
     "Дальше →" CTA. NO fallback to Spotify / SoundCloud / Apple — user wants
     YouTube only. */
  async function tryAnotherVideo(song) {
    const wrap = document.getElementById('yt-wrap');
    if (!wrap || !song || currentSong?.id !== song.id) return;
    // Cut down whatever was on screen (error / black box / stuck spinner) and
    // show our own loading state so the user never sees YouTube's error UI.
    if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
    if (ytMsgAbort) { ytMsgAbort.abort(); ytMsgAbort = null; }
    wrap.innerHTML = '';
    wrap.classList.remove('playing', 'error', 'alive');
    wrap.classList.add('loading');
    wrap.dataset.svc = '';
    // First attempt = silent shimmer ("Loading…"); subsequent attempts
    // surface that we're working on it so the user knows something is happening.
    wrap.dataset.loadingLabel = (ytAttempt > 0) ? (lang === 'ru' ? 'Подбираем рабочее видео…' : 'Finding a working version…') : '';
    if (ytAttempt >= MAX_YT_ATTEMPTS) {
      wrap.classList.remove('loading');
      wrap.classList.add('error');
      wrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>${escapeHtml(lang === 'ru' ? 'Этот трек не нашёлся на YouTube. Можно нажать «Дальше →»' : 'No playable YouTube version. Press Next →')}</div>`;
      return;
    }
    ytAttempt++;
    const triedSet = ytTried.get(song.id) || new Set();
    if (!ytTried.has(song.id)) ytTried.set(song.id, triedSet);
    let j = null;
    try {
      const r = await fetchWithRetry(`${API}/api/youtube/reresolve`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ song_id: song.id, user: userName, exclude: [...triedSet] })
      }, 1, 15000);
      j = await r.json();
    } catch (e) {
      j = null;
    }
    // Bail if the user moved to a different song during the network round-trip.
    if (currentSong?.id !== song.id) return;
    if (j && j.youtube_id && !triedSet.has(j.youtube_id)) {
      song.youtube_id = j.youtube_id;
      mountYTIframe(wrap, j.youtube_id);
    } else {
      // Server has nothing new for us (or returned a stale ID we already
      // tried). Record the stale ID so the next exclude= list grows; then
      // back off briefly before recursing so we don't hammer the API in a
      // sub-second loop until the 6-attempt cap is exhausted.
      if (j && j.youtube_id) triedSet.add(j.youtube_id);
      setTimeout(() => {
        if (currentSong?.id === song.id) tryAnotherVideo(song);
      }, 800);
    }
  }

  /* ===== Actions ===== */
  // Bare 'Дальше' tap (no comment, no category change). Doesn't write to the
  // server — the song stays eligible to appear again later for review.
  async function advanceWithoutSave() {
    if (!currentSong || actInFlight) return;
    actInFlight = true;
    try {
      if (cardEl) {
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'scale(0.97)';
        cardEl.style.transition = 'opacity 0.22s, transform 0.22s';
        await new Promise(r => setTimeout(r, 220));
      }
      await loadNext();
    } finally { actInFlight = false; }
  }

  async function act(action, category, rating) {
    if (!currentSong || actInFlight) return;
    actInFlight = true;
    // Wrap everything in try/finally so any thrown error (localStorage quota,
    // unexpected qDrain failure, render exception) still releases the lock.
    // Without this the whole UI freezes — no swipes, no taps, no recovery.
    try {
      const songRef = currentSong;
      const commentEl = document.getElementById('comment-input');
      const comment = commentEl ? commentEl.value.trim() : '';
      const commentEdited = commentEl ? commentEl.dataset.edited === '1' : false;
      const payload = { song_id: songRef.id, user: userName, action };
      if (category) payload.category = category;
      // Send comment if it was edited (even if now empty — that means "clear");
      // or if it's non-empty (could be pre-fill from server, no harm in re-sending).
      if (commentEdited) payload.comment = comment;
      else if (comment) payload.comment = comment;
      if (rating) payload.rating = rating;
      if (cardEl) {
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'scale(0.97)';
        cardEl.style.transition = 'opacity 0.22s, transform 0.22s';
        await new Promise(r => setTimeout(r, 220));
      }
      const res = await apiAction(payload);
      if (!res.ok) {
        // Payload IS in the local queue and will retry (the badge "Не
        // отправлено: N" shows the user). We still advance to the next card
        // so mom isn't stuck waiting on a network blip.
        diag('act_queued_offline', { song_id: songRef.id, action });
      } else {
        // Cancel any pending debounced draft push for this card — without
        // this, a 700ms-old typed comment would re-create the server draft
        // moments after we just told the server to clear it.
        if (window.__draftTimer) { clearTimeout(window.__draftTimer); window.__draftTimer = null; }
        saveDraft(songRef.id, '');
        snapshotClear(songRef.id);
        apiDraftClear(songRef.id).catch(() => {});
        // Sync the local song object so back-navigation shows the just-saved values.
        if (commentEdited || comment) songRef.my_comment = comment;
        if (category) songRef.my_category = category;
        if (rating) songRef.my_rating = rating;
      }
      if (action === 'assign') {
        const r = rating ? ` · ★${rating}` : '';
        showToast(t('toast.assigned', { cat: t(`cat.${category}.short`) }) + r);
      } else if (action === 'rate') {
        showToast(t('toast.rated', { n: rating }));
      } else if (action === 'skip') {
        // If a comment came along, acknowledge that explicitly
        const hadComment = (payload.comment && payload.comment.trim().length > 0);
        showToast(hadComment ? t('toast.noteSaved') : t('toast.skipped'));
      }
      progressN++;
      await loadNext();
    } finally {
      actInFlight = false;
    }
  }
  async function loadNext() {
    // Only update the counter if we already have a confirmed total (user
    // has advanced at least one card or the server responded once). At
    // first boot progressN is 0 — showing "0" briefly looks like progress
    // got wiped, so we keep the "…" placeholder until /api/library/next
    // confirms the real values below.
    if (progressN > 0 || progressTotal > 0) {
      document.getElementById('progress-n').textContent = fmt(progressN);
    }
    if (seenIdx < seenStack.length - 1) {
      seenIdx++;
      renderCard(seenStack[seenIdx]);
      return;
    }
    let d;
    try { d = await apiNext(); }
    catch (e) {
      showToast(t('toast.offline'));
      cardHost.innerHTML = `
        <div class="empty-state">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v6m0 10v6M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m10 0h6M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg></div>
          <h2>${escapeHtml(lang === 'ru' ? 'Нет связи' : 'No connection')}</h2>
          <p>${escapeHtml(lang === 'ru' ? 'Подожди немного и попробуй снова.' : 'Wait a moment and try again.')}</p>
          <button class="empty-cta" type="button" id="retry-btn">${escapeHtml(lang === 'ru' ? 'Попробовать снова' : 'Try again')}</button>
        </div>
      `;
      document.getElementById('retry-btn').addEventListener('click', loadNext);
      return;
    }
    if (d?.total != null) { progressTotal = d.total; document.getElementById('progress-total').textContent = fmt(progressTotal); }
    if (d?.processed != null) { progressN = d.processed; document.getElementById('progress-n').textContent = fmt(progressN); }
    if (!d || !d.song) { renderEmpty(); return; }
    // Server may have raced — if it returned a song the local replica knows
    // is removed (mom just deleted it but the soft-delete write hasn't yet
    // propagated to this exact next-query), skip and try again. Bounded to
    // 3 retries so we don't loop forever on a genuine state divergence.
    if (localRemoved.has(d.song.id)) {
      if (!loadNext._retries) loadNext._retries = 0;
      if (loadNext._retries < 3) {
        loadNext._retries++;
        return loadNext();
      }
      loadNext._retries = 0;
    } else {
      loadNext._retries = 0;
    }
    seenStack.push(d.song);
    seenIdx = seenStack.length - 1;
    if (seenStack.length > 30) seenStack.splice(0, seenStack.length - 30);
    if (seenStack.length < 30) seenIdx = seenStack.length - 1;
    renderCard(d.song);
  }
  async function goBack() {
    if (seenIdx <= 0) return;
    if (actInFlight) return; // wait for current commit/transition to finish
    if (typeof window.__flushCardSave === 'function') await window.__flushCardSave();
    seenIdx--;
    renderCard(seenStack[seenIdx]);
  }
  async function onRemoveCurrent() {
    if (!currentSong) return;
    const ok = confirm(t('confirm.remove', { t: `${currentSong.artist} — ${currentSong.title}` }));
    if (!ok) return;
    const songRef = currentSong;
    // Mark as removed in the local replica FIRST so even if the server fight
    // is slow / the next-card request races ahead, the song can't reappear
    // on the deck for this session.
    localRemoved.add(songRef.id);
    const r = await apiRemoveSong(songRef.id);
    if (!r.ok) { showToast(t('toast.failed')); return; }
    showToast(t('toast.removed'));
    // Remove from local stack
    const idx = seenStack.findIndex(s => s.id === songRef.id);
    if (idx >= 0) seenStack.splice(idx, 1);
    if (seenIdx >= seenStack.length) seenIdx = seenStack.length - 1;
    await loadNext();
  }

  /* ===== Overlay open/close ===== */
  function openOv(id) {
    // Flush any pending card save before navigating away — never lose state.
    if (typeof window.__flushCardSave === 'function') window.__flushCardSave();
    document.getElementById(id).classList.add('open');
  }
  function closeOv(id) { document.getElementById(id).classList.remove('open'); }
  // iOS Safari lifecycle handling. visibilitychange is the most reliable signal on iOS;
  // pagehide is supplemental for bfcache. On hide we (a) flush pending card state and
  // (b) fire sendBeacon for every queued action — the browser guarantees delivery even
  // after the tab is hidden or terminated.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      if (typeof window.__flushCardSave === 'function') window.__flushCardSave();
      qFlushBeacon();
    } else if (document.visibilityState === 'visible') {
      // Coming back — drain any unsent entries
      qDrain();
      if (currentSong) loadOthersComments(currentSong.id);
    }
  });
  window.addEventListener('pagehide', () => {
    if (typeof window.__flushCardSave === 'function') window.__flushCardSave();
    qFlushBeacon();
  });
  window.addEventListener('online', () => { qDrain(); });

  /* Render the soft-deleted catalogue. Each row has a one-tap "Вернуть"
     button that calls /api/library/restore — server flips removed_at back
     to NULL and the song reappears in the main feed within the next
     periodic-sync cycle (~30s) or immediately if mom reloads. */
  async function openTrash() {
    closeOv('settings-overlay');
    openOv('trash-overlay');
    const body = document.getElementById('trash-body');
    body.innerHTML = '<div class="ov-status">Загружаю…</div>';
    const r = await apiTrashList();
    const songs = r.songs || [];
    document.getElementById('trash-counter').textContent = fmt(songs.length);
    if (!songs.length) {
      body.innerHTML = '<div class="ov-status">Корзина пуста — ни одного удалённого трека.</div>';
      return;
    }
    body.innerHTML = songs.map(s => {
      const when = s.removed_at ? new Date(s.removed_at).toLocaleString('ru-RU', { dateStyle: 'short', timeStyle: 'short' }) : '';
      const who = s.removed_by ? `<span class="trash-row__who">удалил${(s.removed_by === 'Юля') ? 'а' : ''} ${escapeHtml(s.removed_by)}</span>` : '';
      return `
        <div class="trash-row" data-id="${s.id}">
          <div class="trash-row__main">
            <div class="trash-row__title">${escapeHtml(s.title)}</div>
            <div class="trash-row__artist">${escapeHtml(s.artist)}${s.year ? ' · ' + s.year : ''}</div>
            <div class="trash-row__meta">${who}${when ? ' · ' + escapeHtml(when) : ''}</div>
          </div>
          <button type="button" class="trash-row__restore" data-id="${s.id}">Вернуть</button>
        </div>
      `;
    }).join('');
    body.querySelectorAll('.trash-row__restore').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = parseInt(btn.dataset.id, 10);
        btn.disabled = true;
        btn.textContent = 'Возвращаю…';
        const res = await apiRestoreSong(id);
        if (res.ok) {
          showToast('Возвращено в библиотеку');
          // Remove the row from view — song is no longer in trash.
          const row = btn.closest('.trash-row');
          if (row) row.remove();
          const remaining = body.querySelectorAll('.trash-row').length;
          document.getElementById('trash-counter').textContent = fmt(remaining);
          if (remaining === 0) body.innerHTML = '<div class="ov-status">Корзина пуста — ни одного удалённого трека.</div>';
        } else {
          btn.disabled = false;
          btn.textContent = 'Вернуть';
          showToast('Не удалось — попробуй ещё раз');
        }
      });
    });
  }
