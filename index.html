     reveals the full thread (all users' comments + cats + ratings) plus
     a category quick-picker. Swipe left on touch devices → reveal red
     wash with delete action. Hover on desktop → top-right "×" appears with
     spring scale-in. No chevrons, no clunky trash icons. */
  function renderRows(container, items) {
    const isCatpick = container.dataset.role === 'catpick';
    const html = items.map(s => {
      const myCat = s.my_category;
      const otherCat = !myCat && s.assigned_to ? s.assigned_to : null;
      const catChip = myCat
        ? `<span class="tc-chip tc-chip--cat" title="вы отнесли в эту категорию">📌 ${escapeHtml(t(`cat.${myCat}.short`))}</span>`
        : (otherCat ? `<span class="tc-chip tc-chip--cat" title="${escapeHtml(s.assigned_by || '')} отнёс сюда">📌 ${escapeHtml(t(`cat.${otherCat}.short`))} · ${escapeHtml(s.assigned_by || '')}</span>` : '');
      const cmtChip = (s.my_comment && s.my_comment.trim())
        ? `<span class="tc-chip tc-chip--comment" title="у вас есть комментарий">💬 коммент есть</span>`
        : '';
      const ratingChip = s.my_rating ? `<span class="tc-chip tc-chip--rating">★ ${s.my_rating}/10</span>` : '';
      const chipsBlock = (catChip || cmtChip || ratingChip) ? `<div class="tc-chips">${catChip}${cmtChip}${ratingChip}</div>` : '';
      // Pre-fill my own comment in the thread (so a freshly-rendered card
      // shows the user's own comment immediately without waiting for the
      // /api/song/comments fetch). Other users' comments arrive on expand.
      const seedComment = (s.my_comment && s.my_comment.trim())
        ? `<div class="tc-comment"><div class="tc-comment__head"><span class="tc-comment__by">${escapeHtml(userName)}</span>${myCat ? '<span class="tc-comment__cat">→ ' + escapeHtml(t(`cat.${myCat}.short`) || myCat) + '</span>' : ''}${s.my_rating ? '<span class="tc-comment__rating">★ ' + s.my_rating + '/10</span>' : ''}</div><div class="tc-comment__text">«${escapeHtml(s.my_comment.trim())}»</div></div>`
        : '';
      return `
        <div class="tc-card" data-id="${s.id}" data-yt="${escapeHtml(s.youtube_id || '')}">
          <div class="tc-card__delete-layer" aria-hidden="true">
            <span class="lbl">${escapeHtml(lang === 'ru' ? 'удалить' : 'delete')}</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/></svg>
          </div>
          <button class="tc-card__hover-delete" data-act="remove" aria-label="удалить" title="удалить из каталога"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          <div class="tc-card__inner">
            <div class="tc-card__head" data-act="toggle">
              <div class="tc-card__art" id="tc-art-${s.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              </div>
              <div class="tc-card__meta">
                <div class="tc-card__title">${escapeHtml(s.title)}</div>
                <div class="tc-card__artist">${escapeHtml(s.artist)}${s.year ? ' · ' + s.year : ''}</div>
                ${chipsBlock}
              </div>
            </div>
            <div class="tc-card__expand">
              <div class="tc-card__expand-inner">
                <div class="tc-card__expand-content">
                  <div class="tc-thread" data-thread-for="${s.id}">${seedComment || '<div class="tc-thread__loading">…</div>'}</div>
                  <div class="tc-catpicker">
                    <div class="tc-catpicker__label">${escapeHtml(lang === 'ru' ? 'Отнести в категорию' : 'Assign to category')}</div>
                    <div class="tc-catpicker__pills">
                      ${CATEGORIES.map(c => `<button type="button" data-cat="${escapeHtml(c)}" ${myCat === c ? 'class="selected"' : ''}>${escapeHtml(t(`cat.${c}.short`))}</button>`).join('')}
                    </div>
                  </div>
                  <button class="tc-play" data-act="play" type="button">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    ${escapeHtml(lang === 'ru' ? 'Открыть в плеере' : 'Open in player')}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
    container.innerHTML = `<div class="tc-grid">${html}</div>`;
    // First-touch hint to teach mom about swipe-to-delete — only shows once
    // per session via a flag in window. Mobile only.
    if (!window.__tcSwipeHintShown && 'ontouchstart' in window) {
      const hint = document.createElement('div');
      hint.className = 'tc-swipe-hint';
      hint.textContent = lang === 'ru' ? 'Свайп влево по карточке — удалить' : 'Swipe left on a card to delete';
      container.insertBefore(hint, container.firstChild);
      window.__tcSwipeHintShown = true;
      setTimeout(() => { hint.style.opacity = '0'; hint.style.transition = 'opacity 1.5s'; }, 6000);
      setTimeout(() => { hint.remove(); }, 8000);
    }

    container.querySelectorAll('.tc-card').forEach((card, i) => {
      const songId = parseInt(card.dataset.id, 10);
      const inner = card.querySelector('.tc-card__inner');
      const head = card.querySelector('.tc-card__head');
      const thread = card.querySelector('.tc-thread');

      /* Tap on the head area → toggle expand. Loads the full thread the
         first time it opens, then caches. No chevron — the whole card
         responds to the tap, iOS-style. */
      head.addEventListener('click', async e => {
        if (e.target.closest('.tc-card__hover-delete')) return;
        card.classList.toggle('expanded');
        // Clear any partial swipe transform — if the user started dragging
        // and then tapped to expand instead, the leftover translateX on the
        // inner could leave the card visually offset.
        if (inner) { inner.style.transform = ''; card.classList.remove('swipe-armed', 'swiping'); }
        if (card.classList.contains('expanded') && thread.dataset.loaded !== '1') {
          // Keep the user's own seeded comment visible while we fetch others.
          const seedHtml = thread.innerHTML;
          const entries = await apiSongComments(songId);
          const meaningful = (entries || []).filter(e => (e.comment && e.comment.trim()) || e.category || e.rating);
          if (!meaningful.length) {
            thread.innerHTML = seedHtml.includes('tc-comment')
              ? seedHtml // already shows the user's own comment
              : `<div class="tc-thread__empty">${escapeHtml(lang === 'ru' ? 'Пока никто не оставил комментариев.' : 'No comments yet.')}</div>`;
          } else {
            thread.innerHTML = meaningful.map(e => {
              const catLabel = e.category ? '<span class="tc-comment__cat">→ ' + escapeHtml(t(`cat.${e.category}.short`) || e.category) + '</span>' : '';
              const rt = e.rating ? '<span class="tc-comment__rating">★ ' + e.rating + '/10</span>' : '';
              const txt = (e.comment && e.comment.trim()) ? '<div class="tc-comment__text">«' + escapeHtml(e.comment.trim()) + '»</div>' : '';
              return `<div class="tc-comment"><div class="tc-comment__head"><span class="tc-comment__by">${escapeHtml(e.user_name || '?')}</span>${catLabel}${rt}</div>${txt}</div>`;
            }).join('');
          }
          thread.dataset.loaded = '1';
        }
      });

      /* "Open in player" button inside expanded card — closes overlay,
         jumps the user to the song in the main feed. Look up the song by
         the card's data-id (the source of truth in the DOM) rather than
         the closure-captured `items[i]` — if a row is deleted (swipe or
         hover-delete) between render and tap, the index in the array
         points at the wrong song. */
      const playBtn = card.querySelector('[data-act="play"]');
      if (playBtn) playBtn.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
        const liveId = parseInt(card.dataset.id, 10);
        const song = items.find(s => s.id === liveId) || items[i];
        if (song) openSongInPlayer(song);
      });

      /* Category picker inside expanded card — pills, tap to assign. */
      card.querySelectorAll('.tc-catpicker__pills button').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          const cat = btn.dataset.cat;
          // Visual: mark immediately, others un-mark
          card.querySelectorAll('.tc-catpicker__pills button.selected').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          const result = await apiAction({ song_id: songId, user: userName, action: 'assign', category: cat });
          if (result.ok || result.queued) {
            showToast(t('toast.assigned', { cat: t(`cat.${cat}.short`) }));
            // Refresh "my cat" chip on the collapsed head without re-rendering everything
            items[i].my_category = cat;
            const oldChips = card.querySelector('.tc-chips');
            if (oldChips) {
              const hasCat = oldChips.querySelector('.tc-chip--cat');
              const newChipHtml = `<span class="tc-chip tc-chip--cat" title="вы отнесли в эту категорию">📌 ${escapeHtml(t(`cat.${cat}.short`))}</span>`;
              if (hasCat) hasCat.outerHTML = newChipHtml;
              else oldChips.insertAdjacentHTML('afterbegin', newChipHtml);
            }
            // Mark thread as stale so next expand re-fetches with the new tag
            thread.dataset.loaded = '0';
          } else {
            showToast(t('toast.failed'));
          }
        });
      });

      /* Desktop hover-delete button — graceful confirm + fade-slide-out. */
      const hoverDel = card.querySelector('.tc-card__hover-delete');
      if (hoverDel) hoverDel.addEventListener('click', async e => {
        e.stopPropagation();
        const song = items[i];
        const ok = confirm(t('confirm.remove', { t: `${song.artist} — ${song.title}` }));
        if (!ok) return;
        // Mark locally BEFORE the server call — same reason as onRemoveCurrent.
        localRemoved.add(songId);
        const idx = seenStack.findIndex(s => s.id === songId);
        if (idx >= 0) seenStack.splice(idx, 1);
        if (seenIdx >= seenStack.length) seenIdx = seenStack.length - 1;
        const r = await apiRemoveSong(songId);
        if (r.ok) {
          showToast(t('toast.removed'));
          card.classList.add('deleting');
          setTimeout(() => card.remove(), 420);
        } else showToast(t('toast.failed'));
      });

      /* Touch swipe-to-delete (mobile only). Drags .tc-card__inner left,
         reveals the red delete layer behind. Past 35% of card width OR
         the user releases with horizontal velocity, commit deletion with
         a final slide-out + shrink. Below threshold → spring back. */
      let startX = 0, startY = 0, startT = 0, dragX = 0, locked = false, touching = false;
      inner.addEventListener('touchstart', e => {
        if (card.classList.contains('expanded')) return; // don't fight scroll inside expanded thread
        const tch = e.touches[0];
        startX = tch.clientX; startY = tch.clientY; startT = Date.now();
        touching = true; locked = false; dragX = 0;
      }, { passive: true });
      inner.addEventListener('touchmove', e => {
        if (!touching) return;
        const tch = e.touches[0];
        const dx = tch.clientX - startX;
        const dy = tch.clientY - startY;
        if (!locked) {
          // Wait until the user clearly chose horizontal motion before
          // claiming the gesture — otherwise we'd block vertical scroll.
          if (Math.abs(dx) > Math.abs(dy) + 6 && Math.abs(dx) > 14) {
            locked = true;
            card.classList.add('swiping');
          } else if (Math.abs(dy) > Math.abs(dx) + 4) {
            touching = false;
            return;
          }
        }
        if (locked) {
          dragX = Math.min(0, dx); // only allow left drag
          inner.style.transform = `translateX(${dragX}px)`;
          // Visual armed feedback past the threshold
          const w = card.offsetWidth;
          if (Math.abs(dragX) > w * 0.35) card.classList.add('swipe-armed');
          else card.classList.remove('swipe-armed');
        }
      }, { passive: true });
      inner.addEventListener('touchend', async () => {
        if (!touching) return;
        touching = false;
        card.classList.remove('swiping');
        if (!locked) return;
        const w = card.offsetWidth;
        const v = Math.abs(dragX) / Math.max(1, Date.now() - startT); // px/ms
        const past = Math.abs(dragX) > w * 0.35 || v > 0.5;
        if (past) {
          // Commit delete with smooth slide-out
          inner.style.transform = `translateX(-${w}px)`;
          card.classList.add('deleting');
          const song = items[i];
          // Local-replica mark + seenStack cleanup BEFORE server call.
          localRemoved.add(songId);
          const sIdx = seenStack.findIndex(s => s.id === songId);
          if (sIdx >= 0) seenStack.splice(sIdx, 1);
          if (seenIdx >= seenStack.length) seenIdx = seenStack.length - 1;
          const r = await apiRemoveSong(songId);
          if (r.ok) {
            showToast(t('toast.removed'));
            setTimeout(() => card.remove(), 420);
          } else {
            // Revert if server refused
            showToast(t('toast.failed'));
            inner.style.transform = '';
            card.classList.remove('deleting', 'swipe-armed');
          }
        } else {
          // Spring back to rest
          inner.style.transform = '';
          card.classList.remove('swipe-armed');
        }
      }, { passive: true });
      inner.addEventListener('touchcancel', () => {
        touching = false; locked = false;
        inner.style.transform = '';
        card.classList.remove('swiping', 'swipe-armed');
      }, { passive: true });
    });
    container.querySelectorAll('.sr-cats-inner button').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const row = btn.closest('.sr-cats').previousElementSibling;
        const songId = parseInt(row.dataset.id, 10);
        const cat = btn.dataset.cat;
        const result = await apiAction({ song_id: songId, user: userName, action: 'assign', category: cat });
        if (result.ok) {
          showToast(t('toast.assigned', { cat: t(`cat.${cat}.short`) }));
          const txt = row.querySelector('.sr-text');
          let statusEl = txt.querySelector('.sr-status');
          const statusHtml = t('search.assignedAs', { cat: t(`cat.${cat}.short`), by: userName });
          if (statusEl) statusEl.textContent = statusHtml;
          else txt.insertAdjacentHTML('beforeend', `<div class="sr-status">${escapeHtml(statusHtml)}</div>`);
          row.classList.remove('expanded');
        } else { showToast(t('toast.failed')); }
      });
    });
    items.forEach(s => {
      if (s.youtube_id) {
        const el = document.getElementById(`tc-art-${s.id}`);
        if (el) {
          el.style.backgroundImage = `url("https://i.ytimg.com/vi/${s.youtube_id}/mqdefault.jpg")`;
          el.classList.add('has-thumb');
        }
      }
    });
  }
  function toggleRow(row) {
    const wasExpanded = row.classList.contains('expanded');
    const parent = row.parentElement;
    if (parent) parent.querySelectorAll('.sr-row.expanded').forEach(r => r.classList.remove('expanded'));
    if (!wasExpanded) row.classList.add('expanded');
  }

  /* ===== Jump to song in player (from overlay rows) ===== */
  async function openSongInPlayer(song) {
    if (!song) return;
    // Flush any pending state on the PREVIOUS card before navigating to a different song.
    if (typeof window.__flushCardSave === 'function') await window.__flushCardSave();
    seenStack.push(song);
    if (seenStack.length > 30) seenStack.splice(0, seenStack.length - 30);
    seenIdx = seenStack.length - 1;
    renderCard(song);
  }

  /* ===== All-tracks overlay =====
     Sort is fixed alpha (still passed to the API as ORDER BY hint). The two
     active controls are the «С отзывом / Без» segmented tabs (aoCommented) and
     the horizontal genre-filter chip row (aoGenre). Both work orthogonally to
     whatever wedding category (currentCat) the user is currently in. */
  const aoSort = 'alpha';
  let aoCommented = 'yes';
  let aoGenre = null;
  let aoOffset = 0;
  let aoLoading = false;
  let aoDone = false;
  // aoRunId: monotonic generation token. Every filter/tab/genre change bumps
  // it. Each loadAllPage captures the value at dispatch and discards its
  // own response if the id has moved on by then — prevents stale fetches
  // from rendering under the wrong filter and corrupting pagination offsets.
  let aoRunId = 0;
  // Snapshot of d.total for the current generation, used as the «Все» chip
  // count (NOT sum of genre_counts — that excludes NULL-genre tracks).
  let aoAllChipTotal = null;
  const aoResults = document.getElementById('all-results');
  const aoGenresEl = document.getElementById('ao-genres');
  function aoResetForNewFilter() {
    aoOffset = 0;
    aoDone = false;
    // Critical: reset `aoLoading` to false. If a previous filter's fetch is
    // still in flight, we DON'T want it to keep loadAllPage gated out — by
    // bumping aoRunId the stale response will be dropped on arrival anyway,
    // and the new filter's call should proceed immediately. Without this,
    // clicking genre A then B (while A is in flight) would leave the UI on
    // "Загружаю…" forever because B's loadAllPage saw aoLoading=true and
    // early-returned without ever firing its own fetch.
    aoLoading = false;
    aoRunId++;
    aoAllChipTotal = null;
  }
  function openAll() {
    if (isGuestUser()) return;
    openOv('all-overlay');
    aoCommented = 'yes';
    aoGenre = null;
    aoResetForNewFilter();
    aoResults.innerHTML = `<div class="ov-status">…</div>`;
    aoGenresEl.innerHTML = '';
    document.querySelectorAll('.ao-comment-tab').forEach(b => b.classList.toggle('active', b.dataset.commented === aoCommented));
    loadAllPage({ autoFlipIfEmpty: true });
  }
  document.querySelectorAll('.ao-comment-tab').forEach(b => {
    b.addEventListener('click', () => {
      const next = b.dataset.commented;
      if (next === aoCommented) return;
      aoCommented = next;
      aoGenre = null;
      aoResetForNewFilter();
      document.querySelectorAll('.ao-comment-tab').forEach(x => x.classList.toggle('active', x === b));
      aoResults.innerHTML = `<div class="ov-status">Загружаю…</div>`;
      loadAllPage();
    });
  });

  /* Build / refresh the horizontal genre filter row. Called every page-load
     so counts stay in sync with current cat + comment-status. First chip is
     a sticky "Все" reset that uses d.total (not sum of per-genre counts) so
     NULL-genre tracks during partial backfill still show up in «Все». */
  function renderGenreChips(genres, counts, allTotal) {
    if (!Array.isArray(genres) || !genres.length) {
      aoGenresEl.innerHTML = '';
      return;
    }
    const sumOfGenres = Object.values(counts || {}).reduce((a, b) => a + b, 0);
    const allCount = (typeof allTotal === 'number' && allTotal > 0) ? allTotal : sumOfGenres;
    const allChip = `<button type="button" class="genre-chip ${aoGenre === null ? 'active' : ''}" data-genre=""><span class="genre-chip__label">Все</span><span class="genre-chip__count">${fmt(allCount)}</span></button>`;
    const rest = genres.map(g => {
      const n = counts && counts[g] ? counts[g] : 0;
      const cls = 'genre-chip' + (aoGenre === g ? ' active' : '');
      const empty = n === 0 ? ' data-empty="1"' : '';
      return `<button type="button" class="${cls}" data-genre="${escapeHtml(g)}"${empty}><span class="genre-chip__label">${escapeHtml(g)}</span><span class="genre-chip__count">${fmt(n)}</span></button>`;
    }).join('');
    aoGenresEl.innerHTML = allChip + rest;
    aoGenresEl.querySelectorAll('.genre-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const next = btn.dataset.genre || null;
        if (next === aoGenre) return;
        aoGenre = next;
        aoResetForNewFilter();
        aoGenresEl.querySelectorAll('.genre-chip').forEach(x => x.classList.toggle('active', x === btn));
        aoResults.innerHTML = `<div class="ov-status">Загружаю…</div>`;
        loadAllPage();
      });
    });
  }
  aoResults.addEventListener('scroll', () => {
    if (aoLoading || aoDone) return;
    if (aoResults.scrollTop + aoResults.clientHeight > aoResults.scrollHeight - 200) loadAllPage();
  });
  async function loadAllPage(opts) {
    if (aoLoading || aoDone) return;
    const myRun = aoRunId;
    aoLoading = true;
    const d = await apiAllTracks(aoSort, aoOffset, 50, aoCommented, aoGenre);
    // Stale-response gate: a filter / tab / genre change since we started
    // means this response belongs to the OLD filter. Dropping it prevents
    // rows from the previous tab rendering under the new one and keeps
    // aoOffset in sync with the visible data. NOTE: do NOT clear aoLoading
    // when dropping a stale response — a new live fetch may be in flight
    // with aoLoading=true and clearing it here would let the scroll handler
    // spawn a duplicate request mid-load.
    if (myRun !== aoRunId) { return; }
    aoLoading = false;
    if (!d) return;
    document.getElementById('ao-counter').textContent = fmt(d.total);
    // Refresh the two tab count badges if the API reported them.
    if (typeof d.total_commented === 'number') {
      const el = document.getElementById('ao-count-commented');
      if (el) el.textContent = fmt(d.total_commented);
    }
    if (typeof d.total_uncommented === 'number') {
      const el = document.getElementById('ao-count-uncommented');
      if (el) el.textContent = fmt(d.total_uncommented);
    }
    // openAll default-tab safety net: if «С отзывом» is empty inside the
    // current category but «Без» has content, auto-flip to «Без» on the
    // first load. Without this the user lands on an empty-state screen
    // every time they open "Все треки" in a cat they haven't commented in.
    if (opts && opts.autoFlipIfEmpty && aoOffset === 0 && aoGenre === null &&
        aoCommented === 'yes' &&
        d.total_commented === 0 && d.total_uncommented > 0) {
      aoCommented = 'no';
      aoResetForNewFilter();
      document.querySelectorAll('.ao-comment-tab').forEach(x => x.classList.toggle('active', x.dataset.commented === 'no'));
      loadAllPage(); // no autoFlipIfEmpty on the retry — would loop otherwise
      return;
    }
    // Render / refresh the genre chip row on every page-1 load — counts depend
    // on current cat + commented filter. Pass d.total (full filter scope) so
    // the «Все» chip is always consistent with the header counter, even
    // during partial backfill when some tracks have NULL genre.
    if (aoOffset === 0) {
      if (typeof d.total === 'number') aoAllChipTotal = d.total;
      if (Array.isArray(d.genres)) renderGenreChips(d.genres, d.genre_counts || {}, aoAllChipTotal);
    }
    if (aoOffset === 0) { aoResults.innerHTML = ''; }
    if (d.results.length === 0) {
      let empty;
      if (aoGenre) {
        empty = aoCommented === 'yes'
          ? `В жанре «${aoGenre}» пока никто не оставил отзыв`
          : `В жанре «${aoGenre}» все треки уже с отзывом`;
      } else if (aoCommented === 'yes') {
        empty = 'Пока никто не оставил отзыв';
      } else {
        empty = 'Все треки уже с отзывом — больше не осталось';
      }
      if (aoOffset === 0) aoResults.innerHTML = `<div class="ov-status">${escapeHtml(empty)}</div>`;
      aoDone = true;
      return;
    }
    const wrap = document.createElement('div');
    aoResults.appendChild(wrap);
    renderRows(wrap, d.results);
    aoOffset += d.results.length;
    if (aoOffset >= d.total) aoDone = true;
  }

  /* ===== Mine overlay ===== */
  let mineTab = 'picks';
  const mineBody = document.getElementById('mine-body');
  async function openMine() {
    openOv('mine-overlay');
    mineTab = 'picks';
    document.querySelectorAll('.mine-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === mineTab));
    await renderMine();
  }
  document.querySelectorAll('.mine-tab').forEach(b => {
    b.addEventListener('click', () => {
      mineTab = b.dataset.tab;
      document.querySelectorAll('.mine-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === mineTab));
      renderMine();
    });
  });
  async function renderMine() {
    mineBody.innerHTML = `<div class="ov-status">…</div>`;

  function openCommentEditor(triggerEl, songId, items) {
    const it = items.find(x => x.id === songId);
    if (!it) return;
    const wrap = triggerEl.closest('.mine-item');
    if (!wrap || wrap.querySelector('.mine-comment-editor')) return;
    const original = it.comment || '';
    const editor = document.createElement('div');
    editor.className = 'mine-comment-editor';
    editor.innerHTML = `
      <textarea>${escapeHtml(original)}</textarea>
      <div class="mce-actions">
        <div class="mce-left">
          <button type="button" class="mce-save">${escapeHtml(t('mine.commentSave'))}</button>
          <button type="button" class="mce-cancel">${escapeHtml(t('mine.commentCancel'))}</button>
        </div>
        ${original ? `<button type="button" class="mce-delete">${escapeHtml(t('mine.commentDelete'))}</button>` : ''}
      </div>
    `;
    // Hide the original comment / add-button
    triggerEl.style.display = 'none';
    wrap.querySelector('.mi-text').appendChild(editor);
    const ta = editor.querySelector('textarea');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    editor.querySelector('.mce-cancel').addEventListener('click', () => {
      editor.remove();
      triggerEl.style.display = '';
    });
    editor.querySelector('.mce-save').addEventListener('click', async () => {
      const txt = ta.value.trim();
      editor.querySelector('.mce-save').disabled = true;
      const r = await apiAction({ song_id: songId, user: userName, action: 'comment', comment: txt });
      // Queued = transient (will retry via drain). Treat as save for UX —
      // don't re-enable the button or the user will tap again and duplicate.
      // Only dropped (4xx) is a true permanent fail.
      if (r.ok || r.queued) { showToast(t('save.saved')); it.comment = txt; renderMinePicks(); }
      else { showToast(t('toast.failed')); editor.querySelector('.mce-save').disabled = false; }
    });
    const delBtn = editor.querySelector('.mce-delete');
    if (delBtn) delBtn.addEventListener('click', async () => {
      delBtn.disabled = true;
      const r = await apiAction({ song_id: songId, user: userName, action: 'comment', comment: '' });
      if (r.ok || r.queued) { showToast(t('save.saved')); it.comment = ''; renderMinePicks(); }
      else { showToast(t('toast.failed')); delBtn.disabled = false; }
    });
  }

  document.getElementById('switch-user-btn').addEventListener('click', () => {
    const ok = confirm(lang === 'ru' ? `Сменить пользователя? (текущий: ${userName})` : `Switch user? (current: ${userName})`);
    if (!ok) return;
    // Hard reset for the next person on this device:
    //   1. localStorage K_NAME + the mm_user cookie  → identity gone
    //   2. queue items tagged for the OLD user      → they don't drain as the new user
    //   3. K_SNAPSHOTS + in-memory snapshots         → no leftover edits replay under
    //      the new identity (real identity-bleed; the audit caught this hole on top
    //      of the cookie fix)
    //   4. K_DRAFTS + in-memory drafts               → ditto for unsaved comment drafts
    //   5. K_CAT cookie                              → don't pre-select the prior user's cat
    const oldName = userName;
    userName = '';
    try { lsDel(K_NAME); } catch {}
    try { setCookie('mm_user', '', -1); } catch {}
    try { lsDel(K_CAT); } catch {}
    try { setCookie('mm_cat', '', -1); } catch {}
    try {
      const q = qGet().filter(x => x.user !== oldName);
      qSet(q);
    } catch {}
    try { localStorage.removeItem(K_SNAPSHOTS); for (const k of Object.keys(snapshots)) delete snapshots[k]; } catch {}
    try { localStorage.removeItem(K_DRAFTS); for (const k of Object.keys(drafts)) delete drafts[k]; } catch {}
    // Drop the name-gate session cookie too — the next person on this device
    // must type their name again, no auto-resume of the previous identity.
    try { clearNameAuth(); } catch {}
    closeOv('settings-overlay');
    // Reload instead of showing the picker — the name-gate at boot is now
    // the canonical entry, and lazy-rewiring the discovery screen is risky.
    try { location.reload(); } catch { showScreen('ob'); }
  });

  /* Confetti — pure-DOM, no Lottie dependency. Renders 80 coloured particles
     in the wedding palette that fall + spin for ~3 seconds. Triggered on
     successful report submission so mom sees a "well done!" moment. */
  function fireConfetti() {
    const palette = [
      'rgb(var(--c-yulia))', 'rgb(var(--c-lovers))',
      'rgb(var(--c-lounge))', 'rgb(var(--c-cake))',
      'rgb(var(--c-villa))', 'rgb(var(--c-dj))',
      'var(--gold-bright)',
    ];
    const layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);
    const N = 80;
    for (let i = 0; i < N; i++) {
      const p = document.createElement('span');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = palette[i % palette.length];
      p.style.animationDelay = (Math.random() * 0.6).toFixed(2) + 's';
      p.style.animationDuration = (2.4 + Math.random() * 1.6).toFixed(2) + 's';
      p.style.transform = `rotate(${Math.random() * 360}deg)`;
      p.style.width = (5 + Math.random() * 6).toFixed(0) + 'px';
      p.style.height = (8 + Math.random() * 8).toFixed(0) + 'px';
      layer.appendChild(p);
    }
    setTimeout(() => { try { layer.remove(); } catch {} }, 4500);
  }

  /* ===== Add-song overlay ===== */
  let addPreviewTimer = null;
  let addPreviewRunId = 0; // drop stale responses when user keeps typing
  let addPreviewYtId = null; // resolved YouTube id for the current preview (reused on submit)
  let addPreviewExistingId = null; // if preview hit an exact match, its song_id
  let addPreviewSimilarCount = 0; // # fuzzy hits — used to gate submit with a confirm()
  let addParsedArtist = ''; // what the server understood as artist (from split or YouTube title)
  let addParsedTitle = '';  // ditto for title
  const addPreviewCache = new Map(); // key = lowered single-line query
  function openAdd() {
    openOv('add-overlay');
    document.getElementById('add-query').value = '';
    document.getElementById('add-preview').hidden = true;
    addPreviewYtId = null;
    addPreviewExistingId = null;

  document.getElementById('add-query').addEventListener('input', () => {
    if (addPreviewTimer) clearTimeout(addPreviewTimer);
    const q = document.getElementById('add-query').value.trim();
    // Reset preview state on every keystroke so a stale YT id from a previous
    // query never gets bound to a different song on submit.
    addPreviewYtId = null;
    addPreviewExistingId = null;
    addPreviewSimilarCount = 0;
    addParsedArtist = '';
    addParsedTitle = '';
    if (q.length < 3) {
      document.getElementById('add-preview').hidden = true;
      return;
    }
    // 700ms after the user stops typing — long enough not to fire on every
    // character (each call hits YouTube), short enough to feel instant.
    addPreviewTimer = setTimeout(() => previewAdd(q), 700);
  });
  async function previewAdd(q) {
    const prev = document.getElementById('add-preview');
    const thumb = document.getElementById('pv-thumb');
    const status = document.getElementById('pv-status');
    prev.hidden = false;
    prev.classList.remove('is-exact', 'is-found');
    thumb.style.backgroundImage = '';
    thumb.classList.add('empty');
    status.innerHTML = `<div class="pv-hint">${escapeHtml(t('add.searching'))}</div>`;
    const runId = ++addPreviewRunId;
    const cacheKey = q.toLowerCase();
    let data;
    if (addPreviewCache.has(cacheKey)) {
      data = addPreviewCache.get(cacheKey);
    } else {
      try {
        const r = await fetchWithRetry(
          `${API}/api/library/preview?q=${encodeURIComponent(q)}&user=${encodeURIComponent(userName)}`,
          undefined, 1, 20000
        );
        if (!r.ok) { if (runId === addPreviewRunId) { status.innerHTML = `<div class="pv-hint">${escapeHtml(t('add.ytNone'))}</div>`; } return; }
        data = await r.json();
        addPreviewCache.set(cacheKey, data);
      } catch (e) {
        if (runId === addPreviewRunId) status.innerHTML = `<div class="pv-hint">${escapeHtml(t('add.ytNone'))}</div>`;
        return;
      }
    }
    if (runId !== addPreviewRunId) return;
    addPreviewYtId = data.youtube_id || null;
    addPreviewExistingId = data.exact?.id || null;
    addPreviewSimilarCount = (!data.exact && Array.isArray(data.similar)) ? data.similar.length : 0;
    // Server parsed the single-line query into canonical artist/title (either
    // by separator-split or by reading the YouTube result's title). Use those
    // on submit so library_actions stores clean rows.
    addParsedArtist = (data.exact?.artist) || data.artist || '';
    addParsedTitle  = (data.exact?.title)  || data.title  || '';
    if (addPreviewYtId) {
      thumb.style.backgroundImage = `url(https://i.ytimg.com/vi/${addPreviewYtId}/mqdefault.jpg)`;
      thumb.classList.remove('empty');
    }
    let html = '';
    // Show how the server understood the input so the user can see if the
    // parse went wrong (and add a "Artist — Title" separator manually).
    if (addParsedArtist && addParsedTitle) {
      html += `<div class="add-parsed"><span class="ap-label">${escapeHtml(t('add.parsedAs'))}</span><span class="ap-art">${escapeHtml(addParsedArtist)}</span><span class="ap-sep">—</span><span>${escapeHtml(addParsedTitle)}</span></div>`;
    }
    if (data.exact) {
      prev.classList.add('is-exact');
      const aSuffix = (data.exact.added_by === 'Юля' ? 'а' : '');
      html += `<div class="pv-row">${t('add.exactFound', { a: aSuffix, by: escapeHtml(data.exact.added_by || '?') })}</div>`;
      html += `<div class="pv-hint">${escapeHtml(t('add.exactAddOnly'))}</div>`;
    } else if (addPreviewYtId) {
      prev.classList.add('is-found');
      html += `<div class="pv-row">${t('add.ytFound', { id: encodeURIComponent(addPreviewYtId) })}</div>`;
    } else {
      html += `<div class="pv-hint">${escapeHtml(t('add.ytNone'))}</div>`;
    }
    if (!data.exact && Array.isArray(data.similar) && data.similar.length) {
      const items = data.similar.slice(0, 4).map(s => {
        const aSuffix = (s.added_by === 'Юля' ? 'а' : '');
        const by = s.added_by ? `<span class="as-by">${escapeHtml(t('add.byUser', { a: aSuffix, by: s.added_by }))}</span>` : '';
        return `<div class="as-item">${escapeHtml(s.artist)} — ${escapeHtml(s.title)}${by}</div>`;
      }).join('');
      const more = data.similar.length > 4 ? `<div class="pv-hint">${escapeHtml(t('add.similarMore', { n: data.similar.length - 4 }))}</div>` : '';
      html += `<div class="add-similar"><div class="as-head">${escapeHtml(t('add.similarHead'))}</div>${items}${more}</div>`;
    }
    status.innerHTML = html;
  }
  document.getElementById('add-submit').addEventListener('click', async () => {
    const queryStr = document.getElementById('add-query').value.trim();
    // The server's preview either parsed the single-line query into a clean
    // pair OR pulled the canonical pair from the YouTube result's title. We
    // submit those exact values so the library row is stored cleanly even
    // when mom typed something like "abba dancing queen" with no separator.
    let artist = addParsedArtist;
    let title = addParsedTitle;
    if (!artist || !title) {
      // Preview hasn't returned yet (user clicked Add immediately) or the
      // server couldn't split. Try the local same heuristic; otherwise show
      // an inline hint and bail.
      const m = queryStr.match(/^(.+?)\s+[-–—:]\s+(.+)$/);
      if (m) { artist = m[1].trim(); title = m[2].trim(); }
    }
    if (!artist || !title) {
      showToast(t('add.queryHint'));
      return;
    }
    // If the preview surfaced fuzzy-similar tracks but NO exact match, the
    // user might be about to create a duplicate (or a cover/remix that IS a
    // distinct track). Either way, force them to confirm explicitly before
    // we commit a new library row. confirm() is the dumbest, most native UX
    // (mom can't miss it on iOS) — anything fancier risks being swiped past.
    if (addPreviewSimilarCount > 0 && !addPreviewExistingId) {
      const ok = window.confirm(t('add.confirmSimilar'));
      if (!ok) return;
    }
    const btn = document.getElementById('add-submit');
    btn.disabled = true;
    // Fast path: preview already told us the row exists — skip the add POST.
    // Pass through the YT id from preview if we have one so the server
    // doesn't redo the scrape we already did.
    let newSongId;
    let added = false;
    if (addPreviewExistingId) {
      newSongId = addPreviewExistingId;
      added = true;
    } else {
      const r = await apiAddSong(artist, title, addPreviewYtId);
      newSongId = r.song_id;
      added = r.ok || r.error === 'already exists';
      if (!added) { btn.disabled = false; showToast(t('toast.failed')); return; }
    }
    btn.disabled = false;
    if (added) {
      closeOv('add-overlay');
      // Pre-resolve YouTube ID server-side only if we didn't already pass one.
      if (newSongId && !addPreviewYtId) apiYouTube(newSongId).catch(()=>{});
      // Auto-assign to the user's current category so it lands where they
      // were looking. For guests this is always their own cat; for owners on
      // 'общий' (currentCat = '') the song just sits in the catalog.
      if (newSongId && currentCat) {
        const assignRes = await apiAction({ song_id: newSongId, user: userName, action: 'assign', category: currentCat });
        if (assignRes.ok || assignRes.queued) {
          const catLabel = t(`cat.${currentCat}.short`) || currentCat;
          showToast(t('add.addedToCat', { cat: catLabel }));
        } else {
          showToast(t('toast.added'));
        }
      } else {
        showToast(t('toast.added'));
      }
    } else {
      showToast(t('toast.failed'));
    }
  });

  /* ===== Share ===== */
  async function buildShareText() {
    try {
      const r = await fetchWithRetry(`${API}/api/share-text?user=${encodeURIComponent(userName)}`);
      if (!r.ok) return '';
      const d = await r.json();
      return d.text || '';
    } catch (e) { return ''; }
  }
  async function doShare() {
    if (isGuestUser()) return;
    const text = await buildShareText();
    if (!text) { showToast(t('toast.failed')); return; }
    const payload = { title: t('share.title'), text: text, url: 'https://akoev.com/' };
    if (navigator.share) {
      try { await navigator.share(payload); return; }
      catch (e) { if (e?.name === 'AbortError') return; }
    }
    try {
      await navigator.clipboard.writeText(text);
      showToast(t('share.copied'));
    } catch (e) { showToast(t('toast.failed')); }
  }

  /* ===== Periodic background tasks ===== */
  let lastVersionState = null;
  async function periodicSync() {
    if (!userName || !ALLOWED_USERS.has(userName)) return;
    // 0) Drain anything queued, then reconcile with server (catches silent losses)
    await qDrain();
    await reconcileWithServer();
    await qDrain();
    refreshUnsavedBadge();
    // 1) Push any localStorage drafts that haven't been server-saved yet
    for (const sid of Object.keys(drafts)) {
      const text = drafts[sid];
      if (text && text.trim()) {
        apiDraftPush(parseInt(sid, 10), text).catch(() => {});
      }
    }
    // 2) Refresh the current card's others-comments
    if (currentSong) loadOthersComments(currentSong.id);
    // 3) Version + library mutation poll — detect new content
    const v = await apiVersion();
    if (v && lastVersionState) {
      if (v.active_songs !== lastVersionState.active_songs ||
          v.last_added !== lastVersionState.last_added ||
          v.last_removed !== lastVersionState.last_removed) {
        // Library content changed — refresh open overlays
        if (document.getElementById('mine-overlay')?.classList.contains('open')) renderMine();
        if (document.getElementById('all-overlay')?.classList.contains('open')) {
          aoResetForNewFilter();
          document.getElementById('all-results').innerHTML = '<div class="ov-status">…</div>';
          loadAllPage();
        }
      }
    }
    lastVersionState = v;
    // 4) Frontend build-marker check — if the deployed HTML has a different
    // build marker than what we booted with, a new version is live. Soft
    // toast + auto-reload so mom never sees stale UI after we ship a fix.
    checkBuildVersion();
  }

  // Build-marker auto-update — read the build comment from the just-rendered
  // <head>, then periodically fetch the live HTML and compare. When it
  // differs, briefly toast and reload — mom never needs to clear cache to
  // see a new deploy.
  const CLIENT_BUILD = (() => {
    const m = document.documentElement.innerHTML.match(/<!--\s*build:\s*([^\s-][^-]*)\s*-->/);
    return m ? m[1].trim() : null;
  })();
  let reloadScheduled = false;
  async function checkBuildVersion() {
    if (reloadScheduled || !CLIENT_BUILD) return;
    try {
      // Cache-bust at the URL level so we get the freshest HTML through
      // every cache layer (iOS Safari, Cloudflare CDN, anything in between).
      const r = await fetch('/?_v=' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
      if (!r.ok) return;
      const txt = await r.text();
      const m = txt.match(/<!--\s*build:\s*([^\s-][^-]*)\s*-->/);
      const serverBuild = m ? m[1].trim() : null;
      if (serverBuild && serverBuild !== CLIENT_BUILD) {
        reloadScheduled = true;
        try { showToast('Загружаю свежую версию…'); } catch {}
        // Flush any in-flight save before bouncing the page.
        try { qFlushBeacon(); } catch {}
        setTimeout(() => { try { location.reload(); } catch {} }, 1500);
      }
    } catch {}
  }
  // iOS Safari bfcache: when mom backgrounds the tab and returns later,
  // the page snapshot is restored from memory without refetching. This
  // listener fires only on bfcache-restore and forces a fresh load so the
  // mid-deploy stale-page experience can't happen.
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      try { location.reload(); } catch {}
    } else {
      // First-paint check too — covers the case where mom opens a saved
      // home-screen shortcut and the disk-cached HTML is days old.
      checkBuildVersion();
    }
  });
  let syncTimer = null;
  let lastSyncTs = 0;
  async function periodicSyncDebounced() {
    // Don't fire when tab is hidden — saves battery + request budget.
    if (document.visibilityState === 'hidden') return;
    // Debounce — multiple triggers (focus / visibility / online) can fire
    // within milliseconds of each other; ignore anything within 3s of a sync.
    if (Date.now() - lastSyncTs < 3000) return;
    lastSyncTs = Date.now();
    return periodicSync();
  }
  function startSyncLoop() {
    if (syncTimer) return;
    // Poll every 60s (was 30s) — halves the worker request budget.
    syncTimer = setInterval(periodicSyncDebounced, 60000);
    periodicSyncDebounced();
  }

  // Pull server-side drafts on boot. Local draft wins over server draft when
  // both are non-empty — Mom may have typed a fresh note offline that hasn't
  // synced yet, and we don't want a stale server draft (e.g. Артур's earlier
  // edit on desktop) to clobber it on resume. Server fills only the slots
  // where there's no local draft.
  async function bootstrapDrafts() {
    if (!userName || !ALLOWED_USERS.has(userName)) return;
    const serverDrafts = await apiDraftsPull();
    for (const d of serverDrafts) {
      if (d.comment && d.comment.trim()) {
        const local = drafts[d.song_id];
        if (!local || !String(local).trim()) {
          drafts[d.song_id] = d.comment;
        }
      }
    }
    lsSetJSON(K_DRAFTS, drafts);
  }

  // Refresh on tab focus and after long idles
  window.addEventListener('focus', () => {
    if (currentSong) loadOthersComments(currentSong.id);
    if (document.getElementById('mine-overlay')?.classList.contains('open')) renderMine();
  });
  window.addEventListener('online', () => { periodicSyncDebounced(); });

  /* Soft-keyboard offset for both iOS and Android.
       - iOS Safari: window.innerHeight stays full, visualViewport.height
         shrinks → diff is the keyboard height.
       - Android Chrome: window.innerHeight ALSO shrinks → naive diff = 0.
     Fix: capture the original innerHeight ONCE at load (`baseInnerH`) and
     diff against that. Toggles `body.kbd-open` so layout rules can react
     (e.g. collapse the YT video on iPhone SE to keep rating row reachable). */
  const baseInnerH = window.innerHeight;
  function recomputeKbdOffset() {
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const vyOffset = (window.visualViewport && window.visualViewport.offsetTop) || 0;
    const off = Math.max(0, baseInnerH - vh - vyOffset);
    document.documentElement.style.setProperty('--kbd-offset', off + 'px');
    document.body.classList.toggle('kbd-open', off > 80);
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', recomputeKbdOffset);
    window.visualViewport.addEventListener('scroll', recomputeKbdOffset);
  }
  window.addEventListener('resize', recomputeKbdOffset);
  recomputeKbdOffset();

  /* ===== Boot ===== */
  async function bootstrapAndRecover() {
    diag('boot', { ua: navigator.userAgent, queue: qGet().length, snapshots: Object.keys(lsGetJSON(K_SNAPSHOTS, {})).length });
    // 1) Drain any pending action queue from a previous session
    await qDrain();
    // 2) Recover any standalone card snapshots that never made it to a commit
    //    (rating/category set but the tab was closed before send). Each snapshot
    //    is replayed against the server.
    const pendingSnap = lsGetJSON(K_SNAPSHOTS, {});
    const songIds = Object.keys(pendingSnap);
    for (const sid of songIds) {
      const s = pendingSnap[sid];
      if (!s) continue;
      // Skip totally empty snapshots — nothing to recover.
      const hasState = s.rating || s.categories || (s.comment !== undefined && s.comment !== null);
      if (!hasState) { snapshotClear(sid); continue; }
      const cats = (s.categories || '').split(',').filter(Boolean).join(',');
      const sidInt = parseInt(sid, 10);
      // Comment-only snapshot: route to drafts API (the comment belongs in
      // the drafts table, not library_actions). Pushing as action='comment'
      // would 409 from the server. Drop the snapshot — K_DRAFTS still keeps
      // the comment locally for next-card pre-fill.
      if (!cats && !s.rating && s.comment) {
        apiDraftPush(sidInt, s.comment).catch(() => {});
        snapshotClear(sid);
        continue;
      }
      let action;
      if (cats) action = 'assign';
      else if (s.rating) action = 'rate';
      else action = 'skip';
      const payload = { song_id: sidInt, user: userName, action };
      if (cats) payload.category = cats;
      if (s.rating) payload.rating = s.rating;
      // Include comment even if it's an empty string — that signals "user
      // explicitly cleared the note" and the server needs to propagate it.
      if (s.comment !== undefined && s.comment !== null) payload.comment = s.comment;
      qEnqueue(payload);
    }
    await qDrain();
    // 3) Pull server-side comment drafts (in case mom switched devices)
    await bootstrapDrafts();
    // 4) Reconcile with server: anything locally-believed-saved but missing on
    //    server gets re-queued. Catches the case where iOS Safari silently
    //    failed past sends.
    await reconcileWithServer();
    await qDrain();
    refreshUnsavedBadge();
  }
  // Manual retry: tap the badge to force a drain
  const _ub = document.getElementById('unsaved-badge');
  if (_ub) _ub.addEventListener('click', () => { diag('manual_retry', { count: qGet().length }); qDrain().then(refreshUnsavedBadge); });

  applyStaticI18n();

  /* ===== Name-as-password gate =====
     Owners (Юля / Артур) must type their name on each fresh session before
     the main app loads. Guests (Lovers / DJ Микки) on /lovers and /dj
     bypass this entirely. Session is held by a 24-hour rolling cookie —
     survives backgrounding the browser app, expires when the tab is
     genuinely killed or after a day of inactivity. */
  const NAME_AUTH_COOKIE = 'mm_name_authed';
  // Accept both Russian and Latin spellings, any case. Translit variants
  // included so visitors typing on an English keyboard still get in.
  const NAME_VARIANTS_YULIA = ['юля', 'yulia', 'yulya', 'julia', 'julya', 'iulia', 'ulia', 'yuliya'];
  const NAME_VARIANTS_ARTUR = ['артур', 'arthur', 'artur', 'artyr', 'artura'];
  function normalizeNameInput(raw) {
    const t = String(raw || '').trim().toLowerCase().replace(/\s+/g, '');
    if (!t) return null;
    if (NAME_VARIANTS_YULIA.includes(t)) return 'Юля';
    if (NAME_VARIANTS_ARTUR.includes(t)) return 'Артур';
    return null;
  }
  function isNameAuthed() {
    // Cookie presence = authed this session. Cookie is renewed on every
    // successful gate pass, so 24h of activity keeps the session alive
    // without re-prompting; closing the tab eventually drops the cookie
    // (max-age expiry) and the next visit re-prompts.
    return !!getCookie(NAME_AUTH_COOKIE);
  }
  function markNameAuthed() {
    // 24-hour rolling expiry — long enough that backgrounding Safari and
    // returning hours later still skips the gate, but short enough that
    // a phone someone borrowed yesterday re-prompts today.
    setCookie(NAME_AUTH_COOKIE, '1', 1);
  }
  function clearNameAuth() {
    setCookie(NAME_AUTH_COOKIE, '', -1);
  }
  function showNameGate() {
    return new Promise((resolve) => {
      const gate = document.getElementById('name-gate');
      const form = document.getElementById('name-gate-form');
      const input = document.getElementById('name-gate-input');
      const errorEl = document.getElementById('name-gate-error');
      if (!gate || !form || !input) { resolve(null); return; }
      gate.hidden = false;
      // Defer focus so iOS Safari has time to commit the DOM mutation —
      // otherwise the input.focus() can fire before the element is layout-
      // ready and the keyboard doesn't open.
      setTimeout(() => { try { input.focus(); } catch {} }, 80);
      const attempt = (e) => {
        if (e) e.preventDefault();
        const resolved = normalizeNameInput(input.value);
        if (!resolved) {
          errorEl.textContent = 'Не совпало. Попробуй ещё раз.';
          errorEl.hidden = false;
          // Don't wipe the input — let the user correct in place. iOS users
          // would have to retype the whole name otherwise, which is rough.
          input.focus();
          input.select();
          return;
        }
        markNameAuthed();
        userName = resolved;
        try { lsSet(K_NAME, userName); } catch {}
        try { setCookie('mm_user', userName, 90); } catch {}
        // Smooth fade-out of the gate, then resolve the promise so boot
        // continues. 200ms is enough to feel intentional, short enough not
        // to feel laggy.
        gate.style.transition = 'opacity 0.25s ease';
        gate.style.opacity = '0';
        setTimeout(() => { gate.hidden = true; gate.style.opacity = ''; resolve(resolved); }, 260);
      };
      form.addEventListener('submit', attempt);
    });
  }

  // Path-based guest entry: /lovers or /dj. If the visitor isn't an owner
  // (Юля/Артур from prior main-app visit), they post as the group name and
  // are locked to that category. Owners visiting /lovers or /dj keep their
  // identity and just land on that category by default.
  const path = location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase().split('.')[0];
  const guestCat = (path === 'lovers') ? 'LOVERS'
                 : (path === 'dj') ? 'DJ Микки'
                 : null;
  // Hard guest-lock: the _worker.js stamps `mm_guest_lock=LOVERS` (or `DJ`)
  // on every visit to /lovers or /dj. If that cookie is present on this
  // device AND someone tries to visit the owner-facing root, we bounce
  // them straight back to the guest portal. Defense beyond the worker-side
  // 302, which Cloudflare CDN may swallow due to edge caching.
  if (!guestCat) {
    const lockedAs = getCookie('mm_guest_lock');
    if (lockedAs === 'LOVERS') { window.location.replace('/lovers'); return; }
    if (lockedAs === 'DJ') { window.location.replace('/dj'); return; }
  }
  const isOwner = (userName === 'Юля' || userName === 'Артур');
  const isGuest = (userName === 'Lovers' || userName === 'DJ Микки');

  // Show name gate if we're on an owner-facing path AND no fresh session
  // cookie is present. This is the LAST line of defense — guests who
  // bypass the worker-side cookie-lock (e.g. brand-new device, never
  // visited /lovers) still can't get past the gate because they don't
  // know mom's or Артур's name. Gate is async; we await it before any
  // other boot work fires.
  if (!guestCat && !isNameAuthed()) {
    await showNameGate();
    // After gate passes, userName is set; isOwner needs to be re-evaluated.
  }
  // Stale-guest cleanup: a guest user who lands on root (no guestCat path)
  // shouldn't see the owners' cat-picker. Send them back to their own portal,
  // which re-anchors the guest scope and avoids confusing assign failures.
  if (!guestCat && isGuest) {
    const portal = userName === 'Lovers' ? '/lovers' : '/dj';
    window.location.replace(portal);
    return;
  }
  if (guestCat && !isOwner) {
    // Guest mode — auto-identify and lock to the category.
    userName = guestCat === 'LOVERS' ? 'Lovers' : 'DJ Микки';
    lsSet(K_NAME, userName);
    setCookie('mm_user', userName, 90);
    setCat(guestCat);
  }

  // Apply guest-mode body class IMMEDIATELY once we know we're a guest — even
  // before showScreen/renderCard runs. Otherwise there's a single-frame
  // flash where the guest could see owner-only UI (delete button, share fab,
  // category picker) before showScreen('discovery') sets the class.
  if (isGuest) document.body.classList.add('guest-mode');
  if (!userName || !ALLOWED_USERS.has(userName)) {
    showScreen('ob');
  } else {
    updateWhoChip();
    // (Welcome-back banner removed by request — the name-gate at boot already
    // serves as the identity-bleed protection: a different family member who
    // opens the same phone is stopped by the gate and must type their own
    // name. No need for a secondary "Не я · Сменить" prompt.)
    // Guest mode and owners landing on /lovers or /dj skip the picker.
    const goStraightToDiscovery = guestCat || !!currentCat;
    if (guestCat && isOwner) setCat(guestCat);
    bootstrapAndRecover().then(() => goStraightToDiscovery ? enterDiscovery() : showCatPicker());
    startSyncLoop();
  }
})();
</script>
</body>
</html>
