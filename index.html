<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>Музыка к венчанию</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #08080a;
    --bg-1: #0e0e12;
    --surface: rgba(22, 22, 26, 0.7);
    --surface-2: #15151a;
    --surface-3: rgba(255,255,255,0.04);
    --line: rgba(255, 255, 255, 0.06);
    --line-2: rgba(255, 255, 255, 0.12);
    --text: #f4f4f6;
    --text-dim: #9a9aa0;
    --text-muted: #6c6c72;
    --gold: #d4a45c;
    --gold-bright: #ecc380;
    --gold-soft: rgba(212, 164, 92, 0.16);
    --good: #6ad06a;
    --bad: #d96666;
    --pink: #f9a8d4;
    --blue: #93c5fd;
    --green: #7dd3a3;
    --radius-sm: 10px;
    --radius: 14px;
    --radius-lg: 22px;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    min-height: 100vh;
  }
  [hidden] { display: none !important; }

  #ambient {
    position: fixed; inset: 0; z-index: -1;
    pointer-events: none;
    background: var(--bg);
    transition: background 0.9s var(--ease-out);
  }

  button, input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
    border-radius: var(--radius-sm);
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .who-chip, .lang-toggle, .icon-btn, .ob-pick button, .ob-go,
    .listen-btn, .cat-pill, .sheet, .search-overlay, .toast,
    .comment-row textarea, .sm-search input, .sr-row {
      background: rgba(20, 20, 24, 0.94) !important;
    }
  }

  /* ===== Top utility bar ===== */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(12px + env(safe-area-inset-top)) 14px 8px;
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }
  .who-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 12px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
  }
  .who-chip:hover { background: var(--surface-2); }
  .who-chip .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold-bright);
  }
  .who-chip.is-yula .dot { background: var(--pink); }
  .who-chip.is-arthur .dot { background: var(--blue); }
  .who-chip.is-sveta .dot { background: var(--green); }
  .right-controls { display: flex; gap: 8px; align-items: center; }
  .lang-toggle {
    display: flex; gap: 2px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px;
  }
  .lang-toggle button {
    appearance: none; background: transparent; border: 0;
    color: var(--text-muted);
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .lang-toggle button.active { background: var(--gold); color: #0a0a0d; }
  .icon-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: background 0.18s, transform 0.1s;
  }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ===== Onboarding (first time and welcome back share styles) ===== */
  .onboard {
    min-height: 100vh; min-height: 100dvh;
    padding: 40px 22px calc(40px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
  }
  .onboard::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 35%, rgba(212, 164, 92, 0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(212, 164, 92, 0.05) 0%, transparent 60%);
    pointer-events: none; z-index: -1;
  }
  .ob-inner {
    width: 100%; max-width: 420px;
    opacity: 0; transform: translateY(8px);
    animation: obIn 0.6s var(--ease-spring) 0.05s forwards;
  }
  @keyframes obIn { to { opacity: 1; transform: translateY(0); } }
  .ob-hero { text-align: center; margin-bottom: 36px; }
  .ob-hero .mark {
    width: 60px; height: 60px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    box-shadow: 0 16px 40px -10px var(--gold);
    display: flex; align-items: center; justify-content: center;
    color: #0a0a0d;
  }
  .ob-hero .mark svg { width: 28px; height: 28px; }
  .ob-hero h1 {
    margin: 0;
    font-size: 30px; font-weight: 800;
    letter-spacing: -0.025em; line-height: 1.08;
  }
  .ob-hero .sub {
    margin: 10px 0 0;
    color: var(--text-dim);
    font-size: 14px;
  }
  .ob-block { margin-bottom: 18px; }
  .ob-label {
    display: block; font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;
  }
  .ob-pick { display: flex; gap: 8px; flex-wrap: wrap; }
  .ob-pick.col { flex-direction: column; gap: 10px; }
  .ob-pick button {
    flex: 1; min-width: 90px;
    appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 12px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 56px;
    transition: background 0.2s var(--ease), border-color 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  .ob-pick button:active { transform: scale(0.97); }
  .ob-pick.col button {
    flex: none; padding: 18px 22px;
    text-align: left;
    display: flex; align-items: center; gap: 14px;
    font-size: 16px;
  }
  .ob-pick.col button .av {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ob-pick.col button .av .dot { width: 9px; height: 9px; border-radius: 50%; }
  .ob-pick.col button[data-user="Юля"]   .av .dot { background: var(--pink); }
  .ob-pick.col button[data-user="Артур"]  .av .dot { background: var(--blue); }
  .ob-pick.col button[data-user="Света"]  .av .dot { background: var(--green); }
  .ob-pick button.active {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d; border-color: var(--gold);
    box-shadow: 0 12px 32px -10px var(--gold);
  }
  .ob-note {
    margin-top: 14px; padding: 14px 16px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-size: 13px; line-height: 1.55;
    color: var(--text-dim);
  }
  .ob-note strong { color: var(--text); font-weight: 700; }
  .ob-note a { color: var(--gold-bright); text-decoration: underline; text-underline-offset: 2px; font-weight: 600; }
  .ob-go {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    color: #0a0a0d; border: 0;
    border-radius: var(--radius);
    padding: 18px 22px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 26px;
    box-shadow: 0 16px 32px -12px var(--gold);
    transition: transform 0.15s, opacity 0.15s;
  }
  .ob-go:active { transform: scale(0.98); }
  .ob-go:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; background: var(--surface-2); color: var(--text-muted); }

  /* ===== Stage (discovery) ===== */
  .stage {
    min-height: 100vh; min-height: 100dvh;
    padding: calc(64px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
  }
  .progress-line {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px; letter-spacing: 0.12em; font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .progress-line .n { color: var(--text); font-weight: 800; }
  .card {
    max-width: 520px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center;
    will-change: transform, opacity;
  }
  .art-wrap {
    width: min(320px, 80vw); aspect-ratio: 1/1;
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: var(--surface-2);
    box-shadow: 0 30px 80px -24px rgba(0, 0, 0, 0.7), 0 6px 20px -8px rgba(0, 0, 0, 0.5);
  }
  .art-img {
    position: absolute; inset: 0;
    background: var(--surface-2) center/cover no-repeat;
    transition: opacity 0.4s var(--ease-out);
  }
  .art-img.placeholder {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .art-img.placeholder svg { width: 40%; height: 40%; opacity: 0.4; }

  .meta { margin: 26px 6px 0; text-align: center; width: 100%; }
  .meta .title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.022em; line-height: 1.15;
    color: var(--text); word-wrap: break-word;
  }
  .meta .by {
    margin-top: 8px;
    font-size: 14px; color: var(--text-dim);
    font-weight: 500;
  }
  .meta .by .year { color: var(--text-muted); margin-left: 4px; }

  .listen { margin: 22px auto 0; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 360px; }
  .listen-btn {
    appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 13px 22px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 46px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  .listen-btn:hover { background: var(--surface-2); border-color: var(--line-2); }
  .listen-btn:active { transform: scale(0.97); }
  .listen-btn svg { width: 14px; height: 14px; }
  .listen-btn.playing { color: var(--gold-bright); border-color: var(--gold-soft); background: rgba(212,164,92,0.05); }
  .player-slot {
    width: 100%; margin-top: 14px;
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s var(--ease);
  }
  .player-slot.open { max-height: 200px; }
  .player-slot iframe {
    width: 100%; height: 175px; border: 0;
    border-radius: var(--radius);
    background: var(--surface-2);
    box-shadow: 0 16px 32px -16px rgba(0, 0, 0, 0.6);
  }

  .comment-row { margin: 22px auto 0; width: 100%; max-width: 480px; }
  .comment-row textarea {
    width: 100%; min-height: 56px;
    padding: 13px 16px;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px; line-height: 1.45;
    resize: none; overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .comment-row textarea::placeholder { color: var(--text-muted); }
  .comment-row textarea:focus { outline: none; border-color: var(--gold); background: rgba(212,164,92,0.04); }

  .cats { margin: 26px auto 0; width: 100%; max-width: 480px; }
  .cats-label {
    text-align: center; color: var(--text-muted);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .cats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .cat-pill {
    appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 14px; font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s var(--ease-spring);
    display: flex; flex-direction: column; gap: 3px;
  }
  .cat-pill:hover { border-color: var(--gold-soft); background: var(--surface-2); transform: translateY(-1px); }
  .cat-pill:active { transform: scale(0.97); }
  .cat-pill .nm { font-weight: 700; }
  .cat-pill .ctx { font-size: 11px; color: var(--text-muted); font-weight: 500; }

  .skip-row { margin: 22px auto 0; text-align: center; }
  .skip-btn {
    appearance: none; background: transparent; border: 0;
    color: var(--text-dim);
    font-size: 14px; font-weight: 500;
    padding: 12px 20px;
    cursor: pointer;
    transition: color 0.18s;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255, 255, 255, 0.15);
    text-decoration-thickness: 1px;
  }
  .skip-btn:hover { color: var(--text); text-decoration-color: var(--text-dim); }

  .empty-state {
    max-width: 360px; margin: 40px auto 0;
    text-align: center;
    opacity: 0; animation: fadeIn 0.5s var(--ease-out) forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  .empty-state .icon {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-bright);
  }
  .empty-state .icon svg { width: 32px; height: 32px; }
  .empty-state h3 { margin: 0 0 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .empty-state p { margin: 0; color: var(--text-dim); font-size: 14px; line-height: 1.55; }

  /* ===== Sheet (menu) ===== */
  .scrim {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.32s var(--ease-out);
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 201;
    max-height: 86vh; max-height: 86dvh;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: rgba(18, 18, 22, 0.96);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border: 1px solid var(--line);
    border-bottom: 0;
    padding: 12px 18px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(102%);
    transition: transform 0.42s var(--ease);
    box-shadow: 0 -24px 60px -12px rgba(0, 0, 0, 0.6);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grab { width: 36px; height: 4px; margin: 0 auto 14px; background: var(--line-2); border-radius: 999px; }
  .sheet h3 { margin: 0 0 16px; font-size: 16px; font-weight: 700; letter-spacing: -0.01em; text-align: center; }
  .sheet-section { margin-bottom: 22px; }
  .sheet-section h4 {
    margin: 0 0 8px;
    color: var(--gold-bright);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .sheet-section .sub {
    color: var(--text-muted); font-size: 12px;
    margin: -4px 0 8px;
  }
  .sheet-action {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d; border: 0;
    border-radius: var(--radius);
    padding: 14px 22px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; min-height: 50px;
    box-shadow: 0 10px 28px -10px var(--gold);
    transition: transform 0.12s, opacity 0.15s;
  }
  .sheet-action:active { transform: scale(0.98); }
  .sheet-action:disabled { opacity: 0.5; box-shadow: none; cursor: not-allowed; }
  .mine-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface-3);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
  }
  .mine-row .mine-cat {
    font-size: 10px; color: var(--gold-bright);
    font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0; width: 70px;
  }
  .mine-row .mine-text { flex: 1; min-width: 0; font-size: 13px; }
  .mine-row .mine-text .t { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mine-row .mine-text .a { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mine-row .mine-by { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .mine-row .mine-remove {
    appearance: none; background: transparent;
    color: var(--text-muted);
    border: 0; cursor: pointer;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .mine-row .mine-remove:hover { color: var(--bad); background: rgba(217, 102, 102, 0.08); }
  .mine-row .mine-remove svg { width: 14px; height: 14px; }
  .mine-empty { color: var(--text-muted); font-size: 13px; padding: 12px 0; text-align: center; }
  .send-hint { margin-top: 10px; font-size: 11px; color: var(--text-muted); text-align: center; }

  /* ===== Search overlay (full-screen modal) ===== */
  .search-overlay {
    position: fixed; inset: 0; z-index: 250;
    background: rgba(8, 8, 10, 0.96);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.32s var(--ease-out);
    padding-top: env(safe-area-inset-top);
  }
  .search-overlay.open { opacity: 1; pointer-events: auto; }
  .so-header {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--line);
    background: rgba(8, 8, 10, 0.92);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .sm-search { flex: 1; position: relative; }
  .sm-search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .sm-search-icon svg { width: 16px; height: 16px; }
  .sm-search input {
    width: 100%;
    padding: 12px 16px 12px 40px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px; font-weight: 500;
    -webkit-appearance: none; appearance: none;
    transition: background 0.18s, border-color 0.18s;
  }
  .sm-search input:focus { outline: none; border-color: var(--gold); background: rgba(212,164,92,0.04); }
  .sm-search input::placeholder { color: var(--text-muted); }
  .sm-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    appearance: none; background: var(--line-2); color: var(--text);
    border: 0; cursor: pointer;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1;
  }
  .sm-clear:hover { background: var(--text-muted); color: var(--bg); }
  .so-results {
    flex: 1; min-height: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 14px calc(20px + env(safe-area-inset-bottom));
  }

      'allDoneText': "You've been through the whole library. Open the menu to review or send.",
      'placeAtAria': 'Place "{title}" into stage'
    }
  };
  let lang = lsGet(K_LANG, 'ru'); if (!T[lang]) lang = 'ru';
  function t(key, params) {
    const v = T[lang]?.[key] ?? T.ru[key] ?? key;
    if (typeof v !== 'string') return v;

    document.documentElement.lang = lang;

  function lsGet(k, dflt) { try { const v = localStorage.getItem(k); return v == null ? dflt : v; } catch (e) { return dflt; } }

  function fmt(n) { return new Intl.NumberFormat(lang === 'ru' ? 'ru-RU' : 'en-US').format(n); }

      pickedService = b.dataset.service;
      document.querySelectorAll('#ob-service button').forEach(x => x.classList.toggle('active', x === b));

  /* ===== lang toggle ===== */

    document.querySelectorAll('#lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

    try { const r = await fetch(`${API}/api/library/action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); if (!r.ok) return { ok: false }; return await r.json(); }

  async function apiMine() {
    try { const r = await fetch(`${API}/api/library/mine?user=${encodeURIComponent(userName)}`); if (!r.ok) return []; const d = await r.json(); return d.songs || []; }
    catch (e) { return []; }
  }
  async function apiSubmit() {
    try { const r = await fetch(`${API}/api/submit`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: userName, service }) }); if (!r.ok) return { ok: false }; return await r.json(); }
    catch (e) { return { ok: false }; }
  }
  async function apiSearch(q) {
    try { const r = await fetch(`${API}/api/library/search?q=${encodeURIComponent(q)}`); if (!r.ok) return []; const d = await r.json(); return d.results || []; }
    catch (e) { return []; }
  }

  /* ===== iTunes lookup with cache ===== */
  const artCache = new Map();
  async function lookupITunes(artist, title) {
    const key = `${artist}|${title}`.toLowerCase();
    if (artCache.has(key)) return artCache.get(key);
    let result = null;
    for (const c of ['us', 'ru', 'fr']) {
      try {
        const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(`${artist} ${title}`)}&entity=song&limit=1&media=music&country=${c}`);
        if (!r.ok) continue;
        const d = await r.json();
        const hit = d.results?.[0];
        if (hit?.trackViewUrl) {
          result = {
            embedUrl: hit.trackViewUrl.replace(/^https?:\/\/music\.apple\.com\//, 'https://embed.music.apple.com/'),
            artwork600: hit.artworkUrl100 ? hit.artworkUrl100.replace('100x100bb', '600x600bb') : null
          };
          break;
        }
      } catch (e) {}
    }
    artCache.set(key, result);
    return result;
  }

  /* ===== Card render ===== */
  const CATEGORIES = ['Лаунж', 'LOVERS', 'Торт', 'DJ Микки', 'Юля', 'Вилла'];
  const cardHost = document.getElementById('card-host');
  let cardEl = null;

  function renderCard(song) {
    currentSong = song;
    const yearStr = song.year ? `<span class="year">· ${song.year}</span>` : '';
    const catsHTML = CATEGORIES.map(cat => `
      <button class="cat-pill" data-cat="${escapeHtml(cat)}">
        <span class="nm">${escapeHtml(t(`cat.${cat}.short`))}</span>
        <span class="ctx">${escapeHtml(t(`cat.${cat}.ctx`))}</span>
      </button>
    `).join('');
    cardHost.innerHTML = `
      <div class="card" id="card">
        <div class="art-wrap">
          <div class="art-img placeholder" id="art">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
        </div>
        <div class="meta">
          <div class="title">${escapeHtml(song.title)}</div>
          <div class="by">${escapeHtml(song.artist)} ${yearStr}</div>
        </div>
        <div class="listen">
          <button type="button" class="listen-btn" id="listen-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l14 8-14 8z"/></svg>
            <span>${escapeHtml(t('card.listen'))}</span>
          </button>
          <div class="player-slot" id="player-slot"></div>
        </div>
        <div class="comment-row">
          <textarea id="comment-input" placeholder="${escapeHtml(t('card.commentPh'))}" rows="1"></textarea>
        </div>
        <div class="cats">
          <div class="cats-label">${escapeHtml(t('card.placeAt'))}</div>
          <div class="cats-grid">${catsHTML}</div>
        </div>
        <div class="skip-row">
          <button type="button" class="skip-btn" id="skip-btn">${escapeHtml(t('card.skip'))} →</button>
        </div>
      </div>
    `;
    cardEl = document.getElementById('card');
    fAnimate(cardEl, { opacity: [0, 1], y: [16, 0] }, { duration: 0.45, easing: [0.16, 1, 0.3, 1] });

    const listenBtn = document.getElementById('listen-btn');
    const playerSlot = document.getElementById('player-slot');
    let isPlaying = false;
    listenBtn.addEventListener('click', () => {
      if (isPlaying) return;
      isPlaying = true;
      listenBtn.classList.add('playing');
      listenBtn.querySelector('span').textContent = t('card.listenAnother');
      lookupITunes(song.artist, song.title).then(info => {
        if (currentSong?.id !== song.id) return;
        const iframe = document.createElement('iframe');
        if (info?.embedUrl) {
          iframe.src = info.embedUrl;
          iframe.allow = 'autoplay *; encrypted-media *;';
          iframe.setAttribute('sandbox', 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation');
          iframe.loading = 'lazy';
          playerSlot.appendChild(iframe);
        } else {
          playerSlot.innerHTML = '<div style="padding:18px;text-align:center;color:var(--text-muted);font-size:13px">Apple Music: не найдено</div>';
        }
        playerSlot.classList.add('open');
      });
    });
    document.getElementById('skip-btn').addEventListener('click', () => act('skip'));
    cardHost.querySelectorAll('.cat-pill').forEach(b => b.addEventListener('click', () => act('assign', b.dataset.cat)));
    const ta = document.getElementById('comment-input');
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });

    lookupITunes(song.artist, song.title).then(info => {
      if (currentSong?.id !== song.id) return;
      if (info?.artwork600) {
        const art = document.getElementById('art');
        const big = new Image();
        big.onload = () => {
          if (currentSong?.id !== song.id) return;
          art.style.backgroundImage = `url("${info.artwork600}")`;
          art.classList.remove('placeholder');
        };
        big.src = info.artwork600;
      }
    });
  }

  function renderEmpty() {
    currentSong = null;
    cardHost.innerHTML = `
      <div class="empty-state">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <h3>${escapeHtml(t('allDoneTitle'))}</h3>
        <p>${escapeHtml(t('allDoneText'))}</p>
      </div>
    `;
  }

  async function act(action, category) {
    if (!currentSong) return;
    const commentEl = document.getElementById('comment-input');
    const comment = commentEl ? commentEl.value.trim() : '';
    const payload = { song_id: currentSong.id, user: userName, action };
    if (category) payload.category = category;
    if (comment) payload.comment = comment;
    if (cardEl) {
      fAnimate(cardEl, { opacity: [1, 0], y: [0, -14] }, { duration: 0.28, easing: [0.32, 0.72, 0, 1] });
      await new Promise(r => setTimeout(r, 280));
    }
    const res = await apiAction(payload);
    if (!res.ok) {
      showToast(t('toast.failed'));
      await loadNext();
      return;
    }
    if (action === 'assign') showToast(t('toast.assigned', { cat: t(`cat.${category}.short`) }));
    else if (action === 'skip') showToast(t('toast.skipped'));
    progressN++;
    await loadNext();
  }

  async function loadNext() {
    document.getElementById('progress-n').textContent = fmt(progressN);
    const d = await apiNext();
    if (d?.total != null) { progressTotal = d.total; document.getElementById('progress-total').textContent = fmt(progressTotal); }
    if (d?.processed != null) { progressN = d.processed; document.getElementById('progress-n').textContent = fmt(progressN); }
    if (!d || !d.song) { renderEmpty(); return; }
    renderCard(d.song);
  }

  /* ===== Menu sheet ===== */
  const scrim = document.getElementById('scrim');
  const sheet = document.getElementById('sheet');
  document.getElementById('menu-btn').addEventListener('click', openMenu);
  scrim.addEventListener('click', closeMenu);
  function openMenu() { renderMine(); scrim.classList.add('open'); sheet.classList.add('open'); }
  function closeMenu() { scrim.classList.remove('open'); sheet.classList.remove('open'); }

  async function renderMine() {
    const list = document.getElementById('mine-list');
    list.innerHTML = `<div class="mine-empty">…</div>`;
    const songs = await apiMine();
    if (songs.length === 0) {
      list.innerHTML = `<div class="mine-empty">${escapeHtml(lang === 'ru' ? 'пока пусто — отбирай треки из карточек' : 'empty — start picking from cards')}</div>`;
      return;
    }
    list.innerHTML = songs.map(s => `
      <div class="mine-row" data-song-id="${s.id}">
        <div class="mine-cat">${escapeHtml(t(`cat.${s.category}.short`))}</div>
        <div class="mine-text">
          <div class="t">${escapeHtml(s.title)}</div>
          <div class="a">${escapeHtml(s.artist)}</div>
        </div>
        <button type="button" class="mine-remove" data-song-id="${s.id}" aria-label="${escapeHtml(lang === 'ru' ? 'убрать' : 'remove')}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
    list.querySelectorAll('.mine-remove').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.songId);
        const row = btn.closest('.mine-row');
        const title = row?.querySelector('.t')?.textContent || '';
        if (!confirm(t('confirmRemove', { title }))) return;
        const res = await apiAction({ song_id: id, user: userName, action: 'reset' });
        if (res.ok) { row.remove(); showToast(t('toast.removed')); loadNext(); }
        else { showToast(t('toast.failed')); }
      });
    });
  }

  /* ===== Search overlay ===== */
  const searchOv = document.getElementById('search-overlay');
  const smInput = document.getElementById('sm-input');
  const smClear = document.getElementById('sm-clear');
  const soResults = document.getElementById('so-results');
  document.getElementById('search-btn').addEventListener('click', openSearch);
  document.getElementById('search-close').addEventListener('click', closeSearch);
  function openSearch() {
    searchOv.classList.add('open');
    setTimeout(() => smInput.focus(), 200);
  }
  function closeSearch() { searchOv.classList.remove('open'); }

  smClear.addEventListener('click', () => { smInput.value = ''; smInput.focus(); onSearchInput(); });
  let searchTimer = null, searchRunId = 0;
  smInput.addEventListener('input', onSearchInput);
  function onSearchInput() {
    const q = smInput.value;
    smClear.hidden = !q;
    clearTimeout(searchTimer);
    if (!q.trim()) {
      soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.intro'))}</div>`;
      return;
    }
    if (q.trim().length < 2) {
      soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.minChars'))}</div>`;
      return;
    }
    soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.typing'))}</div>`;
    const myRun = ++searchRunId;
    searchTimer = setTimeout(async () => {
      const results = await apiSearch(q.trim());
      if (myRun !== searchRunId) return;
      if (results.length === 0) {
        soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.empty'))}</div>`;
        return;
      }
      soResults.innerHTML = `
        <div class="so-section">
          <h5>${escapeHtml(t('search.libraryHeader'))} · ${results.length}</h5>
          <div id="sr-list"></div>
        </div>
      `;
      const list = document.getElementById('sr-list');
      list.innerHTML = results.map(s => {
        const status = s.assigned_to ? `<div class="sr-status">${escapeHtml(t('search.assignedAs', { cat: t(`cat.${s.assigned_to}.short`), by: escapeHtml(s.assigned_by || '') }))}</div>` : '';
        return `
          <div class="sr-row" data-song-id="${s.id}">
            <div class="sr-art" id="sr-art-${s.id}">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </div>
            <div class="sr-text">
              <div class="sr-title">${escapeHtml(s.title)}</div>
              <div class="sr-artist">${escapeHtml(s.artist)}${s.year ? ` · ${s.year}` : ''}</div>
              ${status}
            </div>
            <button type="button" class="sr-add" aria-label="${escapeHtml(t('placeAtAria', { title: s.title }))}">+</button>
          </div>
          <div class="sr-cats" data-for="${s.id}">
            <div class="sr-cats-inner">
              ${CATEGORIES.map(cat => `<button type="button" data-cat="${escapeHtml(cat)}" data-song-id="${s.id}">${escapeHtml(t(`cat.${cat}.short`))}</button>`).join('')}
            </div>
          </div>
        `;
      }).join('');
      // Wire row toggling and category buttons
      list.querySelectorAll('.sr-row').forEach(row => {
        row.addEventListener('click', (e) => {
          if (e.target.closest('.sr-add') || e.target.closest('.sr-cats')) return;
          // Already handled by .sr-add specifically
          toggleSearchRow(row);
        });
        row.querySelector('.sr-add').addEventListener('click', (e) => {
          e.stopPropagation();
          toggleSearchRow(row);
        });
      });
      list.querySelectorAll('.sr-cats button').forEach(b => {
        b.addEventListener('click', async (e) => {
          e.stopPropagation();
          const songId = Number(b.dataset.songId);
          const cat = b.dataset.cat;
          const result = await apiAction({ song_id: songId, user: userName, action: 'assign', category: cat });
          if (result.ok) {
            showToast(t('toast.assigned', { cat: t(`cat.${cat}.short`) }));
            // collapse the row + update status
            const row = list.querySelector(`.sr-row[data-song-id="${songId}"]`);
            if (row) row.classList.remove('expanded');
            const s = results.find(r => r.id === songId);
            if (s) {
              s.assigned_to = cat;
              s.assigned_by = userName;
              const statusEl = row.querySelector('.sr-status');
              const html = t('search.assignedAs', { cat: t(`cat.${cat}.short`), by: userName });
              if (statusEl) statusEl.innerHTML = escapeHtml(html);
              else row.querySelector('.sr-text').insertAdjacentHTML('beforeend', `<div class="sr-status">${escapeHtml(html)}</div>`);
            }
          } else { showToast(t('toast.failed')); }
        });
      });
      // Resolve artwork for visible rows (debounced)
      results.forEach(s => {
        lookupITunes(s.artist, s.title).then(info => {
          const el = document.getElementById(`sr-art-${s.id}`);
          if (el && info?.artwork600) {
            const big = new Image();
            big.onload = () => {
              el.style.backgroundImage = `url("${info.artwork600}")`;
              el.innerHTML = '';
            };
            big.src = info.artwork600;
          }
        });
      });
    }, 280);
  }
  function toggleSearchRow(row) {
    const wasExpanded = row.classList.contains('expanded');
    document.querySelectorAll('.sr-row.expanded').forEach(r => r.classList.remove('expanded'));
    if (!wasExpanded) row.classList.add('expanded');
  }
  // Close search with ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && searchOv.classList.contains('open')) closeSearch();
  });

  /* ===== Send report ===== */
  const sendBtn = document.getElementById('send-report');
  const sendStatus = document.getElementById('send-status');
  sendBtn.addEventListener('click', async () => {
    if (!confirm(t('confirmSend'))) return;
    sendBtn.disabled = true;
    const orig = t('menu.sendBtn');
    sendBtn.textContent = t('sending');
    const res = await apiSubmit();
    sendBtn.disabled = false;
    sendBtn.textContent = orig;
    if (res?.ok) {
      sendStatus.textContent = t('sendStatus', { n: res.submit_count || 1 });
      showToast(res.emailed ? t('toast.sent') : t('toast.savedPending'));
      closeMenu();
    } else { showToast(t('toast.failed')); }
  });

  /* ===== Toast ===== */
  const toastEl = document.getElementById('toast');
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  /* ===== Boot ===== */
  applyStaticI18n();
  updateLangUI();
  if (!service) {
    showFirst();
  } else if (!userName) {
    showWho();
  } else {
    showDiscovery();
  }
})();
</script>
</body>
</html>
