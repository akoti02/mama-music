  .add-target {
    padding: 10px 14px;
    background: rgba(212, 164, 92, 0.08);
    border: 1px solid rgba(212, 164, 92, 0.22);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  .add-target strong { color: var(--gold-bright); font-weight: 700; }
  .add-hint {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .add-parsed {
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .add-parsed .ap-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; margin-right: 6px; }
  .add-parsed .ap-art { color: var(--gold-bright); font-weight: 700; }
  .add-parsed .ap-sep { color: var(--text-muted); margin: 0 6px; }
  .add-field label {
    display: block;
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.18em; font-weight: 700;
    margin-bottom: 8px;
  }
  .add-field input {
    width: 100%; padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 22px; font-weight: 400;
    letter-spacing: -0.015em;
    -webkit-appearance: none; appearance: none;
    transition: border-color 0.18s, background 0.18s;
    min-height: 56px;
  }
  .add-field input:focus { outline: none; border-color: var(--gold); background: rgba(212,164,92,0.04); }
  .add-field input::placeholder { color: var(--text-muted); font-style: italic; }
  .add-preview {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    color: var(--text-dim);
    font-size: 13px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .add-preview.is-exact { border-color: rgba(231, 102, 102, 0.45); background: rgba(231, 102, 102, 0.06); }
  .add-preview.is-found { border-color: rgba(212, 164, 92, 0.4); }
  .add-preview .pv-thumb {
    width: 100%; aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000 center/cover no-repeat;
  }
  .add-preview .pv-thumb.empty { display: none; }
  .add-preview .pv-row { color: var(--text); font-weight: 600; }
  .add-preview .pv-hint { color: var(--text-muted); font-size: 12px; }
  .add-preview .pv-link { display: inline-block; color: var(--gold-bright); text-decoration: underline; font-size: 12px; }
  .add-similar { display: flex; flex-direction: column; gap: 6px; }
  .add-similar .as-head { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; }
  .add-similar .as-item { padding: 8px 10px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); border-radius: 8px; font-size: 13px; }

<script>
(function() {
  'use strict';
  /* ===== Constants ===== */
  const API = 'https://api.akoev.com';
  const K_NAME = 'venchanie_user_name_v2';   // localStorage now (was sessionStorage)
  const K_LANG = 'venchanie_lang_v1';
  const K_DRAFTS = 'venchanie_drafts_v1';
  // State-version handshake: bump STATE_VERSION whenever a dev change leaves
  // existing phones with stale "stale-replay" data that could push junk
  // actions to the server. SURGICAL: only wipes card snapshots (server is
  // source of truth, can be re-fetched). The pending action queue is NOT
  // wiped — it gets a best-effort sendBeacon flush right here so any items
  // queued from before the deploy still get delivered, then drained on the
  // next boot pass as well. NEVER touches identity (K_NAME), category
  // preference (K_CAT), language (K_LANG), or drafts (K_DRAFTS).
  const STATE_VERSION = '2026-05-12-fresh-start';
  try {
    const cur = localStorage.getItem('venchanie_state_version');
    if (cur !== STATE_VERSION) {
      // First, fire-and-forget every queued action via sendBeacon so we
      // don't lose user actions to a structural-version mismatch. Worst
      // case: the server payload shape changed and the beacon 400s — fine,
      // the row never existed. Best case: every pending action lands.
      try {
        const Q = JSON.parse(localStorage.getItem('venchanie_pending_actions_v1') || '[]');
        if (Array.isArray(Q) && Q.length && typeof navigator !== 'undefined' && navigator.sendBeacon) {
          for (const item of Q) {
            try {
              const { _id, _t, _attempts, ...payload } = item;
              const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
              navigator.sendBeacon('https://api.akoev.com/api/library/action', blob);
            } catch {}
          }
        }
      } catch {}
      // Snapshots are regenerable from server `my_*` fields on next load,
      // so wiping them on version-bump is safe.
      try { localStorage.removeItem('venchanie_card_snapshots_v1'); } catch {}
      localStorage.setItem('venchanie_state_version', STATE_VERSION);
    }
  } catch {}
  // Cookie-backed identity backup. Safari can purge localStorage under
  // memory pressure or private mode while keeping cookies. We mirror K_NAME
  // and K_CAT into cookies (90-day life) so a soft localStorage loss doesn't
  // log the user out. Read at boot AFTER the version handshake.
  function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^|; )' + name + '=([^;]*)'));
    return m ? decodeURIComponent(m[2]) : '';
  }
  function setCookie(name, value, days) {
    const exp = new Date(Date.now() + days * 24 * 3600 * 1000).toUTCString();
    document.cookie = name + '=' + encodeURIComponent(value || '') + '; expires=' + exp + '; path=/; SameSite=Lax; Secure';
  }
  try {

  /* ===== Album-color extraction ===== */
  let colorThief = null;
  const colorCache = new Map();
  const tintEl = document.getElementById('album-tint');
  const defaultArt = [212, 164, 92];

  function getColorThief() {
    if (colorThief) return colorThief;
    if (typeof ColorThief !== 'undefined') { colorThief = new ColorThief(); return colorThief; }
    return null;
  }
  function refineColor(rgb) {
    let [r, g, b] = rgb;
    const lum = 0.299*r + 0.587*g + 0.114*b;
    if (lum < 70) {
      const lift = (70 - lum) / 70 * 0.55;
      r = Math.round(r + (255 - r) * lift);
      g = Math.round(g + (255 - g) * lift);
      b = Math.round(b + (255 - b) * lift);
    }
    if (r > 235 && g > 235 && b > 235) return [220, 180, 110];
    return [r, g, b];
  }
  function applyAlbumColor(rgb) {
    const [r, g, b] = refineColor(rgb);
    const root = document.documentElement;
    root.style.setProperty('--art-r', r);
    root.style.setProperty('--art-g', g);
    root.style.setProperty('--art-b', b);
    if (tintEl) tintEl.classList.add('on');
  }
  function resetAlbumColor() {
    const [r, g, b] = defaultArt;
    const root = document.documentElement;
    root.style.setProperty('--art-r', r);
    root.style.setProperty('--art-g', g);
    root.style.setProperty('--art-b', b);
    if (tintEl) tintEl.classList.remove('on');
  }
  function extractAlbumColor(imgUrl) {
    const ct = getColorThief();
    if (!ct || !imgUrl) { resetAlbumColor(); return; }
    if (colorCache.has(imgUrl)) { applyAlbumColor(colorCache.get(imgUrl)); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const rgb = ct.getColor(img, 10);
        if (rgb) { colorCache.set(imgUrl, rgb); applyAlbumColor(rgb); }
        else resetAlbumColor();
      } catch (e) { console.warn('colorThief', e?.message); resetAlbumColor(); }
    };
    img.onerror = () => { resetAlbumColor(); };
    img.src = imgUrl;
  }

  /* ===== fetch with retry + timeout =====
     20s timeout (was 6s) — iPhone on weak cellular can take that long to
     complete an HTTPS POST after waking from background. 3 retries with
     exponential backoff. */
  async function fetchWithRetry(url, opts, retries = 3, timeoutMs = 20000) {
    let lastErr = null;
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const ctrl = new AbortController();
        const tm = setTimeout(() => ctrl.abort(), timeoutMs);
        const r = await fetch(url, Object.assign({}, opts || {}, { signal: ctrl.signal, cache: 'no-store' }));
        clearTimeout(tm);
        return r;
      } catch (e) {
        lastErr = e;
        if (attempt < retries) await new Promise(r => setTimeout(r, 400 * Math.pow(2, attempt)));
      }
    }
    throw lastErr || new Error('fetch failed');
  }

        const blob = new Blob([body], { type: 'text/plain' });
        navigator.sendBeacon(`${API}/api/diag`, blob);
      } else {
        fetch(`${API}/api/diag`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body, keepalive: true }).catch(()=>{});

  // Pipe uncaught errors to diag — otherwise silent failures (iPhone save
  // glitches, weird mobile-browser exceptions, async chain rejections) are
  // invisible. Truncate fields so a runaway stack trace doesn't blow out the
  // 2000-char comment cap or the row budget. dedupe so a hot loop doesn't
  // spam the server.
  let _lastErrSig = '';
  let _lastErrAt = 0;
  function reportClientError(kind, info) {
    const sig = kind + '|' + (info?.message || '') + '|' + (info?.source || '');
    const now = Date.now();
    if (sig === _lastErrSig && now - _lastErrAt < 5000) return;
    _lastErrSig = sig; _lastErrAt = now;
    diag(kind, {
      message: String(info?.message || '').slice(0, 500),
      source: String(info?.source || '').slice(0, 200),
      line: info?.line || null,
      col: info?.col || null,
      stack: String(info?.stack || '').slice(0, 1500)
    });
  }
  window.addEventListener('error', e => {
    reportClientError('window_error', {
      message: e.message, source: e.filename, line: e.lineno, col: e.colno,
      stack: e.error?.stack
    });
  });
  window.addEventListener('unhandledrejection', e => {
    const r = e.reason;
    reportClientError('unhandled_rejection', {
      message: (r && r.message) || String(r || 'unknown'),
      stack: r?.stack
    });

  /* ===== Bulletproof action queue =====
     Every state change is first written to a localStorage queue, then sent
     to the server. If the network fails (or iOS Safari aborts the fetch
     mid-flight when the tab is backgrounded), the entry stays in the queue
     and is drained on next boot, 'online' event, or visibilitychange-visible.
     On visibilitychange-hidden we ALSO fire-and-forget every pending entry
     via navigator.sendBeacon — the browser guarantees delivery even after
     the tab is hidden / closed. */
  const Q_KEY = 'venchanie_pending_actions_v1';
  function qGet() {
    // Guard against a corrupt queue blob taking out the entire boot — a
    // partial JSON write (rare iOS Safari hard-crash mid-setItem) would
    // make lsGetJSON throw inside a try/catch and return the default `[]`.
    // We additionally validate that what came back is an array of objects;
    // any garbage shape gets discarded with a diag entry instead of crashing.
    const raw = lsGetJSON(Q_KEY, []);
    if (!Array.isArray(raw)) { try { diag('queue_corrupt_reset', {}); } catch {} return []; }
    return raw.filter(x => x && typeof x === 'object' && typeof x.song_id === 'number');
  }
  function qSet(arr) { lsSetJSON(Q_KEY, arr); }
  // Raised from 500 → 5000 so a long offline session (e.g. mom flies to France
  // with no signal for hours) can hold every single action she made on the way.
  // 5000 × ~200 bytes = ~1 MB, well under the ~5 MB iOS localStorage cap.
  const Q_CAP = 5000;
  function qEnqueue(payload) {
    const q = qGet();
    // Idempotency: collapse consecutive entries that target the same logical
    // state for the same (song_id, user). The key includes `clear` shape AND
    // whether a comment is present — without those, a "clear rating" payload
    // would silently collapse with a fresh "rate 7", and a comment-only
    // update would collapse with a category assign of the same song.
    const buildKey = (p) => {
      const hasComment = p && p.comment != null && String(p.comment).trim() !== '';
      const clearStr = Array.isArray(p?.clear) ? p.clear.slice().sort().join(',') : '';
      return `${p.song_id}|${p.user}|${p.action}|${p.category||''}|c=${hasComment?1:0}|clr=${clearStr}`;
    };
    const key = buildKey(payload);
    const idx = q.findIndex(x => buildKey(x) === key);
    const item = Object.assign({}, payload, { _id: Date.now() + '-' + Math.random().toString(36).slice(2, 8), _t: Date.now() });
    if (idx >= 0) q[idx] = item;
    else if (q.length < Q_CAP) q.push(item);
    else {
      // Cap reached — drop oldest entry (FIFO) so new writes still land.
      diag('queue_cap_drop_oldest', { dropped: q[0]?.song_id, action: q[0]?.action });
      q.shift();
      q.push(item);
    }
    qSet(q);
    return item._id;
  }
  function qRemove(itemId) {
    const q = qGet().filter(x => x._id !== itemId);
    qSet(q);
  }
  let draining = false;
  // Per-item outcome tracking: after qDrain finishes, apiAction reads from
  // this map to tell whether its specific enqueued item was accepted by the
  // server (ok) or dropped on a 4xx (failed). Without this, dropping a 409
  // for "comment without prior action" looked like success to the caller.
  const drainOutcomes = new Map();
  function recordOutcome(id, outcome) {
    drainOutcomes.set(id, outcome);
    // Cap the map so it doesn't grow forever — outcomes are only consumed
    // within the immediate apiAction call that enqueued the item.
    if (drainOutcomes.size > 200) {
      const firstKey = drainOutcomes.keys().next().value;
      drainOutcomes.delete(firstKey);
    }
  }
  async function qDrain() {
    if (draining) return;
    draining = true;
    try {
      let q = qGet();
      while (q.length > 0) {
        const item = q[0];
        const { _id, _t, _attempts, ...payload } = item;
        let r = null;
        let networkErr = null;
        try {
          r = await fetchWithRetry(`${API}/api/library/action`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }, 3, 20000);
        } catch (e) {
          networkErr = e;
        }
        if (networkErr) {
          // Network failure — keep item in queue, retry later. Bump attempts.
          const cur = qGet();
          const idx = cur.findIndex(x => x._id === _id);
          if (idx >= 0) { cur[idx]._attempts = (cur[idx]._attempts || 0) + 1; qSet(cur); }
          diag('drain_network_err', { song_id: payload.song_id, action: payload.action, attempts: (_attempts || 0) + 1, err: String(networkErr?.message || networkErr) });
          break;
        }
        if (r.ok) {
          recordOutcome(_id, 'ok');
          qRemove(_id);
          q = qGet();
          continue;
        }
        // Non-2xx response. 4xx = mostly terminal (won't succeed on retry) → drop.
        // EXCEPT 408 Request Timeout and 429 Too Many Requests, which are
        // transient and should be retried. 5xx = always retry.
        const status = r.status;
        let bodyText = '';
        try { bodyText = await r.text(); } catch {}
        if (status === 408 || status === 429) {
          const cur = qGet();
          const idx = cur.findIndex(x => x._id === _id);
          if (idx >= 0) { cur[idx]._attempts = (cur[idx]._attempts || 0) + 1; qSet(cur); }
          diag('drain_transient_keep', { song_id: payload.song_id, action: payload.action, status });
          break;
        }
        if (status >= 400 && status < 500) {
          diag('drain_4xx_drop', { song_id: payload.song_id, action: payload.action, status, body: bodyText.slice(0, 300) });
          recordOutcome(_id, 'failed');
          qRemove(_id);
          q = qGet();
        } else {
          // 5xx — keep, retry later
          const cur = qGet();
          const idx = cur.findIndex(x => x._id === _id);
          if (idx >= 0) { cur[idx]._attempts = (cur[idx]._attempts || 0) + 1; qSet(cur); }
          diag('drain_5xx_keep', { song_id: payload.song_id, action: payload.action, status, body: bodyText.slice(0, 300), attempts: (_attempts || 0) + 1 });
          break;
        }
      }
    } finally {
      draining = false;
      refreshUnsavedBadge();
    }
  }
  function qFlushBeacon() {
    // Fire-and-forget every queued item via navigator.sendBeacon.
    // Use a Blob with text/plain so the browser does NOT require a CORS preflight
    // (the Worker still parses the body as JSON via req.json()).
    const q = qGet();
    if (!q.length || !navigator.sendBeacon) return;
    for (const item of q) {
      const { _id, _t, ...payload } = item;
      try {
        const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain' });
        navigator.sendBeacon(`${API}/api/library/action`, blob);
      } catch (e) { /* fire-and-forget */ }
    }
    // Don't clear queue — drain on next boot will confirm via fetch and remove.
  }

  async function apiAction(payload) {
    // 1) ALWAYS enqueue first — this is the durable write.
    const itemId = qEnqueue(payload);
    // 2) Try to drain immediately. We DO NOT touch the unsaved-badge here:
    //    during a normal save the item lives in the queue for ~200ms while
    //    we POST to the server, and surfacing a red "Не отправлено" badge
    //    for that window makes successful saves look like errors.
    //    qDrain's finally block calls refreshUnsavedBadge — that's the only
    //    place where the badge state reflects the true post-drain queue.
    await qDrain();
    // Read this item's drain outcome:
    //   'ok'     — server accepted (2xx)
    //   'failed' — server rejected with 4xx (e.g. 403 guest-category-mismatch,
    //              409 comment-without-prior-action) → drained but NOT saved
    //   undefined — still in queue (network failure / 5xx / transient) →
    //              will retry, treat as not-yet-ok so callers don't celebrate
    const outcome = drainOutcomes.get(itemId);
    drainOutcomes.delete(itemId);
    if (outcome === 'failed') return { ok: false, dropped: true };
    if (outcome === 'ok') return { ok: true };
    // Still in queue — transient, will retry later. Caller should treat as
    // not-confirmed-yet (queue badge already shows the unsaved count).
    return { ok: false, queued: true };
  }
  /* ===== Reconciliation =====
     Periodically (and on boot/visibility-visible) pull what the server thinks
     it has saved for this user, and compare against our local snapshots. If a
     local snapshot has rating/category/comment that the server is MISSING,
     re-queue the action. Belt-and-suspenders against silent save failures. */
  async function reconcileWithServer() {
    if (!userName || !ALLOWED_USERS.has(userName)) return;
    let serverState;
    try {
      const r = await fetchWithRetry(`${API}/api/state?user=${encodeURIComponent(userName)}`, {}, 2, 20000);
      if (!r.ok) { diag('recon_fetch_bad', { status: r.status }); return; }
      serverState = await r.json();
    } catch (e) {
      diag('recon_fetch_err', { err: String(e?.message || e) });
      return;
    }
    const byId = new Map();
    for (const a of (serverState.actions || [])) byId.set(a.song_id, a);
    const draftsById = new Map();
    for (const d of (serverState.drafts || [])) draftsById.set(d.song_id, d);
    let resent = 0;
    const localSnaps = lsGetJSON(K_SNAPSHOTS, {});
    for (const sidStr of Object.keys(localSnaps)) {
      const sid = parseInt(sidStr, 10);
      if (!sid) continue;
      const snap = localSnaps[sidStr] || {};
      const server = byId.get(sid);
      const cats = (snap.categories || '').split(',').filter(Boolean).join(',');
      const localRating = snap.rating || 0;
      const localComment = (snap.comment || '').trim();
      const serverRating = server?.rating || 0;
      const serverCats = server?.category || '';
      const serverComment = (server?.comment || '').trim();
      // Server-authoritative window: if the server has a row that was written
      // meaningfully AFTER our local snapshot's ts (60s skew tolerance for
      // phone clocks lagging Cloudflare time), trust the server. Drop the
      // snapshot and skip resend. Legacy snapshots without ts get treated as
      // ts=0 so the first reconcile picks up the server's view.
      const SKEW_MS = 60000;
      const snapTs = (typeof snap.ts === 'number') ? snap.ts : 0;
      if (server && server.created_at && server.created_at > snapTs + SKEW_MS) {
        delete localSnaps[sidStr];
        continue;
      }
      const ratingMismatch = (localRating > 0 && serverRating !== localRating);
      const catsMismatch = (cats && serverCats !== cats);
      const commentMismatch = (localComment && serverComment !== localComment);
      const hasAnyDelta = ratingMismatch || catsMismatch || commentMismatch;
      // Comment-only snapshot (no rating, no cat): the comment lives in the
      // drafts table on the server, NOT in library_actions. Pushing it as
      // action='comment' gets 409'd by the server forever. Route to drafts
      // — but DON'T overwrite an existing matching server-side comment; that
      // would demote a committed comment to a draft. Drop the snapshot if
      // the server already has this exact text.
      if (!cats && localRating === 0 && localComment) {
        if (serverComment === localComment) {
          delete localSnaps[sidStr];
          continue;
        }
        apiDraftPush(sid, localComment).catch(() => {});
        delete localSnaps[sidStr];
        continue;
      }
      if (hasAnyDelta) {
        let action;
        if (cats) action = 'assign';
        else if (localRating > 0) action = 'rate';
        else action = 'comment';
        const payload = { song_id: sid, user: userName, action };
        if (cats) payload.category = cats;
        if (localRating > 0) payload.rating = localRating;
        if (localComment) payload.comment = localComment;
        qEnqueue(payload);
        resent++;
      }
      const allMatch = (localRating === serverRating) && ((cats || '') === (serverCats || '')) && (localComment === serverComment);
      if (!hasAnyDelta && allMatch) delete localSnaps[sidStr];
    }
    lsSetJSON(K_SNAPSHOTS, localSnaps);
    // Also push any local drafts that the server doesn't have yet
    const localDrafts = lsGetJSON(K_DRAFTS, {});
    for (const sidStr of Object.keys(localDrafts)) {
      const sid = parseInt(sidStr, 10);
      const txt = (localDrafts[sidStr] || '').trim();
      if (!txt) continue;
      const sd = draftsById.get(sid);
      if (!sd || (sd.comment || '') !== txt) {
        apiDraftPush(sid, txt).catch(() => {});
      }
    }
    if (resent > 0) {
      diag('recon_resent', { count: resent });
      // qDrain's finally calls refreshUnsavedBadge — don't surface red
      // before we've even tried to send the just-resent items.
      qDrain();
    }
  }
  /* ===== Unsaved-changes badge =====

  function setupCardSwipe(el) {
    if (!el) return;
    let startX = 0, startY = 0, startT = 0, tracking = false;
    el.addEventListener('touchstart', (e) => {
      // Ignore swipes that start inside the YouTube iframe or scrollable comment

      const tch = e.touches[0];

    // gesture (pull-to-refresh, back-swipe). Make sure we don't leave the
    // tracker dangling — that would mis-fire the next legitimate touch.
    el.addEventListener('touchcancel', () => { tracking = false; }, { passive: true });

  // Reads ALL .cat-pill.selected, so a song tagged into multiple categories
  // (e.g. LOVERS + DJ Микки) gets stored with all of them in one shot.

    if (!cardEl) return;

  /* ===== Player mount: YouTube primary + Spotify/SoundCloud/Apple fallbacks ===== */
  async function mountYouTube(song) {
    const wrap = document.getElementById('yt-wrap');
    const fb = document.getElementById('player-fallback');
    if (!wrap) return;
    let videoId = song.youtube_id;
    if (!videoId) {
      const r = await apiYouTube(song.id);
      if (currentSong?.id !== song.id) return;
      videoId = r?.youtube_id;
    }
    if (currentSong?.id !== song.id) return;
    wrap.classList.remove('loading');
    if (videoId) {
      mountYTIframe(wrap, videoId);
      extractAlbumColor(`https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`);
    } else {
      wrap.classList.add('error');
      wrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>${escapeHtml(lang === 'ru' ? 'Не нашлось на YouTube' : 'Not on YouTube')}</div>`;
      resetAlbumColor();
    }
    // Always wire a "Не работает?" button. Tap → ask the server to find a
    // different YouTube video for this song (re-resolve), and remount.
    if (fb) {
      fb.hidden = false;
      fb.innerHTML = `<button type="button" id="fb-try" data-svc="alt">${escapeHtml(t('player.notWorking'))}</button>`;
      const btn = document.getElementById('fb-try');
      if (btn) btn.addEventListener('click', () => tryAnotherVideo(song));
    }
  }
  // Track whether the user has interacted at all this session. iOS Safari and
  // some Android browsers block iframe autoplay until first gesture; sending
  // autoplay=1 then doesn't help and just looks broken. Enable autoplay only
  // once we've seen a real tap.
  let hasUserGesture = false;
  // Once we've seen ONE gesture, the flag stays true; no need to keep listening.
  window.addEventListener('pointerdown', () => { hasUserGesture = true; }, { once: true, capture: true });
  window.addEventListener('touchstart', () => { hasUserGesture = true; }, { once: true, capture: true, passive: true });
  // Track which video IDs we've already tried per song so re-resolve doesn't
  // loop on the same broken video.
  const ytTried = new Map();
  let ytMsgAbort = null;
  let ytWatchdogTimer = null;
  function mountYTIframe(wrap, videoId) {
    const songRef = currentSong;
    if (songRef) {
      if (!ytTried.has(songRef.id)) ytTried.set(songRef.id, new Set());
      ytTried.get(songRef.id).add(videoId);
    }
    const iframe = document.createElement('iframe');
    const ap = hasUserGesture ? '1' : '0';
    // enablejsapi lets us hear postMessage events. We listen for both error
    // signals (onError / errorCode) AND life signals (onReady / onStateChange);
    // the watchdog below uses absence of any life signal to detect a stuck
    // "Повторите попытку позже" error screen that YouTube draws without ever
    // emitting an onError event.
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=${ap}&modestbranding=1&rel=0&iv_load_policy=3&playsinline=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
    iframe.title = 'YouTube плеер';
    iframe.allowFullscreen = true;
    // No iframe.loading='lazy' — iOS Safari can fail to fire load on
    // dynamically-inserted lazy iframes even when visible; the player is the
    // primary intent of the page so we want eager-load.
    wrap.innerHTML = '';
    wrap.appendChild(iframe);
    // Stay in `.loading` (shimmer overlay covers the iframe) until we hear
    // a life signal — then we switch to `.playing` + `.alive` and the iframe
    // fades into view. The user never sees a stuck YT error screen.
    wrap.classList.add('loading');
    wrap.classList.remove('playing', 'alive', 'error');
    wrap.dataset.svc = 'yt';
    // Tear down any prior message listener — without this, every card mount
    // leaks one (success path never removes it). After 50 cards we'd have 50
    // listeners each holding a songRef closure.
    if (ytMsgAbort) ytMsgAbort.abort();
    ytMsgAbort = new AbortController();
    if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
    let ytAlive = false;
    const onMsg = (e) => {
      // Accept by origin first — iOS Safari occasionally hands back a fresh
      // Window proxy whose identity check (===) fails for the first ~50 ms
      // after appendChild, causing legit early life-signals to be dropped.
      // Origin check is reliable across browsers. Our iframe only ever uses
      // youtube.com/embed (never youtube-nocookie), so a single host check.
      const goodOrigin = e.origin === 'https://www.youtube.com';
      if (!goodOrigin && e.source !== iframe.contentWindow) return;
      let d = e.data;
      if (typeof d === 'string') { try { d = JSON.parse(d); } catch { return; } }
      if (!d || typeof d !== 'object') return;
      // Error signals → instant alternate-video attempt. Cover every known
      // shape YouTube uses (onError event, infoDelivery with errorCode field,
      // and any future variant that exposes a numeric errorCode at top level).
      const err = (d.event === 'onError') ||
                  (d.info && typeof d.info.errorCode !== 'undefined') ||
                  (typeof d.errorCode !== 'undefined');
      if (err) {
        ytMsgAbort?.abort();
        if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
        if (!songRef || currentSong?.id !== songRef.id) return;
        tryAnotherVideo(songRef);
        return;
      }
      // Permissive life-signal: ANY structured message from the iframe means
      // YouTube's player JS has loaded (an embed-blocked error page never
      // posts messages). This is more robust than enumerating event names,
      // which vary across YT iframe versions and Safari / Chrome / Edge.
      if (!ytAlive) {
        ytAlive = true;
        if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
        wrap.classList.remove('loading');
        wrap.classList.add('playing', 'alive');
      }
    };
    window.addEventListener('message', onMsg, { signal: ytMsgAbort.signal });
    // Multi-shot "listening" handshake — first delivery sometimes lands
    // before the player has wired up its listener; retry until we've heard
    // back or hit four attempts. Each retry is cheap (1 postMessage call).
    const wakeListening = (delay, tries) => {
      setTimeout(() => {
        // Bail if user moved on — no point waking a player that's not in view.
        if (!songRef || currentSong?.id !== songRef.id) return;
        if (ytAlive) return;
        try { iframe.contentWindow?.postMessage('{"event":"listening"}', '*'); } catch {}
        if (tries > 1) wakeListening(1200, tries - 1);
      }, delay);
    };
    wakeListening(500, 4);
    // Watchdog: if 7s after mount we still haven't heard a single life signal
    // from the iframe, assume the embed silently failed (region-block, embed
    // disabled, "Повторите попытку позже" — none of these emit onError). Try
    // a different video ID instead of leaving the user staring at the error.
    ytWatchdogTimer = setTimeout(() => {
      ytWatchdogTimer = null;
      if (ytAlive) return;
      if (!songRef || currentSong?.id !== songRef.id) return;
      console.warn('YT watchdog: no life signal in 7s for ' + videoId + ', trying alternate');
      ytMsgAbort?.abort();
      tryAnotherVideo(songRef);
    }, 7000);
  }
  // Per-song retry counter — reset whenever renderCard mounts a new song so a
  // fresh track gets a fresh budget. Capped at MAX_YT_ATTEMPTS to avoid infinite
  // spinning if YouTube genuinely has no playable version of this track.
  let ytAttempt = 0;
  const MAX_YT_ATTEMPTS = 6;
  /* Aggressive auto-recovery: when a YouTube embed fails (either via onError
     postMessage, the 7-second watchdog, or a stuck "Повторите попытку позже"
     screen), we immediately:
       1. Tear the failed iframe down so the user never sees the YT error UI.
       2. Show a discreet local loading spinner.
       3. Hit /api/youtube/reresolve for a different ID, excluding everything
          we've already tried for this song.
       4. Mount the new ID and let the same flow catch its failure too.
     We loop up to MAX_YT_ATTEMPTS times before surrendering with a clean
     "Дальше →" CTA. NO fallback to Spotify / SoundCloud / Apple — user wants
     YouTube only. */
  async function tryAnotherVideo(song) {
    const wrap = document.getElementById('yt-wrap');
    if (!wrap || !song || currentSong?.id !== song.id) return;
    // Cut down whatever was on screen (error / black box / stuck spinner) and
    // show our own loading state so the user never sees YouTube's error UI.
    if (ytWatchdogTimer) { clearTimeout(ytWatchdogTimer); ytWatchdogTimer = null; }
    if (ytMsgAbort) { ytMsgAbort.abort(); ytMsgAbort = null; }
    wrap.innerHTML = '';
    wrap.classList.remove('playing', 'error', 'alive');
    wrap.classList.add('loading');
    wrap.dataset.svc = '';
    // First attempt = silent shimmer ("Loading…"); subsequent attempts
    // surface that we're working on it so the user knows something is happening.
    wrap.dataset.loadingLabel = (ytAttempt > 0) ? (lang === 'ru' ? 'Подбираем рабочее видео…' : 'Finding a working version…') : '';
    if (ytAttempt >= MAX_YT_ATTEMPTS) {
      wrap.classList.remove('loading');
      wrap.classList.add('error');
      wrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>${escapeHtml(lang === 'ru' ? 'Этот трек не нашёлся на YouTube. Можно нажать «Дальше →»' : 'No playable YouTube version. Press Next →')}</div>`;
      return;
    }
    ytAttempt++;
    const triedSet = ytTried.get(song.id) || new Set();
    if (!ytTried.has(song.id)) ytTried.set(song.id, triedSet);
    let j = null;
    try {
      const r = await fetchWithRetry(`${API}/api/youtube/reresolve`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ song_id: song.id, user: userName, exclude: [...triedSet] })
      }, 1, 15000);
      j = await r.json();
    } catch (e) {
      j = null;
    }
    // Bail if the user moved to a different song during the network round-trip.
    if (currentSong?.id !== song.id) return;
    if (j && j.youtube_id && !triedSet.has(j.youtube_id)) {
      song.youtube_id = j.youtube_id;
      mountYTIframe(wrap, j.youtube_id);
    } else {
      // Server has nothing new for us (or returned a stale ID we already
      // tried). Record the stale ID so the next exclude= list grows; then
      // back off briefly before recursing so we don't hammer the API in a
      // sub-second loop until the 6-attempt cap is exhausted.
      if (j && j.youtube_id) triedSet.add(j.youtube_id);
      setTimeout(() => {
        if (currentSong?.id === song.id) tryAnotherVideo(song);
      }, 800);
    }
  }
  function mountSpotifyIframe(wrap, spotifyId) {
    const iframe = document.createElement('iframe');
    iframe.src = `https://open.spotify.com/embed/track/${spotifyId}?utm_source=embed`;

  async function loadAlternatives(song) {
    const fb = document.getElementById('player-fallback');
    if (!fb) return;
    fb.innerHTML = `<button type="button" disabled>${escapeHtml(t('player.searching'))}</button>`;
    let alts;
    try {
      const r = await fetchWithRetry(`${API}/api/song/fallback?song_id=${song.id}&user=${encodeURIComponent(userName)}`, undefined, 1, 15000);
      alts = await r.json();
    } catch (e) { alts = {}; }
    if (currentSong?.id !== song.id) return;
    const wrap = document.getElementById('yt-wrap');
    const buttons = [];
    if (song.youtube_id) buttons.push({ svc: 'yt', label: 'YouTube', handler: () => mountYTIframe(wrap, song.youtube_id) });
    if (alts.spotify_id) buttons.push({ svc: 'spotify', label: 'Spotify', handler: () => mountSpotifyIframe(wrap, alts.spotify_id) });
    if (alts.soundcloud_url) buttons.push({ svc: 'soundcloud', label: 'SoundCloud', handler: () => mountSoundCloudIframe(wrap, alts.soundcloud_url) });
    if (alts.apple_embed) buttons.push({ svc: 'apple', label: 'Apple Music', handler: () => mountAppleIframe(wrap, alts.apple_embed) });
    if (buttons.length <= 1) {

    // proactively switch to the most-reliable one when user clicks "Не работает".
    // (We already rendered the bar; user will tap whichever they want.)
  }

  /* ===== Actions ===== */
  // Bare 'Дальше' tap (no comment, no category change). Doesn't write to the
  // server — the song stays eligible to appear again later for review.
  async function advanceWithoutSave() {
    if (!currentSong || actInFlight) return;
    actInFlight = true;
    try {
      if (cardEl) {
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'scale(0.97)';
        cardEl.style.transition = 'opacity 0.22s, transform 0.22s';
        await new Promise(r => setTimeout(r, 220));
      }
      await loadNext();
    } finally { actInFlight = false; }
  }

  async function act(action, category, rating) {
    if (!currentSong || actInFlight) return;
    actInFlight = true;
    // Wrap everything in try/finally so any thrown error (localStorage quota,
    // unexpected qDrain failure, render exception) still releases the lock.
    // Without this the whole UI freezes — no swipes, no taps, no recovery.
    try {
      const songRef = currentSong;
      const commentEl = document.getElementById('comment-input');
      const comment = commentEl ? commentEl.value.trim() : '';
      const commentEdited = commentEl ? commentEl.dataset.edited === '1' : false;
      const payload = { song_id: songRef.id, user: userName, action };
      if (category) payload.category = category;
      // Send comment if it was edited (even if now empty — that means "clear");
      // or if it's non-empty (could be pre-fill from server, no harm in re-sending).
      if (commentEdited) payload.comment = comment;
      else if (comment) payload.comment = comment;
      if (rating) payload.rating = rating;
      if (cardEl) {
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'scale(0.97)';
        cardEl.style.transition = 'opacity 0.22s, transform 0.22s';
        await new Promise(r => setTimeout(r, 220));
      }
      const res = await apiAction(payload);
      if (!res.ok) {
        // Payload IS in the local queue and will retry (the badge "Не
        // отправлено: N" shows the user). We still advance to the next card
        // so mom isn't stuck waiting on a network blip.
        diag('act_queued_offline', { song_id: songRef.id, action });
      } else {
        // Cancel any pending debounced draft push for this card — without
        // this, a 700ms-old typed comment would re-create the server draft
        // moments after we just told the server to clear it.
        if (window.__draftTimer) { clearTimeout(window.__draftTimer); window.__draftTimer = null; }
        saveDraft(songRef.id, '');
        snapshotClear(songRef.id);
        apiDraftClear(songRef.id).catch(() => {});
        // Sync the local song object so back-navigation shows the just-saved values.
        if (commentEdited || comment) songRef.my_comment = comment;
        if (category) songRef.my_category = category;
        if (rating) songRef.my_rating = rating;
      }
      if (action === 'assign') {
        const r = rating ? ` · ★${rating}` : '';
        showToast(t('toast.assigned', { cat: t(`cat.${category}.short`) }) + r);
      } else if (action === 'rate') {
        showToast(t('toast.rated', { n: rating }));
      } else if (action === 'skip') {
        // If a comment came along, acknowledge that explicitly
        const hadComment = (payload.comment && payload.comment.trim().length > 0);
        showToast(hadComment ? t('toast.noteSaved') : t('toast.skipped'));
      }
      progressN++;
      await loadNext();
    } finally {
      actInFlight = false;
    }
  }
  async function loadNext() {
    // Only update the counter if we already have a confirmed total (user
    // has advanced at least one card or the server responded once). At
    // first boot progressN is 0 — showing "0" briefly looks like progress
    // got wiped, so we keep the "…" placeholder until /api/library/next
    // confirms the real values below.
    if (progressN > 0 || progressTotal > 0) {
      document.getElementById('progress-n').textContent = fmt(progressN);
    }
    if (seenIdx < seenStack.length - 1) {
      seenIdx++;
      renderCard(seenStack[seenIdx]);
      return;
    }
    let d;
    try { d = await apiNext(); }
    catch (e) {
      showToast(t('toast.offline'));
      cardHost.innerHTML = `
        <div class="empty-state">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v6m0 10v6M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m10 0h6M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg></div>
          <h2>${escapeHtml(lang === 'ru' ? 'Нет связи' : 'No connection')}</h2>
          <p>${escapeHtml(lang === 'ru' ? 'Подожди немного и попробуй снова.' : 'Wait a moment and try again.')}</p>
          <button class="empty-cta" type="button" id="retry-btn">${escapeHtml(lang === 'ru' ? 'Попробовать снова' : 'Try again')}</button>
        </div>
      `;
      document.getElementById('retry-btn').addEventListener('click', loadNext);
      return;
    }
    if (d?.total != null) { progressTotal = d.total; document.getElementById('progress-total').textContent = fmt(progressTotal); }
    if (d?.processed != null) { progressN = d.processed; document.getElementById('progress-n').textContent = fmt(progressN); }
    if (!d || !d.song) { renderEmpty(); return; }
    // Server may have raced — if it returned a song the local replica knows
    // is removed (mom just deleted it but the soft-delete write hasn't yet
    // propagated to this exact next-query), skip and try again. Bounded to
    // 3 retries so we don't loop forever on a genuine state divergence.
    if (localRemoved.has(d.song.id)) {
      if (!loadNext._retries) loadNext._retries = 0;
      if (loadNext._retries < 3) {
        loadNext._retries++;
        return loadNext();
      }
      loadNext._retries = 0;
    } else {
      loadNext._retries = 0;
    }
    seenStack.push(d.song);
    seenIdx = seenStack.length - 1;
    if (seenStack.length > 30) seenStack.splice(0, seenStack.length - 30);
    if (seenStack.length < 30) seenIdx = seenStack.length - 1;
    renderCard(d.song);
  }
  async function goBack() {
    if (seenIdx <= 0) return;
    if (actInFlight) return; // wait for current commit/transition to finish
    if (typeof window.__flushCardSave === 'function') await window.__flushCardSave();
    seenIdx--;
    renderCard(seenStack[seenIdx]);
  }
  async function onRemoveCurrent() {
    if (!currentSong) return;
    const ok = confirm(t('confirm.remove', { t: `${currentSong.artist} — ${currentSong.title}` }));
    if (!ok) return;
    const songRef = currentSong;
    // Mark as removed in the local replica FIRST so even if the server fight
    // is slow / the next-card request races ahead, the song can't reappear
    // on the deck for this session.
    localRemoved.add(songRef.id);
    const r = await apiRemoveSong(songRef.id);
    if (!r.ok) { showToast(t('toast.failed')); return; }
    showToast(t('toast.removed'));
    // Remove from local stack
    const idx = seenStack.findIndex(s => s.id === songRef.id);
    if (idx >= 0) seenStack.splice(idx, 1);
    if (seenIdx >= seenStack.length) seenIdx = seenStack.length - 1;
    await loadNext();
  }

  /* ===== Top-bar buttons ===== */
  // who-chip and mine-btn were removed — user switching lives only in
  // Settings now, and Mine view is hidden.
  document.getElementById('add-btn')?.addEventListener('click', openAdd);
  document.getElementById('search-btn')?.addEventListener('click', openSearch);
  document.getElementById('all-btn')?.addEventListener('click', openAll);
  document.getElementById('settings-btn')?.addEventListener('click', openSettings);
  document.getElementById('stream-filter-btn')?.addEventListener('click', () => openStreamFilter());
  document.getElementById('stream-filter-close')?.addEventListener('click', () => closeOv('stream-filter-overlay'));

  /* Stream-filter overlay: lets mom restrict the player's next-up flow to a
     single music genre and/or a single artist. Settings are persisted to
     localStorage and survive page reloads. Apply → close overlay → reload
     the next card so she immediately gets a song matching the filter. */
  let sfDraft = { genre: null, artist: null }; // edit-in-flight before "Применить"
  let sfArtistTimer = null;
  function openStreamFilter() {
    if (isGuestUser()) return;
    sfDraft = { genre: streamFilter.genre, artist: streamFilter.artist };
    openOv('stream-filter-overlay');
    renderSfGenres();
    const inp = document.getElementById('sf-artist-input');
    if (inp) inp.value = sfDraft.artist || '';
    renderSfArtists('');
  }
  function renderSfGenres() {
    const wrap = document.getElementById('sf-genres');
    if (!wrap) return;
    // Build a fixed canonical list (matches backend GENRES_SET).
    const GENRES = ['Поп', 'Рок', 'Электроника', 'Хип-хоп', 'R&B', 'Чилл', 'Джаз', 'Классика', 'Эстрада', 'Шансон', 'Кантри', 'Прочее'];
    wrap.innerHTML = GENRES.map(g => `<button type="button" data-g="${escapeHtml(g)}" class="${sfDraft.genre === g ? 'selected' : ''}">${escapeHtml(g)}</button>`).join('');
    wrap.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        const g = b.dataset.g;
        sfDraft.genre = (sfDraft.genre === g) ? null : g; // tap-twice clears
        renderSfGenres();
      });
    });
  }
  async function renderSfArtists(q) {
    const wrap = document.getElementById('sf-artist-suggestions');
    if (!wrap) return;
    const r = await apiArtists(q);
    const list = (r.artists || []).slice(0, 30);
    wrap.innerHTML = list.map(a => `<button type="button" data-a="${escapeHtml(a.artist)}" class="${sfDraft.artist === a.artist ? 'selected' : ''}"><span>${escapeHtml(a.artist)}</span><span class="sf-count">${fmt(a.n)}</span></button>`).join('');
    wrap.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        const a = b.dataset.a;
        sfDraft.artist = (sfDraft.artist === a) ? null : a;
        const inp = document.getElementById('sf-artist-input');
        if (inp) inp.value = sfDraft.artist || '';
        renderSfArtists(inp ? inp.value.trim() : '');
      });
    });
  }
  document.getElementById('sf-artist-input')?.addEventListener('input', (e) => {
    if (sfArtistTimer) clearTimeout(sfArtistTimer);
    sfArtistTimer = setTimeout(() => renderSfArtists(e.target.value.trim()), 220);
  });
  document.getElementById('sf-clear-btn')?.addEventListener('click', () => {
    sfDraft = { genre: null, artist: null };
    streamFilter = { genre: null, artist: null };
    persistStreamFilter();
    refreshStreamFilterChip();
    closeOv('stream-filter-overlay');
    // Reset the deck to the freshly-unfiltered queue.
    seenStack.length = 0; seenIdx = -1;
    loadNext();
  });
  document.getElementById('sf-apply-btn')?.addEventListener('click', () => {
    streamFilter = { genre: sfDraft.genre || null, artist: sfDraft.artist || null };
    persistStreamFilter();
    refreshStreamFilterChip();
    closeOv('stream-filter-overlay');
    seenStack.length = 0; seenIdx = -1;
    loadNext();
  });
  document.getElementById('share-fab')?.addEventListener('click', doShare);

  /* ===== Overlay open/close ===== */
  function openOv(id) {
    // Flush any pending card save before navigating away — never lose state.
    if (typeof window.__flushCardSave === 'function') window.__flushCardSave();
    document.getElementById(id).classList.add('open');
  }
  function closeOv(id) { document.getElementById(id).classList.remove('open'); }
  // iOS Safari lifecycle handling. visibilitychange is the most reliable signal on iOS;
  // pagehide is supplemental for bfcache. On hide we (a) flush pending card state and
  // (b) fire sendBeacon for every queued action — the browser guarantees delivery even
  // after the tab is hidden or terminated.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      if (typeof window.__flushCardSave === 'function') window.__flushCardSave();
      qFlushBeacon();
    } else if (document.visibilityState === 'visible') {
      // Coming back — drain any unsent entries
      qDrain();
      if (currentSong) loadOthersComments(currentSong.id);
    }
  });
  window.addEventListener('pagehide', () => {
    if (typeof window.__flushCardSave === 'function') window.__flushCardSave();
    qFlushBeacon();
  });
  window.addEventListener('online', () => { qDrain(); });
  document.getElementById('search-close').addEventListener('click', () => closeOv('search-overlay'));
  document.getElementById('all-close').addEventListener('click', () => closeOv('all-overlay'));
  document.getElementById('mine-close').addEventListener('click', () => closeOv('mine-overlay'));
  document.getElementById('settings-close').addEventListener('click', () => closeOv('settings-overlay'));
  document.getElementById('trash-close')?.addEventListener('click', () => closeOv('trash-overlay'));
  document.getElementById('open-trash-btn')?.addEventListener('click', () => openTrash());
  /* Render the soft-deleted catalogue. Each row has a one-tap "Вернуть"
     button that calls /api/library/restore — server flips removed_at back
     to NULL and the song reappears in the main feed within the next
     periodic-sync cycle (~30s) or immediately if mom reloads. */
  async function openTrash() {
    closeOv('settings-overlay');
    openOv('trash-overlay');
    const body = document.getElementById('trash-body');
    body.innerHTML = '<div class="ov-status">Загружаю…</div>';
    const r = await apiTrashList();
    const songs = r.songs || [];
    document.getElementById('trash-counter').textContent = fmt(songs.length);
    if (!songs.length) {
      body.innerHTML = '<div class="ov-status">Корзина пуста — ни одного удалённого трека.</div>';
      return;
    }
    body.innerHTML = songs.map(s => {
      const when = s.removed_at ? new Date(s.removed_at).toLocaleString('ru-RU', { dateStyle: 'short', timeStyle: 'short' }) : '';
      const who = s.removed_by ? `<span class="trash-row__who">удалил${(s.removed_by === 'Юля') ? 'а' : ''} ${escapeHtml(s.removed_by)}</span>` : '';
      return `
        <div class="trash-row" data-id="${s.id}">
          <div class="trash-row__main">
            <div class="trash-row__title">${escapeHtml(s.title)}</div>
            <div class="trash-row__artist">${escapeHtml(s.artist)}${s.year ? ' · ' + s.year : ''}</div>
            <div class="trash-row__meta">${who}${when ? ' · ' + escapeHtml(when) : ''}</div>
          </div>
          <button type="button" class="trash-row__restore" data-id="${s.id}">Вернуть</button>
        </div>
      `;
    }).join('');
    body.querySelectorAll('.trash-row__restore').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = parseInt(btn.dataset.id, 10);
        btn.disabled = true;
        btn.textContent = 'Возвращаю…';
        const res = await apiRestoreSong(id);
        if (res.ok) {
          showToast('Возвращено в библиотеку');
          // Remove the row from view — song is no longer in trash.
          const row = btn.closest('.trash-row');
          if (row) row.remove();
          const remaining = body.querySelectorAll('.trash-row').length;
          document.getElementById('trash-counter').textContent = fmt(remaining);
          if (remaining === 0) body.innerHTML = '<div class="ov-status">Корзина пуста — ни одного удалённого трека.</div>';
        } else {
          btn.disabled = false;
          btn.textContent = 'Вернуть';
          showToast('Не удалось — попробуй ещё раз');
        }
      });
    });
  }
  document.getElementById('add-close').addEventListener('click', () => closeOv('add-overlay'));

  /* ===== Search overlay ===== */
  const smInput = document.getElementById('sm-input');
  const searchResults = document.getElementById('search-results');
  let searchTimer = null;
  let searchRunId = 0;
  function isGuestUser() { return userName === 'Lovers' || userName === 'DJ Микки'; }
  function openSearch() {
    if (isGuestUser()) return;
    openOv('search-overlay');
    smInput.value = '';
    searchResults.innerHTML = `<div class="ov-status">${escapeHtml(t('search.intro'))}</div>${addNewCta()}`;
    wireAddNewCta();
    setTimeout(() => smInput.focus(), 280);
  }
  smInput.addEventListener('input', () => {
    if (searchTimer) clearTimeout(searchTimer);
    const q = smInput.value.trim();
    if (!q) {
      searchResults.innerHTML = `<div class="ov-status">${escapeHtml(t('search.intro'))}</div>${addNewCta()}`;
      wireAddNewCta();
      return;
    }
    if (q.length < 2) return;
    searchTimer = setTimeout(() => doSearch(q), 220);
  });
  function addNewCta() {
    return `<button class="set-row" id="search-add-cta" type="button" style="margin-top:14px"><span class="sr-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span><span class="sr-main"><span class="sr-h">${escapeHtml(t('search.addNew').split(' — ')[0])}</span></span><span class="sr-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span></button>`;
  }
  function wireAddNewCta() {
    const el = document.getElementById('search-add-cta');
    if (el) el.addEventListener('click', () => { closeOv('search-overlay'); openAdd(); });
  }
  async function doSearch(q) {
    const runId = ++searchRunId;
    searchResults.innerHTML = `<div class="ov-status">${escapeHtml(t('search.typing'))}</div>`;
    const items = await apiSearch(q);
    if (runId !== searchRunId) return;
    if (!items.length) {
      searchResults.innerHTML = `<div class="ov-status">${escapeHtml(t('search.empty'))}</div>${addNewCta()}`;
      wireAddNewCta();
      return;
    }
    renderRows(searchResults, items);
    searchResults.insertAdjacentHTML('beforeend', addNewCta());
    wireAddNewCta();
  }

  /* ===== Result rows (shared) — Premium card UX =====
     Each row is a self-contained .tc-card. Collapsed: title+artist+glance
     chips. Tap anywhere on the head → smooth grid-template-rows expand
     reveals the full thread (all users' comments + cats + ratings) plus
     a category quick-picker. Swipe left on touch devices → reveal red
     wash with delete action. Hover on desktop → top-right "×" appears with
     spring scale-in. No chevrons, no clunky trash icons. */
  function renderRows(container, items) {
    const isCatpick = container.dataset.role === 'catpick';
    const html = items.map(s => {
      const myCat = s.my_category;
      const otherCat = !myCat && s.assigned_to ? s.assigned_to : null;
      const catChip = myCat
        ? `<span class="tc-chip tc-chip--cat" title="вы отнесли в эту категорию">📌 ${escapeHtml(t(`cat.${myCat}.short`))}</span>`
        : (otherCat ? `<span class="tc-chip tc-chip--cat" title="${escapeHtml(s.assigned_by || '')} отнёс сюда">📌 ${escapeHtml(t(`cat.${otherCat}.short`))} · ${escapeHtml(s.assigned_by || '')}</span>` : '');
      const cmtChip = (s.my_comment && s.my_comment.trim())
        ? `<span class="tc-chip tc-chip--comment" title="у вас есть комментарий">💬 коммент есть</span>`
        : '';
      const ratingChip = s.my_rating ? `<span class="tc-chip tc-chip--rating">★ ${s.my_rating}/10</span>` : '';
      const chipsBlock = (catChip || cmtChip || ratingChip) ? `<div class="tc-chips">${catChip}${cmtChip}${ratingChip}</div>` : '';
      // Pre-fill my own comment in the thread (so a freshly-rendered card
      // shows the user's own comment immediately without waiting for the
      // /api/song/comments fetch). Other users' comments arrive on expand.
      const seedComment = (s.my_comment && s.my_comment.trim())
        ? `<div class="tc-comment"><div class="tc-comment__head"><span class="tc-comment__by">${escapeHtml(userName)}</span>${myCat ? '<span class="tc-comment__cat">→ ' + escapeHtml(t(`cat.${myCat}.short`) || myCat) + '</span>' : ''}${s.my_rating ? '<span class="tc-comment__rating">★ ' + s.my_rating + '/10</span>' : ''}</div><div class="tc-comment__text">«${escapeHtml(s.my_comment.trim())}»</div></div>`
        : '';
      return `
        <div class="tc-card" data-id="${s.id}" data-yt="${escapeHtml(s.youtube_id || '')}">
          <div class="tc-card__delete-layer" aria-hidden="true">
            <span class="lbl">${escapeHtml(lang === 'ru' ? 'удалить' : 'delete')}</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/></svg>
          </div>
          <button class="tc-card__hover-delete" data-act="remove" aria-label="удалить" title="удалить из каталога"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          <div class="tc-card__inner">
            <div class="tc-card__head" data-act="toggle">
              <div class="tc-card__art" id="tc-art-${s.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              </div>
              <div class="tc-card__meta">
                <div class="tc-card__title">${escapeHtml(s.title)}</div>
                <div class="tc-card__artist">${escapeHtml(s.artist)}${s.year ? ' · ' + s.year : ''}</div>
                ${chipsBlock}
              </div>
            </div>
            <div class="tc-card__expand">
              <div class="tc-card__expand-inner">
                <div class="tc-card__expand-content">
                  <div class="tc-thread" data-thread-for="${s.id}">${seedComment || '<div class="tc-thread__loading">…</div>'}</div>
                  <div class="tc-catpicker">
                    <div class="tc-catpicker__label">${escapeHtml(lang === 'ru' ? 'Отнести в категорию' : 'Assign to category')}</div>
                    <div class="tc-catpicker__pills">
                      ${CATEGORIES.map(c => `<button type="button" data-cat="${escapeHtml(c)}" ${myCat === c ? 'class="selected"' : ''}>${escapeHtml(t(`cat.${c}.short`))}</button>`).join('')}
                    </div>
                  </div>
                  <button class="tc-play" data-act="play" type="button">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    ${escapeHtml(lang === 'ru' ? 'Открыть в плеере' : 'Open in player')}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
    container.innerHTML = `<div class="tc-grid">${html}</div>`;
    // First-touch hint to teach mom about swipe-to-delete — only shows once
    // per session via a flag in window. Mobile only.
    if (!window.__tcSwipeHintShown && 'ontouchstart' in window) {
      const hint = document.createElement('div');
      hint.className = 'tc-swipe-hint';
      hint.textContent = lang === 'ru' ? 'Свайп влево по карточке — удалить' : 'Swipe left on a card to delete';
      container.insertBefore(hint, container.firstChild);
      window.__tcSwipeHintShown = true;
      setTimeout(() => { hint.style.opacity = '0'; hint.style.transition = 'opacity 1.5s'; }, 6000);
      setTimeout(() => { hint.remove(); }, 8000);
    }

    container.querySelectorAll('.tc-card').forEach((card, i) => {
      const songId = parseInt(card.dataset.id, 10);
      const inner = card.querySelector('.tc-card__inner');
      const head = card.querySelector('.tc-card__head');
      const thread = card.querySelector('.tc-thread');

      /* Tap on the head area → toggle expand. Loads the full thread the
         first time it opens, then caches. No chevron — the whole card
         responds to the tap, iOS-style. */
      head.addEventListener('click', async e => {
        if (e.target.closest('.tc-card__hover-delete')) return;
        card.classList.toggle('expanded');
        // Clear any partial swipe transform — if the user started dragging
        // and then tapped to expand instead, the leftover translateX on the
        // inner could leave the card visually offset.
        if (inner) { inner.style.transform = ''; card.classList.remove('swipe-armed', 'swiping'); }
        if (card.classList.contains('expanded') && thread.dataset.loaded !== '1') {
          // Keep the user's own seeded comment visible while we fetch others.
          const seedHtml = thread.innerHTML;
          const entries = await apiSongComments(songId);
          const meaningful = (entries || []).filter(e => (e.comment && e.comment.trim()) || e.category || e.rating);
          if (!meaningful.length) {
            thread.innerHTML = seedHtml.includes('tc-comment')
              ? seedHtml // already shows the user's own comment
              : `<div class="tc-thread__empty">${escapeHtml(lang === 'ru' ? 'Пока никто не оставил комментариев.' : 'No comments yet.')}</div>`;
          } else {
            thread.innerHTML = meaningful.map(e => {
              const catLabel = e.category ? '<span class="tc-comment__cat">→ ' + escapeHtml(t(`cat.${e.category}.short`) || e.category) + '</span>' : '';
              const rt = e.rating ? '<span class="tc-comment__rating">★ ' + e.rating + '/10</span>' : '';
              const txt = (e.comment && e.comment.trim()) ? '<div class="tc-comment__text">«' + escapeHtml(e.comment.trim()) + '»</div>' : '';
              return `<div class="tc-comment"><div class="tc-comment__head"><span class="tc-comment__by">${escapeHtml(e.user_name || '?')}</span>${catLabel}${rt}</div>${txt}</div>`;
            }).join('');
          }
          thread.dataset.loaded = '1';
        }
      });

      /* "Open in player" button inside expanded card — closes overlay,
         jumps the user to the song in the main feed. Look up the song by
         the card's data-id (the source of truth in the DOM) rather than
         the closure-captured `items[i]` — if a row is deleted (swipe or
         hover-delete) between render and tap, the index in the array
         points at the wrong song. */
      const playBtn = card.querySelector('[data-act="play"]');
      if (playBtn) playBtn.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
        const liveId = parseInt(card.dataset.id, 10);
        const song = items.find(s => s.id === liveId) || items[i];
        if (song) openSongInPlayer(song);
      });

      /* Category picker inside expanded card — pills, tap to assign. */
      card.querySelectorAll('.tc-catpicker__pills button').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          const cat = btn.dataset.cat;
          // Visual: mark immediately, others un-mark
          card.querySelectorAll('.tc-catpicker__pills button.selected').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          const result = await apiAction({ song_id: songId, user: userName, action: 'assign', category: cat });
          if (result.ok || result.queued) {
            showToast(t('toast.assigned', { cat: t(`cat.${cat}.short`) }));
            // Refresh "my cat" chip on the collapsed head without re-rendering everything
            items[i].my_category = cat;
            const oldChips = card.querySelector('.tc-chips');
            if (oldChips) {
              const hasCat = oldChips.querySelector('.tc-chip--cat');
              const newChipHtml = `<span class="tc-chip tc-chip--cat" title="вы отнесли в эту категорию">📌 ${escapeHtml(t(`cat.${cat}.short`))}</span>`;
              if (hasCat) hasCat.outerHTML = newChipHtml;
              else oldChips.insertAdjacentHTML('afterbegin', newChipHtml);
            }
            // Mark thread as stale so next expand re-fetches with the new tag
            thread.dataset.loaded = '0';
          } else {
            showToast(t('toast.failed'));
          }
        });
      });

      /* Desktop hover-delete button — graceful confirm + fade-slide-out. */
      const hoverDel = card.querySelector('.tc-card__hover-delete');
      if (hoverDel) hoverDel.addEventListener('click', async e => {
        e.stopPropagation();
        const song = items[i];
        const ok = confirm(t('confirm.remove', { t: `${song.artist} — ${song.title}` }));
        if (!ok) return;
        // Mark locally BEFORE the server call — same reason as onRemoveCurrent.
        localRemoved.add(songId);
        const idx = seenStack.findIndex(s => s.id === songId);
        if (idx >= 0) seenStack.splice(idx, 1);
        if (seenIdx >= seenStack.length) seenIdx = seenStack.length - 1;
        const r = await apiRemoveSong(songId);
        if (r.ok) {
          showToast(t('toast.removed'));
          card.classList.add('deleting');
          setTimeout(() => card.remove(), 420);
        } else showToast(t('toast.failed'));
      });

      /* Touch swipe-to-delete (mobile only). Drags .tc-card__inner left,
         reveals the red delete layer behind. Past 35% of card width OR
         the user releases with horizontal velocity, commit deletion with
         a final slide-out + shrink. Below threshold → spring back. */
      let startX = 0, startY = 0, startT = 0, dragX = 0, locked = false, touching = false;
      inner.addEventListener('touchstart', e => {
        if (card.classList.contains('expanded')) return; // don't fight scroll inside expanded thread
        const tch = e.touches[0];
        startX = tch.clientX; startY = tch.clientY; startT = Date.now();
        touching = true; locked = false; dragX = 0;
      }, { passive: true });
      inner.addEventListener('touchmove', e => {
        if (!touching) return;
        const tch = e.touches[0];
        const dx = tch.clientX - startX;
        const dy = tch.clientY - startY;
        if (!locked) {
          // Wait until the user clearly chose horizontal motion before
          // claiming the gesture — otherwise we'd block vertical scroll.
          if (Math.abs(dx) > Math.abs(dy) + 6 && Math.abs(dx) > 14) {
            locked = true;
            card.classList.add('swiping');
          } else if (Math.abs(dy) > Math.abs(dx) + 4) {
            touching = false;
            return;
          }
        }
        if (locked) {
          dragX = Math.min(0, dx); // only allow left drag
          inner.style.transform = `translateX(${dragX}px)`;
          // Visual armed feedback past the threshold
          const w = card.offsetWidth;
          if (Math.abs(dragX) > w * 0.35) card.classList.add('swipe-armed');
          else card.classList.remove('swipe-armed');
        }
      }, { passive: true });
      inner.addEventListener('touchend', async () => {
        if (!touching) return;
        touching = false;
        card.classList.remove('swiping');
        if (!locked) return;
        const w = card.offsetWidth;
        const v = Math.abs(dragX) / Math.max(1, Date.now() - startT); // px/ms
        const past = Math.abs(dragX) > w * 0.35 || v > 0.5;
        if (past) {
          // Commit delete with smooth slide-out
          inner.style.transform = `translateX(-${w}px)`;
          card.classList.add('deleting');
          const song = items[i];
          // Local-replica mark + seenStack cleanup BEFORE server call.
          localRemoved.add(songId);
          const sIdx = seenStack.findIndex(s => s.id === songId);
          if (sIdx >= 0) seenStack.splice(sIdx, 1);
          if (seenIdx >= seenStack.length) seenIdx = seenStack.length - 1;
          const r = await apiRemoveSong(songId);
          if (r.ok) {
            showToast(t('toast.removed'));
            setTimeout(() => card.remove(), 420);
          } else {
            // Revert if server refused
            showToast(t('toast.failed'));
            inner.style.transform = '';
            card.classList.remove('deleting', 'swipe-armed');
          }
        } else {
          // Spring back to rest
          inner.style.transform = '';
          card.classList.remove('swipe-armed');
        }
      }, { passive: true });
      inner.addEventListener('touchcancel', () => {
        touching = false; locked = false;
        inner.style.transform = '';
        card.classList.remove('swiping', 'swipe-armed');
      }, { passive: true });
    });
    container.querySelectorAll('.sr-cats-inner button').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const row = btn.closest('.sr-cats').previousElementSibling;

  async function openSongInPlayer(song) {

    if (typeof window.__flushCardSave === 'function') await window.__flushCardSave();

  /* ===== All-tracks overlay =====
     Sort is fixed alpha (still passed to the API as ORDER BY hint). The two
     active controls are the «С отзывом / Без» segmented tabs (aoCommented) and
     the horizontal genre-filter chip row (aoGenre). Both work orthogonally to
     whatever wedding category (currentCat) the user is currently in. */
  const aoSort = 'alpha';
  let aoCommented = 'yes';
  let aoGenre = null;
  let aoOffset = 0;
  let aoLoading = false;
  let aoDone = false;
  // aoRunId: monotonic generation token. Every filter/tab/genre change bumps
  // it. Each loadAllPage captures the value at dispatch and discards its
  // own response if the id has moved on by then — prevents stale fetches
  // from rendering under the wrong filter and corrupting pagination offsets.
  let aoRunId = 0;
  // Snapshot of d.total for the current generation, used as the «Все» chip
  // count (NOT sum of genre_counts — that excludes NULL-genre tracks).
  let aoAllChipTotal = null;
  const aoResults = document.getElementById('all-results');
  const aoGenresEl = document.getElementById('ao-genres');
  function aoResetForNewFilter() {
    aoOffset = 0;
    aoDone = false;
    // Critical: reset `aoLoading` to false. If a previous filter's fetch is
    // still in flight, we DON'T want it to keep loadAllPage gated out — by
    // bumping aoRunId the stale response will be dropped on arrival anyway,
    // and the new filter's call should proceed immediately. Without this,
    // clicking genre A then B (while A is in flight) would leave the UI on
    // "Загружаю…" forever because B's loadAllPage saw aoLoading=true and
    // early-returned without ever firing its own fetch.
    aoLoading = false;
    aoRunId++;
    aoAllChipTotal = null;
  }
  function openAll() {
    if (isGuestUser()) return;
    openOv('all-overlay');
    aoCommented = 'yes';
    aoGenre = null;
    aoResetForNewFilter();
    aoResults.innerHTML = `<div class="ov-status">…</div>`;
    aoGenresEl.innerHTML = '';
    document.querySelectorAll('.ao-comment-tab').forEach(b => b.classList.toggle('active', b.dataset.commented === aoCommented));
    loadAllPage({ autoFlipIfEmpty: true });
  }
  document.querySelectorAll('.ao-comment-tab').forEach(b => {
    b.addEventListener('click', () => {
      const next = b.dataset.commented;
      if (next === aoCommented) return;
      aoCommented = next;
      aoGenre = null;
      aoResetForNewFilter();
      document.querySelectorAll('.ao-comment-tab').forEach(x => x.classList.toggle('active', x === b));
      aoResults.innerHTML = `<div class="ov-status">Загружаю…</div>`;
      loadAllPage();
    });
  });

  /* Build / refresh the horizontal genre filter row. Called every page-load
     so counts stay in sync with current cat + comment-status. First chip is
     a sticky "Все" reset that uses d.total (not sum of per-genre counts) so
     NULL-genre tracks during partial backfill still show up in «Все». */
  function renderGenreChips(genres, counts, allTotal) {
    if (!Array.isArray(genres) || !genres.length) {
      aoGenresEl.innerHTML = '';
      return;
    }
    const sumOfGenres = Object.values(counts || {}).reduce((a, b) => a + b, 0);
    const allCount = (typeof allTotal === 'number' && allTotal > 0) ? allTotal : sumOfGenres;
    const allChip = `<button type="button" class="genre-chip ${aoGenre === null ? 'active' : ''}" data-genre=""><span class="genre-chip__label">Все</span><span class="genre-chip__count">${fmt(allCount)}</span></button>`;
    const rest = genres.map(g => {
      const n = counts && counts[g] ? counts[g] : 0;
      const cls = 'genre-chip' + (aoGenre === g ? ' active' : '');
      const empty = n === 0 ? ' data-empty="1"' : '';
      return `<button type="button" class="${cls}" data-genre="${escapeHtml(g)}"${empty}><span class="genre-chip__label">${escapeHtml(g)}</span><span class="genre-chip__count">${fmt(n)}</span></button>`;
    }).join('');
    aoGenresEl.innerHTML = allChip + rest;
    aoGenresEl.querySelectorAll('.genre-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const next = btn.dataset.genre || null;
        if (next === aoGenre) return;
        aoGenre = next;
        aoResetForNewFilter();
        aoGenresEl.querySelectorAll('.genre-chip').forEach(x => x.classList.toggle('active', x === btn));
        aoResults.innerHTML = `<div class="ov-status">Загружаю…</div>`;
        loadAllPage();
      });
    });
  }
  aoResults.addEventListener('scroll', () => {
    if (aoLoading || aoDone) return;
    if (aoResults.scrollTop + aoResults.clientHeight > aoResults.scrollHeight - 200) loadAllPage();
  });
  async function loadAllPage(opts) {
    if (aoLoading || aoDone) return;
    const myRun = aoRunId;
    aoLoading = true;
    const d = await apiAllTracks(aoSort, aoOffset, 50, aoCommented, aoGenre);
    // Stale-response gate: a filter / tab / genre change since we started
    // means this response belongs to the OLD filter. Dropping it prevents
    // rows from the previous tab rendering under the new one and keeps
    // aoOffset in sync with the visible data. NOTE: do NOT clear aoLoading
    // when dropping a stale response — a new live fetch may be in flight
    // with aoLoading=true and clearing it here would let the scroll handler
    // spawn a duplicate request mid-load.
    if (myRun !== aoRunId) { return; }
    aoLoading = false;
    if (!d) return;
    document.getElementById('ao-counter').textContent = fmt(d.total);
    // Refresh the two tab count badges if the API reported them.
    if (typeof d.total_commented === 'number') {
      const el = document.getElementById('ao-count-commented');
      if (el) el.textContent = fmt(d.total_commented);
    }
    if (typeof d.total_uncommented === 'number') {
      const el = document.getElementById('ao-count-uncommented');
      if (el) el.textContent = fmt(d.total_uncommented);
    }
    // openAll default-tab safety net: if «С отзывом» is empty inside the
    // current category but «Без» has content, auto-flip to «Без» on the
    // first load. Without this the user lands on an empty-state screen
    // every time they open "Все треки" in a cat they haven't commented in.
    if (opts && opts.autoFlipIfEmpty && aoOffset === 0 && aoGenre === null &&
        aoCommented === 'yes' &&
        d.total_commented === 0 && d.total_uncommented > 0) {
      aoCommented = 'no';
      aoResetForNewFilter();
      document.querySelectorAll('.ao-comment-tab').forEach(x => x.classList.toggle('active', x.dataset.commented === 'no'));
      loadAllPage(); // no autoFlipIfEmpty on the retry — would loop otherwise
      return;
    }
    // Render / refresh the genre chip row on every page-1 load — counts depend
    // on current cat + commented filter. Pass d.total (full filter scope) so
    // the «Все» chip is always consistent with the header counter, even
    // during partial backfill when some tracks have NULL genre.
    if (aoOffset === 0) {
      if (typeof d.total === 'number') aoAllChipTotal = d.total;
      if (Array.isArray(d.genres)) renderGenreChips(d.genres, d.genre_counts || {}, aoAllChipTotal);
    }
    if (aoOffset === 0) { aoResults.innerHTML = ''; }
    if (d.results.length === 0) {
      let empty;
      if (aoGenre) {
        empty = aoCommented === 'yes'
          ? `В жанре «${aoGenre}» пока никто не оставил отзыв`
          : `В жанре «${aoGenre}» все треки уже с отзывом`;
      } else if (aoCommented === 'yes') {
        empty = 'Пока никто не оставил отзыв';
      } else {
        empty = 'Все треки уже с отзывом — больше не осталось';
      }
      if (aoOffset === 0) aoResults.innerHTML = `<div class="ov-status">${escapeHtml(empty)}</div>`;
      aoDone = true;
      return;
    }
    const wrap = document.createElement('div');
    aoResults.appendChild(wrap);
    renderRows(wrap, d.results);
    aoOffset += d.results.length;
    if (aoOffset >= d.total) aoDone = true;
  }

  async function renderMineRated() {
