<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>Музыка к венчанию</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #08080a;
    --bg-1: #0e0e12;
    --surface: rgba(22, 22, 26, 0.7);
    --surface-2: #15151a;
    --line: rgba(255, 255, 255, 0.06);
    --line-2: rgba(255, 255, 255, 0.12);
    --text: #f4f4f6;
    --text-dim: #9a9aa0;
    --text-muted: #6c6c72;
    --gold: #d4a45c;
    --gold-bright: #ecc380;
    --gold-soft: rgba(212, 164, 92, 0.16);
    --good: #6ad06a;
    --bad: #d96666;
    --radius-sm: 10px;
    --radius: 14px;
    --radius-lg: 22px;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    min-height: 100vh;
  }
  [hidden] { display: none !important; }

  /* Ambient color tint pulled from current track artwork */
  #ambient {
    position: fixed; inset: 0; z-index: -1;
    pointer-events: none;
    background: var(--bg);
    transition: background 0.9s var(--ease-out);
  }
  #ambient::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 50% -10%, rgba(212, 164, 92, 0.05), transparent 70%),
      linear-gradient(180deg, rgba(8, 8, 10, 0.2) 0%, rgba(8, 8, 10, 0.85) 90%);
  }

  button, input, textarea, select {
    font-family: inherit; font-size: inherit; color: inherit;
  }
  button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
    border-radius: var(--radius-sm);
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  /* ===== Top utility bar (lang + user) ===== */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(12px + env(safe-area-inset-top)) 16px 8px;
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }
  .who-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
  }
  .who-chip:hover { background: var(--surface-2); }
  .who-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-bright); }
  .right-controls { display: flex; gap: 8px; align-items: center; }
  .lang-toggle {
    display: flex; gap: 2px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px;
  }
  .lang-toggle button {
    appearance: none; background: transparent; border: 0;
    color: var(--text-muted);
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .lang-toggle button.active { background: var(--gold); color: #0a0a0d; }
  .icon-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: background 0.18s, transform 0.1s;
  }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ===== Onboarding ===== */
  #onboarding {
    min-height: 100vh; min-height: 100dvh;
    padding: 40px 22px calc(40px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
  }
  #onboarding::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 35%, rgba(212, 164, 92, 0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(212, 164, 92, 0.05) 0%, transparent 60%);
    pointer-events: none; z-index: -1;
  }
  .ob-inner { width: 100%; max-width: 420px; }
  .ob-hero { text-align: center; margin-bottom: 38px; }
  .ob-hero .mark {
    width: 56px; height: 56px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    box-shadow: 0 14px 36px -10px var(--gold);
    display: flex; align-items: center; justify-content: center;
  }
  .ob-hero .mark svg { width: 26px; height: 26px; color: #0a0a0d; }
  .ob-hero h1 {
    margin: 0;
    font-size: 30px; font-weight: 800;
    letter-spacing: -0.025em; line-height: 1.08;
  }
  .ob-hero .sub {
    margin: 10px 0 0;
    color: var(--text-dim);
    font-size: 14px; letter-spacing: 0.005em;
  }
  .ob-block { margin-bottom: 18px; }
  .ob-label {
    display: block; font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;
  }
  .ob-pick { display: flex; gap: 8px; }
  .ob-pick button {
    flex: 1; appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 58px;
    transition: background 0.2s var(--ease), border-color 0.2s, transform 0.1s;
  }
  .ob-pick button:active { transform: scale(0.97); }
  .ob-pick button.active {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d; border-color: var(--gold);
    box-shadow: 0 12px 32px -10px var(--gold);
  }
  .ob-note {
    margin-top: 14px; padding: 14px 16px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-size: 13px; line-height: 1.55;
    color: var(--text-dim);
  }
  .ob-note strong { color: var(--text); font-weight: 700; }
  .ob-note a { color: var(--gold-bright); text-decoration: underline; text-underline-offset: 2px; font-weight: 600; }
  .ob-go {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    color: #0a0a0d; border: 0;
    border-radius: var(--radius);
    padding: 18px 22px;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer; margin-top: 26px;
    box-shadow: 0 16px 32px -12px var(--gold);
    transition: transform 0.15s, opacity 0.15s;
  }
  .ob-go:active { transform: scale(0.98); }
  .ob-go:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; background: var(--surface-2); color: var(--text-muted); }

  /* ===== App: discovery view ===== */
  .stage {
    min-height: 100vh; min-height: 100dvh;
    padding: calc(64px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
    position: relative;
  }
  .progress-line {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px; letter-spacing: 0.12em; font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .progress-line .n { color: var(--text); font-weight: 800; }

  .card {
    max-width: 520px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.32s var(--ease), transform 0.32s var(--ease);
  }
  .card.leaving { opacity: 0; transform: translateY(-12px); }
  .card.entering { opacity: 0; transform: translateY(12px); }

  .art-wrap {
    width: min(320px, 80vw); aspect-ratio: 1/1;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface-2);
    box-shadow: 0 30px 80px -24px rgba(0, 0, 0, 0.7), 0 6px 20px -8px rgba(0, 0, 0, 0.5);
  }
  .art-wrap::after {
    content: ''; position: absolute; inset: 0;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    pointer-events: none;
  }
  .art-img {
    position: absolute; inset: 0;
    background: var(--surface-2) center/cover no-repeat;
    transition: opacity 0.4s var(--ease-out);
  }
  .art-img.placeholder {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .art-img.placeholder svg { width: 40%; height: 40%; opacity: 0.4; }

  .meta {
    margin: 28px 6px 0; text-align: center;
    width: 100%;
  }
  .meta .title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.022em; line-height: 1.15;
    color: var(--text);
    word-wrap: break-word;
  }
  .meta .by {
    margin-top: 8px;
    font-size: 14px; color: var(--text-dim);
    font-weight: 500;
  }
  .meta .by .year { color: var(--text-muted); margin-left: 4px; }

  .listen {
    margin: 22px auto 0;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 360px;
  }
  .listen-btn {
    appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 13px 22px;
    font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
    cursor: pointer; min-height: 46px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  .listen-btn:hover { background: var(--surface-2); border-color: var(--line-2); }
  .listen-btn:active { transform: scale(0.97); }
  .listen-btn svg { width: 14px; height: 14px; }
  .listen-btn.playing { color: var(--gold-bright); border-color: var(--gold-soft); background: rgba(212,164,92,0.05); }
  .player-slot {
    width: 100%; margin-top: 14px;
    max-height: 0; overflow: hidden;
    transition: max-height 0.34s var(--ease);
  }
  .player-slot.open { max-height: 200px; }
  .player-slot iframe {
    width: 100%; height: 175px;
    border: 0;
    border-radius: var(--radius);
    background: var(--surface-2);
    box-shadow: 0 16px 32px -16px rgba(0, 0, 0, 0.6);
  }

  .comment-row {
    margin: 22px auto 0;
    width: 100%; max-width: 480px;
  }
  .comment-row textarea {
    width: 100%; min-height: 56px;
    padding: 13px 16px;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px; line-height: 1.45;
    resize: none; overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .comment-row textarea::placeholder { color: var(--text-muted); }
  .comment-row textarea:focus {
    outline: none; border-color: var(--gold);
    background: rgba(212,164,92,0.04);
  }

  .cats {
    margin: 26px auto 0;
    width: 100%; max-width: 480px;
  }
  .cats-label {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .cats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .cat-pill {
    appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 14px;
    font-size: 14px; font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
    display: flex; flex-direction: column; gap: 3px;
  }
  .cat-pill:hover { border-color: var(--gold-soft); background: var(--surface-2); }
  .cat-pill:active { transform: scale(0.97); }
  .cat-pill .nm { font-weight: 700; }
  .cat-pill .ctx { font-size: 11px; color: var(--text-muted); font-weight: 500; }

  .skip-row {
    margin: 22px auto 0;
    text-align: center;
  }
  .skip-btn {
    appearance: none; background: transparent; border: 0;
    color: var(--text-dim);
    font-size: 14px; font-weight: 500;
    padding: 12px 20px;
    cursor: pointer;
    transition: color 0.18s;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255, 255, 255, 0.15);
    text-decoration-thickness: 1px;
  }
  .skip-btn:hover { color: var(--text); text-decoration-color: var(--text-dim); }

  .empty-state {
    max-width: 360px; margin: 40px auto 0;
    text-align: center;
  }
  .empty-state .icon {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-bright);
  }
  .empty-state .icon svg { width: 32px; height: 32px; }
  .empty-state h3 { margin: 0 0 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .empty-state p { margin: 0; color: var(--text-dim); font-size: 14px; line-height: 1.55; }

  /* ===== Menu sheet (gear icon) ===== */
  .scrim {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.28s var(--ease-out);
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 201;
    max-height: 86vh; max-height: 86dvh;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: rgba(18, 18, 22, 0.96);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border: 1px solid var(--line);
    border-bottom: 0;
    padding: 12px 18px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(102%);
    transition: transform 0.34s var(--ease);
    box-shadow: 0 -24px 60px -12px rgba(0, 0, 0, 0.6);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grab {
    width: 36px; height: 4px; margin: 0 auto 14px;
    background: var(--line-2); border-radius: 999px;
  }
  .sheet h3 {
    margin: 0 0 16px;
    font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
    text-align: center;
  }
  .sheet-section { margin-bottom: 20px; }
  .sheet-section h4 {
    margin: 0 0 8px;
    color: var(--gold-bright);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .sheet-section .sub {
    color: var(--text-muted); font-size: 12px;
    margin-top: -4px; margin-bottom: 8px;
  }
  .sheet-action {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d; border: 0;
    border-radius: var(--radius);
    padding: 14px 22px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; min-height: 50px;
    box-shadow: 0 10px 28px -10px var(--gold);
    transition: transform 0.12s, opacity 0.15s;
  }
  .sheet-action:active { transform: scale(0.98); }
  .sheet-action:disabled { opacity: 0.5; box-shadow: none; cursor: not-allowed; }
  .mine-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.025);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
  }
  .mine-row .mine-cat {
    font-size: 10px; color: var(--gold-bright);
    font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
    width: 70px;
  }
  .mine-row .mine-text { flex: 1; font-size: 13px; }
  .mine-row .mine-text .t { font-weight: 600; }
  .mine-row .mine-text .a { color: var(--text-dim); }
  .mine-row .mine-remove {
    appearance: none; background: transparent;
    color: var(--text-muted);
    border: 0; cursor: pointer;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .mine-row .mine-remove:hover { color: var(--bad); background: rgba(217, 102, 102, 0.08); }
  .mine-row .mine-remove svg { width: 14px; height: 14px; }
  .mine-empty { color: var(--text-muted); font-size: 13px; padding: 12px 0; text-align: center; }
  .send-hint { margin-top: 10px; font-size: 11px; color: var(--text-muted); text-align: center; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: calc(20px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(14px);
    background: rgba(28, 28, 32, 0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    z-index: 300;
    opacity: 0; pointer-events: none;
    transition: opacity 0.26s var(--ease-out), transform 0.26s var(--ease-out);
    max-width: calc(100% - 32px); text-align: center;
    box-shadow: 0 16px 40px -10px rgba(0, 0, 0, 0.6);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== Tablet & desktop ===== */
  @media (min-width: 720px) {
    .stage { padding-top: calc(80px + env(safe-area-inset-top)); }
    .progress-line { margin-bottom: 26px; }
    .art-wrap { width: 360px; }
    .meta .title { font-size: 30px; }
    .meta .by { font-size: 15px; margin-top: 10px; }
    .comment-row { max-width: 460px; }
    .cats { max-width: 460px; }
    .cat-pill { padding: 16px; }
    .ob-hero h1 { font-size: 34px; }
  }
  @media (min-width: 1024px) {
    .art-wrap { width: 380px; }
    .meta .title { font-size: 32px; }
  }
</style>
</head>
<body>

<div id="ambient"></div>

<!-- Top bar -->
<div class="top-bar" id="top-bar" hidden>
  <div class="who-chip" id="who-chip"><span class="dot"></span><span id="who-name">…</span></div>
  <div class="right-controls">
    <div class="lang-toggle" id="lang-toggle">
      <button type="button" data-lang="ru">RU</button>
      <button type="button" data-lang="en">EN</button>
    </div>
    <button type="button" class="icon-btn" id="menu-btn" aria-label="меню">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
</div>

<!-- Onboarding -->
<div id="onboarding" hidden>
  <div class="ob-inner">
    <div class="ob-hero">
      <div class="mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
      <h1 data-i18n="ob.h1"></h1>
      <div class="sub" data-i18n="ob.sub"></div>
    </div>

    <div class="ob-block">
      <span class="ob-label" data-i18n="ob.who"></span>
      <div class="ob-pick" id="ob-user">
        <button type="button" data-user="Юля">Юля</button>
        <button type="button" data-user="Артур">Артур</button>
      </div>
    </div>

    <div class="ob-block">
      <span class="ob-label" data-i18n="ob.service"></span>
      <div class="ob-pick" id="ob-service">
        <button type="button" data-service="apple">Apple Music</button>
        <button type="button" data-service="spotify">Spotify</button>
      </div>
    </div>

    <div id="ob-note" class="ob-note" hidden></div>

    <button type="button" id="ob-go" class="ob-go" disabled data-i18n="ob.go"></button>
  </div>
</div>

<!-- Discovery (card view) -->
<div id="discovery" class="stage" hidden>
  <div class="progress-line">
    <span class="n" id="progress-n">0</span> <span data-i18n="of"></span> <span class="n" id="progress-total">0</span> <span data-i18n="tracks"></span>
  </div>
  <div id="card-host"></div>
</div>

<!-- Sheet (menu / collected / send) -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog">
  <div class="sheet-grab"></div>
  <h3 data-i18n="menu.title"></h3>

  <div class="sheet-section">
    <h4 data-i18n="menu.collected"></h4>
    <div class="sub" data-i18n="menu.collectedSub"></div>
    <div id="mine-list"></div>
  </div>

  <div class="sheet-section">
    <h4 data-i18n="menu.share"></h4>
    <div class="sub" data-i18n="menu.shareSub"></div>
    <button type="button" id="send-report" class="sheet-action" data-i18n="menu.sendBtn"></button>
    <div class="send-hint" id="send-status"></div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  'use strict';

  const K_NAME = 'venchanie_user_name';
  const K_SERVICE = 'venchanie_service_v1';
  const K_LANG = 'venchanie_lang';
  const API = 'https://api.akoev.com';

  /* ===== i18n ===== */
  const T = {
    ru: {
      'ob.h1': 'Музыка к венчанию',
      'ob.sub': '12 июля 2026 · Франция',
      'ob.who': 'Кто ты',
      'ob.service': 'Сервис',
      'ob.noteHTML': '<strong>Перед началом</strong> — открой <a href="{href}" target="_blank" rel="noopener">{name}</a> в этом Safari и войди под своим аккаунтом. Нужна подписка, чтобы играли полные треки — без неё только 30 секунд.',
      'ob.go': 'Начнём',
      'of': 'из',
      'tracks': 'треков',
      'card.listen': 'Послушать',
      'card.listenAnother': 'Открыть плеер',
      'card.commentPh': 'комментарий (необязательно)',
      'card.placeAt': 'Куда определить',
      'card.skip': 'Пропустить, дальше',
      'cat.Лаунж.short': 'Лаунж',
      'cat.LOVERS.short': 'LOVERS',
      'cat.Торт.short': 'Торт',
      'cat.DJ Микки.short': 'DJ Микки',
      'cat.Юля.short': 'Юля',
      'cat.Вилла.short': 'Вилла',
      'cat.Лаунж.ctx': '17:30–19:00 · фон',
      'cat.LOVERS.ctx': 'кавер-программа',
      'cat.Торт.ctx': '20–40 секунд',
      'cat.DJ Микки.ctx': '22:30–23:00',
      'cat.Юля.ctx': '«наши» треки',
      'cat.Вилла.ctx': '10 июля · 17–23',
      'menu.title': 'Меню',
      'menu.collected': 'Что собрано',
      'menu.collectedSub': 'все песни, которые отобраны в этапы (от обоих)',
      'menu.share': 'Отправить Артуру',
      'menu.shareSub': 'на почту akotiaa02@gmail.com',
      'menu.sendBtn': 'Отправить отчёт',
      'toast.skipped': 'Пропустила',
      'toast.assigned': 'В этап «{cat}»',
      'toast.removed': 'Убрала',
      'toast.failed': 'Не получилось — попробуй ещё раз',
      'toast.sent': '✓ Отчёт отправлен',
      'toast.savedPending': '✓ Сохранено',
      'toast.allDone': 'Всё пройдено! Открой меню, чтобы отправить.',
      'confirmRemove': 'Убрать «{title}»?',
      'confirmSend': 'Отправить отчёт сейчас?',
      'confirmSwitch': 'Переключиться на {next}?',
      'sending': 'Отправляем…',
      'sendStatus': '✓ Отправлено (всего: {n})',
      'allDoneTitle': 'Всё пройдено',
      'allDoneText': 'Ты прошлась по всей библиотеке. Открой меню, чтобы посмотреть собранное или отправить.',
      'pluralTrack': (n) => ruPlural(n, 'трек', 'трека', 'треков')
    },
    en: {
      'ob.h1': 'Wedding music',
      'ob.sub': 'July 12, 2026 · France',
      'ob.who': 'Who are you',
      'ob.service': 'Service',
      'ob.noteHTML': '<strong>Before you start</strong> — open <a href="{href}" target="_blank" rel="noopener">{name}</a> in this Safari and sign in. You need a subscription for full tracks — without one, only 30 seconds.',
      'ob.go': "Let's go",
      'of': 'of',
      'tracks': 'tracks',
      'card.listen': 'Listen',
      'card.listenAnother': 'Open player',
      'card.commentPh': 'comment (optional)',
      'card.placeAt': 'Place into',
      'card.skip': 'Skip, next',
      'cat.Лаунж.short': 'Lounge',
      'cat.LOVERS.short': 'LOVERS',
      'cat.Торт.short': 'Cake',
      'cat.DJ Микки.short': 'DJ Micky',
      'cat.Юля.short': 'Yulia',
      'cat.Вилла.short': 'Villa',
      'cat.Лаунж.ctx': '17:30–19:00 · ambient',
      'cat.LOVERS.ctx': 'cover band',
      'cat.Торт.ctx': '20–40 seconds',
      'cat.DJ Микки.ctx': '22:30–23:00',
      'cat.Юля.ctx': '"our" tracks',
      'cat.Вилла.ctx': 'July 10 · 17–23',
      'menu.title': 'Menu',
      'menu.collected': 'Collected',
      'menu.collectedSub': 'songs placed into stages (both users)',
      'menu.share': 'Send to Артур',
      'menu.shareSub': 'to akotiaa02@gmail.com',
      'menu.sendBtn': 'Send report',
      'toast.skipped': 'Skipped',
      'toast.assigned': 'Placed in "{cat}"',
      'toast.removed': 'Removed',
      'toast.failed': "Didn't work — try again",
      'toast.sent': '✓ Report sent',
      'toast.savedPending': '✓ Saved',
      'toast.allDone': "All done! Open menu to send.",
      'confirmRemove': 'Remove «{title}»?',
      'confirmSend': 'Send report now?',
      'confirmSwitch': 'Switch to {next}?',
      'sending': 'Sending…',
      'sendStatus': '✓ Sent (total: {n})',
      'allDoneTitle': "All done",
      'allDoneText': "You've been through the whole library. Open the menu to review and send.",
      'pluralTrack': (n) => n === 1 ? 'track' : 'tracks'
    }
  };
  function ruPlural(n, one, few, many) {
    const m10 = Math.abs(n) % 10, m100 = Math.abs(n) % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
    return many;
  }
  let lang = lsGet(K_LANG, 'ru'); if (!T[lang]) lang = 'ru';
  function t(key, params) {
    const v = T[lang]?.[key] ?? T.ru[key] ?? key;
    if (typeof v === 'function') return v(params);
    if (typeof v !== 'string') return v;
    return v.replace(/\{(\w+)\}/g, (_, k) => params?.[k] ?? `{${k}}`);
  }
  function applyStaticI18n() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  }

  function lsGet(k, dflt) { try { const v = localStorage.getItem(k); return v == null ? dflt : v; } catch (e) { return dflt; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmt(n) { return new Intl.NumberFormat(lang === 'ru' ? 'ru-RU' : 'en-US').format(n); }

  /* ===== state ===== */
  let userName = lsGet(K_NAME, '');
  let service = lsGet(K_SERVICE, '');
  let currentSong = null;
  let currentArtwork = null;
  let progressN = 0;
  let progressTotal = 0;

  /* ===== onboarding ===== */
  const onboardingEl = document.getElementById('onboarding');
  const discoveryEl = document.getElementById('discovery');
  const topBarEl = document.getElementById('top-bar');
  const obGo = document.getElementById('ob-go');
  const obNote = document.getElementById('ob-note');
  let pickedUser = '', pickedService = '';

  function updateObGo() { obGo.disabled = !(pickedUser && pickedService); }
  function updateObNote() {
    if (!pickedService) { obNote.hidden = true; return; }
    obNote.hidden = false;
    const href = pickedService === 'apple' ? 'https://music.apple.com' : 'https://open.spotify.com';
    const name = pickedService === 'apple' ? 'Apple Music' : 'Spotify';
    obNote.innerHTML = t('ob.noteHTML', { href: escapeHtml(href), name: escapeHtml(name) });
  }
  document.querySelectorAll('#ob-user button').forEach(b => {
    b.addEventListener('click', () => {
      pickedUser = b.dataset.user;
      document.querySelectorAll('#ob-user button').forEach(x => x.classList.toggle('active', x === b));
      updateObGo();
    });
  });
  document.querySelectorAll('#ob-service button').forEach(b => {
    b.addEventListener('click', () => {
      pickedService = b.dataset.service;
      document.querySelectorAll('#ob-service button').forEach(x => x.classList.toggle('active', x === b));
      updateObNote(); updateObGo();
    });
  });
  obGo.addEventListener('click', () => {
    if (obGo.disabled) return;
    userName = pickedUser; service = pickedService;
    lsSet(K_NAME, userName); lsSet(K_SERVICE, service);
    boot();
  });

  function showOnboarding() {
    discoveryEl.hidden = true; topBarEl.hidden = true; onboardingEl.hidden = false;
    if (userName) {
      pickedUser = userName;
      document.querySelectorAll('#ob-user button').forEach(b => b.classList.toggle('active', b.dataset.user === userName));
    }
    if (service) {
      pickedService = service;
      document.querySelectorAll('#ob-service button').forEach(b => b.classList.toggle('active', b.dataset.service === service));
      updateObNote();
    }
    updateObGo();
  }

  /* ===== lang toggle ===== */
  document.querySelectorAll('#lang-toggle button').forEach(b => {
    b.addEventListener('click', () => {
      const newLang = b.dataset.lang;
      if (newLang === lang || !T[newLang]) return;
      lang = newLang; lsSet(K_LANG, lang);
      applyStaticI18n();
      document.querySelectorAll('#lang-toggle button').forEach(x => x.classList.toggle('active', x.dataset.lang === lang));
      // re-render current card if showing
      if (currentSong) renderCard(currentSong);
      // re-render progress label
      document.getElementById('progress-n').textContent = fmt(progressN);
      document.getElementById('progress-total').textContent = fmt(progressTotal);
    });
  });
  function updateLangUI() {
    document.querySelectorAll('#lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  }

  /* ===== who chip (switch user) ===== */
  const whoNameEl = document.getElementById('who-name');
  document.getElementById('who-chip').addEventListener('click', () => {
    const next = userName === 'Юля' ? 'Артур' : 'Юля';
    if (!confirm(t('confirmSwitch', { next }))) return;
    userName = next; lsSet(K_NAME, userName);
    whoNameEl.textContent = userName;
    boot();
  });

  /* ===== API ===== */
  async function apiNext() {
    try {
      const r = await fetch(`${API}/api/library/next?user=${encodeURIComponent(userName)}`);
      if (!r.ok) return null;
      return await r.json();
    } catch (e) { return null; }
  }
  async function apiAction(payload) {
    try {
      const r = await fetch(`${API}/api/library/action`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!r.ok) return { ok: false };
      return await r.json();
    } catch (e) { return { ok: false }; }
  }
  async function apiMine() {
    try {
      const r = await fetch(`${API}/api/library/mine?user=${encodeURIComponent(userName)}`);
      if (!r.ok) return [];
      const d = await r.json();
      return d.songs || [];
    } catch (e) { return []; }
  }
  async function apiSubmit() {
    try {
      const r = await fetch(`${API}/api/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: userName, service })
      });
      if (!r.ok) return { ok: false };
      return await r.json();
    } catch (e) { return { ok: false }; }
  }

  /* ===== iTunes artwork lookup (with simple in-memory cache) ===== */
  const artCache = new Map();
  async function lookupITunes(artist, title) {
    const key = `${artist}|${title}`.toLowerCase();
    if (artCache.has(key)) return artCache.get(key);
    let result = null;
    for (const c of ['us', 'ru', 'fr']) {
      try {
        const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(`${artist} ${title}`)}&entity=song&limit=1&media=music&country=${c}`);
        if (!r.ok) continue;
        const d = await r.json();
        const hit = d.results?.[0];
        if (hit?.trackViewUrl) {
          result = {
            embedUrl: hit.trackViewUrl.replace(/^https?:\/\/music\.apple\.com\//, 'https://embed.music.apple.com/'),
            artwork600: hit.artworkUrl100 ? hit.artworkUrl100.replace('100x100bb', '600x600bb') : null,
            artwork1200: hit.artworkUrl100 ? hit.artworkUrl100.replace('100x100bb', '1200x1200bb') : null
          };
          break;
        }
      } catch (e) {}
    }
    artCache.set(key, result);
    return result;
  }

  /* ===== Card render ===== */
  const CATEGORIES = ['Лаунж', 'LOVERS', 'Торт', 'DJ Микки', 'Юля', 'Вилла'];
  const cardHost = document.getElementById('card-host');
  let cardEl = null;

  async function renderCard(song) {
    currentSong = song;
    // Build card DOM
    const yearStr = song.year ? `<span class="year">· ${song.year}</span>` : '';
    const catsHTML = CATEGORIES.map(cat => `
      <button class="cat-pill" data-cat="${escapeHtml(cat)}">
        <span class="nm">${escapeHtml(t(`cat.${cat}.short`))}</span>
        <span class="ctx">${escapeHtml(t(`cat.${cat}.ctx`))}</span>
      </button>
    `).join('');
    const html = `
      <div class="card entering" id="card">
        <div class="art-wrap">
          <div class="art-img placeholder" id="art">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
        </div>
        <div class="meta">
          <div class="title">${escapeHtml(song.title)}</div>
          <div class="by">${escapeHtml(song.artist)} ${yearStr}</div>
        </div>
        <div class="listen">
          <button type="button" class="listen-btn" id="listen-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l14 8-14 8z"/></svg>
            <span>${escapeHtml(t('card.listen'))}</span>
          </button>
          <div class="player-slot" id="player-slot"></div>
        </div>
        <div class="comment-row">
          <textarea id="comment-input" placeholder="${escapeHtml(t('card.commentPh'))}" rows="1"></textarea>
        </div>
        <div class="cats">
          <div class="cats-label">${escapeHtml(t('card.placeAt'))}</div>
          <div class="cats-grid">${catsHTML}</div>
        </div>
        <div class="skip-row">
          <button type="button" class="skip-btn" id="skip-btn">${escapeHtml(t('card.skip'))} →</button>
        </div>
      </div>
    `;
    cardHost.innerHTML = html;
    cardEl = document.getElementById('card');
    // entering animation
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { cardEl.classList.remove('entering'); });
    });
    // Wire up controls
    const listenBtn = document.getElementById('listen-btn');
    const playerSlot = document.getElementById('player-slot');
    let isPlaying = false;
    listenBtn.addEventListener('click', () => {
      if (isPlaying) return;
      isPlaying = true;
      listenBtn.classList.add('playing');
      listenBtn.querySelector('span').textContent = t('card.listenAnother');
      // load iframe
      const iframe = document.createElement('iframe');
      if (service === 'spotify') {
        // Best-effort: try song.link or direct itunes-based lookup; for now use Apple Music embed (works for both subscribers)
      }
      // Use iTunes lookup to get apple music embed
      lookupITunes(song.artist, song.title).then(info => {
        if (info?.embedUrl && currentSong?.id === song.id) {
          iframe.src = info.embedUrl;
          iframe.allow = 'autoplay *; encrypted-media *;';
          iframe.setAttribute('sandbox', 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation');
          iframe.loading = 'lazy';
          playerSlot.appendChild(iframe);
          playerSlot.classList.add('open');
        } else if (currentSong?.id === song.id) {
          playerSlot.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">Apple Music: не найдено</div>';
          playerSlot.classList.add('open');
        }
      });
    });
    const skipBtn = document.getElementById('skip-btn');
    skipBtn.addEventListener('click', () => act('skip'));
    cardHost.querySelectorAll('.cat-pill').forEach(b => {
      b.addEventListener('click', () => act('assign', b.dataset.cat));
    });
    // Auto-grow textarea
    const ta = document.getElementById('comment-input');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });

    // Load artwork
    lookupITunes(song.artist, song.title).then(info => {
      if (currentSong?.id !== song.id) return;
      if (info?.artwork600) {
        const art = document.getElementById('art');
        const big = new Image();
        big.onload = () => {
          if (currentSong?.id !== song.id) return;
          art.style.backgroundImage = `url("${info.artwork600}")`;
          art.classList.remove('placeholder');
          // ambient tint
          setAmbient(info.artwork600);
        };
        big.src = info.artwork600;
      }
    });
  }

  function setAmbient(url) {
    // tint the background subtly with the artwork
    const amb = document.getElementById('ambient');
    amb.style.background = `radial-gradient(ellipse 1400px 800px at 50% -200px, rgba(212,164,92,0.12), transparent 60%), linear-gradient(180deg, var(--bg-1), var(--bg) 65%)`;
  }

  function renderEmpty() {
    currentSong = null;
    cardHost.innerHTML = `
      <div class="empty-state">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <h3>${escapeHtml(t('allDoneTitle'))}</h3>
        <p>${escapeHtml(t('allDoneText'))}</p>
      </div>
    `;
    setAmbient(null);
  }

  async function act(action, category) {
    if (!currentSong) return;
    const commentEl = document.getElementById('comment-input');
    const comment = commentEl ? commentEl.value.trim() : '';
    const payload = { song_id: currentSong.id, user: userName, action };
    if (category) payload.category = category;
    if (comment) payload.comment = comment;
    // Optimistic UI: animate out
    if (cardEl) {
      cardEl.classList.add('leaving');
      await new Promise(r => setTimeout(r, 320));
    }
    const res = await apiAction(payload);
    if (!res.ok) {
      showToast(t('toast.failed'));
      await loadNext();
      return;
    }
    if (action === 'assign') showToast(t('toast.assigned', { cat: t(`cat.${category}.short`) }));
    else if (action === 'skip') showToast(t('toast.skipped'));
    progressN++;
    await loadNext();
  }

  async function loadNext() {
    document.getElementById('progress-n').textContent = fmt(progressN);
    const d = await apiNext();
    if (d?.total != null) {
      progressTotal = d.total;
      document.getElementById('progress-total').textContent = fmt(progressTotal);
    }
    if (d?.processed != null) {
      progressN = d.processed;
      document.getElementById('progress-n').textContent = fmt(progressN);
    }
    if (!d || !d.song) {
      renderEmpty();
      return;
    }
    renderCard(d.song);
  }

  /* ===== Menu (sheet) ===== */
  const scrim = document.getElementById('scrim');
  const sheet = document.getElementById('sheet');
  document.getElementById('menu-btn').addEventListener('click', openMenu);
  scrim.addEventListener('click', closeMenu);
  function openMenu() {
    renderMine();
    scrim.classList.add('open');
    sheet.classList.add('open');
  }
  function closeMenu() {
    scrim.classList.remove('open');
    sheet.classList.remove('open');
  }

  async function renderMine() {
    const mineList = document.getElementById('mine-list');
    mineList.innerHTML = `<div class="mine-empty">…</div>`;
    const songs = await apiMine();
    if (songs.length === 0) {
      mineList.innerHTML = `<div class="mine-empty">${escapeHtml(lang === 'ru' ? 'пока пусто — отбирай треки из карточек' : 'empty — start picking from cards')}</div>`;
      return;
    }
    mineList.innerHTML = songs.map(s => `
      <div class="mine-row" data-song-id="${s.id}">
        <div class="mine-cat">${escapeHtml(t(`cat.${s.category}.short`))}</div>
        <div class="mine-text">
          <div class="t">${escapeHtml(s.title)}</div>
          <div class="a">${escapeHtml(s.artist)}</div>
        </div>
        <button type="button" class="mine-remove" data-song-id="${s.id}" aria-label="убрать">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
    mineList.querySelectorAll('.mine-remove').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.songId);
        const row = btn.closest('.mine-row');
        const title = row?.querySelector('.t')?.textContent || '';
        if (!confirm(t('confirmRemove', { title }))) return;
        const res = await apiAction({ song_id: id, user: userName, action: 'reset' });
        if (res.ok) {
          row.remove();
          showToast(t('toast.removed'));
          // refresh next-card progress since this song is now unprocessed for this user
          loadNext();
        } else {
          showToast(t('toast.failed'));
        }
      });
    });
  }

  /* ===== Send report ===== */
  const sendBtn = document.getElementById('send-report');
  const sendStatus = document.getElementById('send-status');
  sendBtn.addEventListener('click', async () => {
    if (!confirm(t('confirmSend'))) return;
    sendBtn.disabled = true;
    const orig = t('menu.sendBtn');
    sendBtn.textContent = t('sending');
    const res = await apiSubmit();
    sendBtn.disabled = false;
    sendBtn.textContent = orig;
    if (res?.ok) {
      sendStatus.textContent = t('sendStatus', { n: res.submit_count || 1 });
      showToast(res.emailed ? t('toast.sent') : t('toast.savedPending'));
      closeMenu();
    } else {
      showToast(t('toast.failed'));
    }
  });

  /* ===== Toast ===== */
  const toastEl = document.getElementById('toast');
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  /* ===== boot ===== */
  function boot() {
    onboardingEl.hidden = true;
    discoveryEl.hidden = false;
    topBarEl.hidden = false;
    whoNameEl.textContent = userName;
    progressN = 0; progressTotal = 0;
    loadNext();
    // background server-side user upsert
    fetch(`${API}/api/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: userName, service })
    }).catch(() => {});
  }

  // init
  applyStaticI18n();
  updateLangUI();
  if (userName && service) boot();
  else showOnboarding();
})();
</script>
</body>
</html>
