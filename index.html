  function openCommentEditor(triggerEl, songId, items) {
    const it = items.find(x => x.id === songId);
    if (!it) return;
    const wrap = triggerEl.closest('.mine-item');
    if (!wrap || wrap.querySelector('.mine-comment-editor')) return;
    const original = it.comment || '';
    const editor = document.createElement('div');
    editor.className = 'mine-comment-editor';
    editor.innerHTML = `
      <textarea>${escapeHtml(original)}</textarea>
      <div class="mce-actions">
        <div class="mce-left">
          <button type="button" class="mce-save">${escapeHtml(t('mine.commentSave'))}</button>
          <button type="button" class="mce-cancel">${escapeHtml(t('mine.commentCancel'))}</button>
        </div>
        ${original ? `<button type="button" class="mce-delete">${escapeHtml(t('mine.commentDelete'))}</button>` : ''}
      </div>
    `;
    // Hide the original comment / add-button
    triggerEl.style.display = 'none';
    wrap.querySelector('.mi-text').appendChild(editor);
    const ta = editor.querySelector('textarea');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    editor.querySelector('.mce-cancel').addEventListener('click', () => {
      editor.remove();
      triggerEl.style.display = '';
    });
    editor.querySelector('.mce-save').addEventListener('click', async () => {
      const txt = ta.value.trim();
      editor.querySelector('.mce-save').disabled = true;
      const r = await apiAction({ song_id: songId, user: userName, action: 'comment', comment: txt });
      // Queued = transient (will retry via drain). Treat as save for UX —
      // don't re-enable the button or the user will tap again and duplicate.
      // Only dropped (4xx) is a true permanent fail.
      if (r.ok || r.queued) { showToast(t('save.saved')); it.comment = txt; renderMinePicks(); }
      else { showToast(t('toast.failed')); editor.querySelector('.mce-save').disabled = false; }
    });
    const delBtn = editor.querySelector('.mce-delete');
    if (delBtn) delBtn.addEventListener('click', async () => {
      delBtn.disabled = true;
      const r = await apiAction({ song_id: songId, user: userName, action: 'comment', comment: '' });
      if (r.ok || r.queued) { showToast(t('save.saved')); it.comment = ''; renderMinePicks(); }
      else { showToast(t('toast.failed')); delBtn.disabled = false; }
    });
  }

  async function updateMineCounts() {

    // Hard reset for the next person on this device:
    //   1. localStorage K_NAME + the mm_user cookie  → identity gone
    //   2. queue items tagged for the OLD user      → they don't drain as the new user
    //   3. K_SNAPSHOTS + in-memory snapshots         → no leftover edits replay under
    //      the new identity (real identity-bleed; the audit caught this hole on top
    //      of the cookie fix)
    //   4. K_DRAFTS + in-memory drafts               → ditto for unsaved comment drafts
    //   5. K_CAT cookie                              → don't pre-select the prior user's cat
    const oldName = userName;
    userName = '';
    try { lsDel(K_NAME); } catch {}
    try { setCookie('mm_user', '', -1); } catch {}
    try { lsDel(K_CAT); } catch {}
    try { setCookie('mm_cat', '', -1); } catch {}
    try {
      const q = qGet().filter(x => x.user !== oldName);
      qSet(q);
    } catch {}
    try { localStorage.removeItem(K_SNAPSHOTS); for (const k of Object.keys(snapshots)) delete snapshots[k]; } catch {}
    try { localStorage.removeItem(K_DRAFTS); for (const k of Object.keys(drafts)) delete drafts[k]; } catch {}
    closeOv('settings-overlay');
    showScreen('ob');
  });
  document.getElementById('send-report-btn').addEventListener('click', async () => {
    const ok = confirm(t('confirm.send'));
    if (!ok) return;
    const btn = document.getElementById('send-report-btn');
    btn.disabled = true;
    const r = await apiSubmit();
    btn.disabled = false;
    if (r.ok) showToast(t('toast.reportSent'));
    else showToast(t('toast.failed'));
  });
  // Download commented songs as a .txt file. Pulls from /api/share-text which
  // now returns only songs that have at least one comment, grouped by category.
  document.getElementById('download-comments-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('download-comments-btn');
    btn.disabled = true;
    try {
      const r = await fetchWithRetry(`${API}/api/share-text?user=${encodeURIComponent(userName)}`, {}, 2, 20000);
      if (!r.ok) throw new Error('http');
      const d = await r.json();
      const text = (d.text || '').trim() || 'Пока нет комментариев.';
      const blob = new Blob([text + '\n'], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const dt = new Date().toISOString().slice(0, 10);
      const a = document.createElement('a');
      a.href = url;
      a.download = `комментарии-${dt}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('Файл сохранён');
    } catch (e) {
      showToast('Не удалось скачать');
    } finally {
      btn.disabled = false;
    }
  });

  /* ===== Add-song overlay ===== */
  let addPreviewTimer = null;
  let addPreviewRunId = 0; // drop stale responses when user keeps typing
  let addPreviewYtId = null; // resolved YouTube id for the current preview (reused on submit)
  let addPreviewExistingId = null; // if preview hit an exact match, its song_id
  let addPreviewSimilarCount = 0; // # fuzzy hits — used to gate submit with a confirm()
  let addParsedArtist = ''; // what the server understood as artist (from split or YouTube title)
  let addParsedTitle = '';  // ditto for title
  const addPreviewCache = new Map(); // key = lowered single-line query
  function openAdd() {
    openOv('add-overlay');
    document.getElementById('add-query').value = '';
    document.getElementById('add-preview').hidden = true;
    addPreviewYtId = null;
    addPreviewExistingId = null;
    addPreviewSimilarCount = 0;
    addParsedArtist = '';
    addParsedTitle = '';
    // Show where this track will land. currentCat is forced to the guest's
    // own cat for Lovers / DJ Микки, so guests always see their target.
    const target = document.getElementById('add-target');
    if (target) {
      if (currentCat) {
        const catLabel = t(`cat.${currentCat}.short`) || currentCat;
        target.innerHTML = t('add.targetCat', { cat: escapeHtml(catLabel) });
      } else {
        target.innerHTML = t('add.targetAll');
      }
      target.hidden = false;
    }
    setTimeout(() => document.getElementById('add-query').focus(), 280);
  }
  document.getElementById('add-query').addEventListener('input', () => {
    if (addPreviewTimer) clearTimeout(addPreviewTimer);
    const q = document.getElementById('add-query').value.trim();
    // Reset preview state on every keystroke so a stale YT id from a previous
    // query never gets bound to a different song on submit.
    addPreviewYtId = null;
    addPreviewExistingId = null;
    addPreviewSimilarCount = 0;
    addParsedArtist = '';
    addParsedTitle = '';
    if (q.length < 3) {
      document.getElementById('add-preview').hidden = true;
      return;
    }
    // 700ms after the user stops typing — long enough not to fire on every
    // character (each call hits YouTube), short enough to feel instant.
    addPreviewTimer = setTimeout(() => previewAdd(q), 700);
  });
  async function previewAdd(q) {
    const prev = document.getElementById('add-preview');
    const thumb = document.getElementById('pv-thumb');
    const status = document.getElementById('pv-status');
    prev.hidden = false;
    prev.classList.remove('is-exact', 'is-found');
    thumb.style.backgroundImage = '';
    thumb.classList.add('empty');
    status.innerHTML = `<div class="pv-hint">${escapeHtml(t('add.searching'))}</div>`;
    const runId = ++addPreviewRunId;
    const cacheKey = q.toLowerCase();
    let data;
    if (addPreviewCache.has(cacheKey)) {
      data = addPreviewCache.get(cacheKey);
    } else {
      try {
        const r = await fetchWithRetry(
          `${API}/api/library/preview?q=${encodeURIComponent(q)}&user=${encodeURIComponent(userName)}`,
          undefined, 1, 20000
        );
        if (!r.ok) { if (runId === addPreviewRunId) { status.innerHTML = `<div class="pv-hint">${escapeHtml(t('add.ytNone'))}</div>`; } return; }
        data = await r.json();
        addPreviewCache.set(cacheKey, data);
      } catch (e) {
        if (runId === addPreviewRunId) status.innerHTML = `<div class="pv-hint">${escapeHtml(t('add.ytNone'))}</div>`;
        return;
      }
    }
    if (runId !== addPreviewRunId) return;
    addPreviewYtId = data.youtube_id || null;
    addPreviewExistingId = data.exact?.id || null;
    addPreviewSimilarCount = (!data.exact && Array.isArray(data.similar)) ? data.similar.length : 0;
    // Server parsed the single-line query into canonical artist/title (either
    // by separator-split or by reading the YouTube result's title). Use those
    // on submit so library_actions stores clean rows.
    addParsedArtist = (data.exact?.artist) || data.artist || '';
    addParsedTitle  = (data.exact?.title)  || data.title  || '';
    if (addPreviewYtId) {
      thumb.style.backgroundImage = `url(https://i.ytimg.com/vi/${addPreviewYtId}/mqdefault.jpg)`;
      thumb.classList.remove('empty');
    }
    let html = '';
    // Show how the server understood the input so the user can see if the
    // parse went wrong (and add a "Artist — Title" separator manually).
    if (addParsedArtist && addParsedTitle) {
      html += `<div class="add-parsed"><span class="ap-label">${escapeHtml(t('add.parsedAs'))}</span><span class="ap-art">${escapeHtml(addParsedArtist)}</span><span class="ap-sep">—</span><span>${escapeHtml(addParsedTitle)}</span></div>`;
    }
    if (data.exact) {
      prev.classList.add('is-exact');
      const aSuffix = (data.exact.added_by === 'Юля' ? 'а' : '');
      html += `<div class="pv-row">${t('add.exactFound', { a: aSuffix, by: escapeHtml(data.exact.added_by || '?') })}</div>`;
      html += `<div class="pv-hint">${escapeHtml(t('add.exactAddOnly'))}</div>`;
    } else if (addPreviewYtId) {
      prev.classList.add('is-found');
      html += `<div class="pv-row">${t('add.ytFound', { id: encodeURIComponent(addPreviewYtId) })}</div>`;
    } else {
      html += `<div class="pv-hint">${escapeHtml(t('add.ytNone'))}</div>`;
    }
    if (!data.exact && Array.isArray(data.similar) && data.similar.length) {
      const items = data.similar.slice(0, 4).map(s => {
        const aSuffix = (s.added_by === 'Юля' ? 'а' : '');
        const by = s.added_by ? `<span class="as-by">${escapeHtml(t('add.byUser', { a: aSuffix, by: s.added_by }))}</span>` : '';
        return `<div class="as-item">${escapeHtml(s.artist)} — ${escapeHtml(s.title)}${by}</div>`;
      }).join('');
      const more = data.similar.length > 4 ? `<div class="pv-hint">${escapeHtml(t('add.similarMore', { n: data.similar.length - 4 }))}</div>` : '';
      html += `<div class="add-similar"><div class="as-head">${escapeHtml(t('add.similarHead'))}</div>${items}${more}</div>`;
    }
    status.innerHTML = html;
  }
  document.getElementById('add-submit').addEventListener('click', async () => {
    const queryStr = document.getElementById('add-query').value.trim();
    // The server's preview either parsed the single-line query into a clean
    // pair OR pulled the canonical pair from the YouTube result's title. We
    // submit those exact values so the library row is stored cleanly even
    // when mom typed something like "abba dancing queen" with no separator.
    let artist = addParsedArtist;
    let title = addParsedTitle;
    if (!artist || !title) {
      // Preview hasn't returned yet (user clicked Add immediately) or the
      // server couldn't split. Try the local same heuristic; otherwise show
      // an inline hint and bail.
      const m = queryStr.match(/^(.+?)\s+[-–—:]\s+(.+)$/);
      if (m) { artist = m[1].trim(); title = m[2].trim(); }
    }
    if (!artist || !title) {
      showToast(t('add.queryHint'));
      return;
    }
    // If the preview surfaced fuzzy-similar tracks but NO exact match, the
    // user might be about to create a duplicate (or a cover/remix that IS a
    // distinct track). Either way, force them to confirm explicitly before
    // we commit a new library row. confirm() is the dumbest, most native UX
    // (mom can't miss it on iOS) — anything fancier risks being swiped past.
    if (addPreviewSimilarCount > 0 && !addPreviewExistingId) {
      const ok = window.confirm(t('add.confirmSimilar'));
      if (!ok) return;
    }
    const btn = document.getElementById('add-submit');
    btn.disabled = true;
    // Fast path: preview already told us the row exists — skip the add POST.
    // Pass through the YT id from preview if we have one so the server
    // doesn't redo the scrape we already did.
    let newSongId;
    let added = false;
    if (addPreviewExistingId) {
      newSongId = addPreviewExistingId;
      added = true;
    } else {
      const r = await apiAddSong(artist, title, addPreviewYtId);
      newSongId = r.song_id;
      added = r.ok || r.error === 'already exists';
      if (!added) { btn.disabled = false; showToast(t('toast.failed')); return; }
    }
    btn.disabled = false;
    if (added) {
      closeOv('add-overlay');
      // Pre-resolve YouTube ID server-side only if we didn't already pass one.
      if (newSongId && !addPreviewYtId) apiYouTube(newSongId).catch(()=>{});
      // Auto-assign to the user's current category so it lands where they
      // were looking. For guests this is always their own cat; for owners on
      // 'общий' (currentCat = '') the song just sits in the catalog.
      if (newSongId && currentCat) {
        const assignRes = await apiAction({ song_id: newSongId, user: userName, action: 'assign', category: currentCat });
        if (assignRes.ok || assignRes.queued) {
          const catLabel = t(`cat.${currentCat}.short`) || currentCat;
          showToast(t('add.addedToCat', { cat: catLabel }));
        } else {
          showToast(t('toast.added'));
        }
      } else {
        showToast(t('toast.added'));
      }
    } else {
      showToast(t('toast.failed'));
    }
  });

  /* ===== Share ===== */
  async function buildShareText() {
    try {
      const r = await fetchWithRetry(`${API}/api/share-text?user=${encodeURIComponent(userName)}`);
      if (!r.ok) return '';
      const d = await r.json();
      return d.text || '';
    } catch (e) { return ''; }
  }
  async function doShare() {
    if (isGuestUser()) return;
    const text = await buildShareText();
    if (!text) { showToast(t('toast.failed')); return; }
    const payload = { title: t('share.title'), text: text, url: 'https://akoev.com/' };
    if (navigator.share) {
      try { await navigator.share(payload); return; }
      catch (e) { if (e?.name === 'AbortError') return; }
    }
    try {
      await navigator.clipboard.writeText(text);
      showToast(t('share.copied'));
    } catch (e) { showToast(t('toast.failed')); }
  }

  /* ===== Periodic background tasks ===== */
  let lastVersionState = null;
  async function periodicSync() {
    if (!userName || !ALLOWED_USERS.has(userName)) return;
    // 0) Drain anything queued, then reconcile with server (catches silent losses)
    await qDrain();
    await reconcileWithServer();
    await qDrain();
    refreshUnsavedBadge();
    // 1) Push any localStorage drafts that haven't been server-saved yet
    for (const sid of Object.keys(drafts)) {
      const text = drafts[sid];
      if (text && text.trim()) {
        apiDraftPush(parseInt(sid, 10), text).catch(() => {});
      }
    }
    // 2) Refresh the current card's others-comments
    if (currentSong) loadOthersComments(currentSong.id);
    // 3) Version + library mutation poll — detect new content
    const v = await apiVersion();
    if (v && lastVersionState) {
      if (v.active_songs !== lastVersionState.active_songs ||
          v.last_added !== lastVersionState.last_added ||
          v.last_removed !== lastVersionState.last_removed) {
        // Library content changed — refresh open overlays
        if (document.getElementById('mine-overlay')?.classList.contains('open')) renderMine();
        if (document.getElementById('all-overlay')?.classList.contains('open')) {
          aoResetForNewFilter();
          document.getElementById('all-results').innerHTML = '<div class="ov-status">…</div>';
          loadAllPage();
        }
      }
    }
    lastVersionState = v;
  }
  let syncTimer = null;
  let lastSyncTs = 0;
  async function periodicSyncDebounced() {
    // Don't fire when tab is hidden — saves battery + request budget.
    if (document.visibilityState === 'hidden') return;
    // Debounce — multiple triggers (focus / visibility / online) can fire
    // within milliseconds of each other; ignore anything within 3s of a sync.
    if (Date.now() - lastSyncTs < 3000) return;
    lastSyncTs = Date.now();
    return periodicSync();
  }
  function startSyncLoop() {
    if (syncTimer) return;
    // Poll every 60s (was 30s) — halves the worker request budget.
    syncTimer = setInterval(periodicSyncDebounced, 60000);
    periodicSyncDebounced();
  }

  // Pull server-side drafts on boot. Local draft wins over server draft when
  // both are non-empty — Mom may have typed a fresh note offline that hasn't
  // synced yet, and we don't want a stale server draft (e.g. Артур's earlier
  // edit on desktop) to clobber it on resume. Server fills only the slots
  // where there's no local draft.
  async function bootstrapDrafts() {
    if (!userName || !ALLOWED_USERS.has(userName)) return;
    const serverDrafts = await apiDraftsPull();
    for (const d of serverDrafts) {
      if (d.comment && d.comment.trim()) {
        const local = drafts[d.song_id];
        if (!local || !String(local).trim()) {
          drafts[d.song_id] = d.comment;
        }
      }
    }
    lsSetJSON(K_DRAFTS, drafts);
  }

  // Refresh on tab focus and after long idles
  window.addEventListener('focus', () => {
    if (currentSong) loadOthersComments(currentSong.id);
    if (document.getElementById('mine-overlay')?.classList.contains('open')) renderMine();
  });
  window.addEventListener('online', () => { periodicSyncDebounced(); });

  /* Soft-keyboard offset for both iOS and Android.
       - iOS Safari: window.innerHeight stays full, visualViewport.height
         shrinks → diff is the keyboard height.
       - Android Chrome: window.innerHeight ALSO shrinks → naive diff = 0.
     Fix: capture the original innerHeight ONCE at load (`baseInnerH`) and
     diff against that. Toggles `body.kbd-open` so layout rules can react
     (e.g. collapse the YT video on iPhone SE to keep rating row reachable). */
  const baseInnerH = window.innerHeight;
  function recomputeKbdOffset() {
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const vyOffset = (window.visualViewport && window.visualViewport.offsetTop) || 0;
    const off = Math.max(0, baseInnerH - vh - vyOffset);
    document.documentElement.style.setProperty('--kbd-offset', off + 'px');
    document.body.classList.toggle('kbd-open', off > 80);
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', recomputeKbdOffset);
    window.visualViewport.addEventListener('scroll', recomputeKbdOffset);
  }
  window.addEventListener('resize', recomputeKbdOffset);
  recomputeKbdOffset();

  /* ===== Boot ===== */
  async function bootstrapAndRecover() {
    diag('boot', { ua: navigator.userAgent, queue: qGet().length, snapshots: Object.keys(lsGetJSON(K_SNAPSHOTS, {})).length });
    // 1) Drain any pending action queue from a previous session
    await qDrain();
    // 2) Recover any standalone card snapshots that never made it to a commit
    //    (rating/category set but the tab was closed before send). Each snapshot
    //    is replayed against the server.
    const pendingSnap = lsGetJSON(K_SNAPSHOTS, {});
    const songIds = Object.keys(pendingSnap);
    for (const sid of songIds) {
      const s = pendingSnap[sid];
      if (!s) continue;
      // Skip totally empty snapshots — nothing to recover.
      const hasState = s.rating || s.categories || (s.comment !== undefined && s.comment !== null);
      if (!hasState) { snapshotClear(sid); continue; }
      const cats = (s.categories || '').split(',').filter(Boolean).join(',');
      const sidInt = parseInt(sid, 10);
      // Comment-only snapshot: route to drafts API (the comment belongs in
      // the drafts table, not library_actions). Pushing as action='comment'
      // would 409 from the server. Drop the snapshot — K_DRAFTS still keeps
      // the comment locally for next-card pre-fill.
      if (!cats && !s.rating && s.comment) {
        apiDraftPush(sidInt, s.comment).catch(() => {});
        snapshotClear(sid);
        continue;
      }
      let action;
      if (cats) action = 'assign';
      else if (s.rating) action = 'rate';
      else action = 'skip';
      const payload = { song_id: sidInt, user: userName, action };
      if (cats) payload.category = cats;
      if (s.rating) payload.rating = s.rating;
      // Include comment even if it's an empty string — that signals "user
      // explicitly cleared the note" and the server needs to propagate it.
      if (s.comment !== undefined && s.comment !== null) payload.comment = s.comment;
      qEnqueue(payload);
    }
    await qDrain();
    // 3) Pull server-side comment drafts (in case mom switched devices)
    await bootstrapDrafts();
    // 4) Reconcile with server: anything locally-believed-saved but missing on
    //    server gets re-queued. Catches the case where iOS Safari silently
    //    failed past sends.
    await reconcileWithServer();
    await qDrain();
    refreshUnsavedBadge();
  }
  // Manual retry: tap the badge to force a drain
  const _ub = document.getElementById('unsaved-badge');
  if (_ub) _ub.addEventListener('click', () => { diag('manual_retry', { count: qGet().length }); qDrain().then(refreshUnsavedBadge); });

  applyStaticI18n();

  // Path-based guest entry: /lovers or /dj. If the visitor isn't an owner
  // (Юля/Артур from prior main-app visit), they post as the group name and
  // are locked to that category. Owners visiting /lovers or /dj keep their
  // identity and just land on that category by default.
  const path = location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase().split('.')[0];
  const guestCat = (path === 'lovers') ? 'LOVERS'
                 : (path === 'dj') ? 'DJ Микки'
                 : null;
  const isOwner = (userName === 'Юля' || userName === 'Артур');
  const isGuest = (userName === 'Lovers' || userName === 'DJ Микки');
  // Stale-guest cleanup: a guest user who lands on root (no guestCat path)
  // shouldn't see the owners' cat-picker. Send them back to their own portal,
  // which re-anchors the guest scope and avoids confusing assign failures.
  if (!guestCat && isGuest) {
    const portal = userName === 'Lovers' ? '/lovers' : '/dj';
    window.location.replace(portal);
    return;
  }
  if (guestCat && !isOwner) {
    // Guest mode — auto-identify and lock to the category.
    userName = guestCat === 'LOVERS' ? 'Lovers' : 'DJ Микки';
    lsSet(K_NAME, userName);
    setCookie('mm_user', userName, 90);
    setCat(guestCat);
  }

  // Apply guest-mode body class IMMEDIATELY once we know we're a guest — even
  // before showScreen/renderCard runs. Otherwise there's a single-frame
  // flash where the guest could see owner-only UI (delete button, share fab,
  // category picker) before showScreen('discovery') sets the class.
  if (isGuest) document.body.classList.add('guest-mode');
  if (!userName || !ALLOWED_USERS.has(userName)) {
    showScreen('ob');
  } else {
    updateWhoChip();
    // Identity-bleed safety net: if we restored an owner identity from cookie /
    // localStorage on cold boot (not a fresh onboarding pick), show a discreet
    // "Welcome back, X · Не я" banner once per browser session so a different
    // family member opening the same phone notices the mis-attribution. Mom
    // ignores it; if Артур's identity is stuck on her phone, she taps Сменить.
    try {
      const isOwnerNow = (userName === 'Юля' || userName === 'Артур');
      const alreadyShown = sessionStorage.getItem('mm_welcome_shown') === '1';
      if (isOwnerNow && !alreadyShown) {
        sessionStorage.setItem('mm_welcome_shown', '1');
        const banner = document.getElementById('welcome-back');
        const textEl = banner?.querySelector('.welcome-back__text');
        const switchBtn = document.getElementById('welcome-back-switch');
        const closeBtn = document.getElementById('welcome-back-close');
        if (banner && textEl && switchBtn && closeBtn) {
          textEl.textContent = t('welcome.back', { n: userName });
          banner.hidden = false;
          // Allow paint before transitioning in.
          requestAnimationFrame(() => banner.classList.add('show'));
          // Push stage content down by ~56px so the banner doesn't visually
          // overlap the progress line / first slice of the video on small
          // / notched phones.
          document.documentElement.style.setProperty('--banner-pad', '56px');
          let dismissed = false;
          const dismiss = () => {
            if (dismissed) return;
            dismissed = true;
            banner.classList.remove('show');
            document.documentElement.style.setProperty('--banner-pad', '0px');
            setTimeout(() => { banner.hidden = true; }, 350);
          };
          // Auto-dismiss after 6 seconds.
          setTimeout(dismiss, 6000);
          closeBtn.addEventListener('click', dismiss);
          switchBtn.addEventListener('click', () => {
            // If the banner auto-dismissed before this click landed (rare race
            // on slow taps), still honour the user's intent — don't bail just
            // because the visual is already gone.
            dismiss();
            // Hard switch — see Settings → switch-user handler for the full
            // rationale. Mirror EVERY clearing step here so a banner-driven
            // switch is just as thorough as a settings-driven one. Otherwise
            // the new person on the phone inherits the prior user's drafts /
            // snapshots / cat preference.
            const oldName = userName;
            userName = '';
            try { lsDel(K_NAME); } catch {}
            try { setCookie('mm_user', '', -1); } catch {}
            try { lsDel(K_CAT); } catch {}
            try { setCookie('mm_cat', '', -1); } catch {}
            try {
              const q = qGet().filter(x => x.user !== oldName);
              qSet(q);
            } catch {}
            try { localStorage.removeItem(K_SNAPSHOTS); for (const k of Object.keys(snapshots)) delete snapshots[k]; } catch {}
            try { localStorage.removeItem(K_DRAFTS); for (const k of Object.keys(drafts)) delete drafts[k]; } catch {}
            showScreen('ob');
          });
        }
      }
    } catch {}
    // Guest mode and owners landing on /lovers or /dj skip the picker.
    const goStraightToDiscovery = guestCat || !!currentCat;
    if (guestCat && isOwner) setCat(guestCat);
    bootstrapAndRecover().then(() => goStraightToDiscovery ? enterDiscovery() : showCatPicker());
    startSyncLoop();
  }
})();
</script>
</body>
</html>
