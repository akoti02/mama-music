<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>Музыка к венчанию</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #08080a;
    --surface: rgba(22, 22, 26, 0.7);
    --surface-2: #15151a;
    --surface-3: rgba(255,255,255,0.04);
    --line: rgba(255, 255, 255, 0.07);
    --line-2: rgba(255, 255, 255, 0.14);
    --text: #f4f4f6;
    --text-dim: #b0b0b8;
    --text-muted: #84848a;
    --gold: #d4a45c;
    --gold-bright: #ecc380;
    --gold-soft: rgba(212, 164, 92, 0.16);
    --bad: #d96666;
    --pink: #f9a8d4;
    --blue: #93c5fd;
    --green: #7dd3a3;
    --radius-sm: 10px;
    --radius: 14px;
    --radius-lg: 22px;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    height: 100%; overflow: hidden;
  }
  [hidden] { display: none !important; }
  button, input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
    border-radius: var(--radius-sm);
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ===== Top bar (minimal) ===== */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(12px + env(safe-area-inset-top)) 14px 10px;
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }
  .who-chip {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 10px 16px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 16px; font-weight: 600;
    color: var(--text);
    cursor: pointer; min-height: 42px;
    transition: background 0.18s, border-color 0.18s;
  }
  .who-chip:hover { background: var(--surface-2); }
  .who-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold-bright); }
  .who-chip.is-yula .dot { background: var(--pink); }
  .who-chip.is-arthur .dot { background: var(--blue); }
  .who-chip.is-sveta .dot { background: var(--green); }
  .icon-btn {
    width: 42px; height: 42px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text);
    transition: background 0.18s, transform 0.1s;
  }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn svg { width: 22px; height: 22px; }
  .top-actions { display: flex; gap: 6px; }

  /* ===== FAB (Share) ===== */
  .fab {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    right: calc(16px + env(safe-area-inset-right));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
    border: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 14px 32px -10px var(--gold), 0 4px 12px -2px rgba(0,0,0,0.4);
    z-index: 90;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .fab:hover { box-shadow: 0 18px 40px -10px var(--gold), 0 4px 12px -2px rgba(0,0,0,0.4); }
  .fab:active { transform: scale(0.94); }
  .fab svg { width: 22px; height: 22px; }

  /* ===== Onboarding ===== */
  .onboard {
    min-height: 100vh; min-height: 100dvh;
    padding: 40px 22px calc(40px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
  }
  .onboard::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 35%, rgba(212, 164, 92, 0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(212, 164, 92, 0.05) 0%, transparent 60%);
    pointer-events: none; z-index: -1;
  }
  .ob-inner {
    width: 100%; max-width: 440px;
    opacity: 0; transform: translateY(8px);
    animation: obIn 0.6s var(--ease-spring) 0.05s forwards;
  }
  @keyframes obIn { to { opacity: 1; transform: translateY(0); } }
  .ob-hero { text-align: center; margin-bottom: 36px; }
  .ob-hero .mark {
    width: 60px; height: 60px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    box-shadow: 0 16px 40px -10px var(--gold);
    display: flex; align-items: center; justify-content: center;
    color: #0a0a0d;
  }
  .ob-hero .mark svg { width: 28px; height: 28px; }
  .ob-hero h1 {
    margin: 0; font-size: 32px; font-weight: 800;
    letter-spacing: -0.025em; line-height: 1.08;
  }
  .ob-hero .sub {
    margin: 12px 0 0; color: var(--text-dim); font-size: 16px;
  }
  .ob-block { margin-bottom: 22px; }
  .ob-label {
    display: block; font-size: 13px;
    color: var(--text-muted); margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;
  }
  .ob-pick { display: flex; gap: 10px; flex-wrap: wrap; }
  .ob-pick.col { flex-direction: column; gap: 12px; }
  .ob-pick button {
    flex: 1; min-width: 100px; appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 14px;
    font-size: 16px; font-weight: 600;
    cursor: pointer; min-height: 64px;
    transition: background 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  .ob-pick button:active { transform: scale(0.97); }
  .ob-pick.col button {
    flex: none; padding: 22px 24px;
    text-align: left;
    display: flex; align-items: center; gap: 16px;
    font-size: 19px; font-weight: 600;
    min-height: 76px;
  }
  .ob-pick.col button .av {
    width: 42px; height: 42px;
    border-radius: 50%; background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ob-pick.col button .av .dot { width: 12px; height: 12px; border-radius: 50%; }
  .ob-pick.col button[data-user="Юля"]   .av .dot { background: var(--pink); }
  .ob-pick.col button[data-user="Артур"]  .av .dot { background: var(--blue); }
  .ob-pick.col button[data-user="Света"]  .av .dot { background: var(--green); }
  .ob-pick button.active {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d; border-color: var(--gold);
    box-shadow: 0 12px 32px -10px var(--gold);
  }
  .ob-note {
    margin-top: 18px; padding: 18px 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-size: 16px; line-height: 1.55;
    color: var(--text-dim);
  }
  .ob-note strong { color: var(--text); font-weight: 700; }
  .ob-note .open-link {
    display: block; margin-top: 16px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
    padding: 14px 18px; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    text-decoration: none; text-align: center;
    box-shadow: 0 10px 28px -10px var(--gold);
  }
  .ob-go {
    width: 100%; appearance: none;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    color: #0a0a0d; border: 0;
    border-radius: var(--radius);
    padding: 20px 22px;
    font-size: 17px; font-weight: 700;
    cursor: pointer; margin-top: 28px;
    box-shadow: 0 16px 32px -12px var(--gold);
    transition: transform 0.15s, opacity 0.15s;
    min-height: 60px;
  }
  .ob-go:active { transform: scale(0.98); }
  .ob-go:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; background: var(--surface-2); color: var(--text-muted); }
  .ob-secondary {
    width: 100%; margin-top: 12px;
    appearance: none; background: transparent;
    color: var(--text-dim);
    border: 0; padding: 14px 22px;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
  }
  .ob-secondary:hover { color: var(--text); }

  /* ===== Stage (discovery) ===== */
  .stage {
    position: fixed; inset: 0;
    padding: calc(64px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .progress-line {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px; letter-spacing: 0.12em; font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 18px;
    flex-shrink: 0;
  }
  .progress-line .n { color: var(--text); font-weight: 800; }
  #card-host {
    flex: 1; min-height: 0;
    display: flex; align-items: flex-start; justify-content: center;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    position: relative;
    scrollbar-width: none;
  }
  #card-host::-webkit-scrollbar { display: none; }

  .card {
    max-width: 480px; width: 100%;
    display: flex; flex-direction: column;
    will-change: transform, opacity;
  }

  .meta {
    text-align: center;
    margin-bottom: 16px;
  }
  .meta .title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.022em; line-height: 1.2;
    color: var(--text); word-wrap: break-word;
  }
  .meta .by {
    margin-top: 6px;
    font-size: 16px; color: var(--text-dim);
    font-weight: 500;
  }
  .meta .by .year { color: var(--text-muted); margin-left: 6px; }

  /* ===== INLINE PLAYER (always visible) ===== */
  .embed-wrap {
    width: 100%;
    height: 175px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface-2);
    box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.7), 0 4px 16px -4px rgba(0, 0, 0, 0.4);
    margin-bottom: 18px;
    position: relative;
  }
  .embed-wrap iframe {
    width: 100%; height: 100%; border: 0;
    background: transparent;
  }
  .embed-wrap.loading::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }
  .embed-wrap.error {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px;
    text-align: center; padding: 18px;
  }

  /* ===== Native Spotify player (custom controls) ===== */
  .sp-player {
    width: 100%;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    margin-bottom: 18px;
    box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.6);
  }
  .sp-art-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 18px;
  }
  .sp-art {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: var(--surface-2) center/cover no-repeat;
    flex-shrink: 0;
    box-shadow: 0 8px 20px -8px rgba(0,0,0,0.5);
  }
  .sp-meta-row { flex: 1; min-width: 0; }
  .sp-meta-row .sp-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-meta-row .sp-by { font-size: 13px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sp-controls {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 12px;
  }
  .sp-btn-sec {
    appearance: none;
    background: var(--surface-3);
    border: 1px solid var(--line);
    color: var(--text);
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    font-size: 10px; font-weight: 700; letter-spacing: -0.02em;
  }
  .sp-btn-sec:hover { background: var(--surface-2); }
  .sp-btn-sec:active { transform: scale(0.92); }
  .sp-btn-play {
    appearance: none;
    background: var(--gold);
    color: #0a0a0d; border: 0;
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    box-shadow: 0 8px 20px -6px var(--gold);
  }
  .sp-btn-play:hover { background: var(--gold-bright); }
  .sp-btn-play:active { transform: scale(0.94); }
  .sp-btn-play svg { width: 22px; height: 22px; }

  .sp-progress {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .sp-time { flex-shrink: 0; min-width: 36px; }
  .sp-time.end { text-align: right; }
  .sp-scrub {
    flex: 1; position: relative;
    height: 16px;
    display: flex; align-items: center;
    cursor: pointer;
    touch-action: none;
  }
  .sp-scrub-track {
    position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
    height: 4px; background: var(--line-2); border-radius: 2px;
    pointer-events: none;
  }
  .sp-scrub-fill {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    height: 4px; background: var(--gold);
    border-radius: 2px;
    pointer-events: none;
    width: 0;
  }
  .sp-scrub-thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%; background: var(--gold-bright);
    pointer-events: none; left: 0;
    box-shadow: 0 0 0 4px rgba(212,164,92,0.16);
  }

  .sp-connect-card {
    width: 100%; margin-bottom: 18px;
    padding: 22px 20px;
    background: linear-gradient(135deg, rgba(29,185,84,0.10), rgba(212,164,92,0.04));
    border: 1px solid rgba(29, 185, 84, 0.32);
    border-radius: var(--radius);
    text-align: center;
  }
  .sp-connect-card .sp-cc-hint {
    font-size: 14px; color: var(--text-dim);
    margin-bottom: 14px; line-height: 1.5;
  }
  .sp-connect-card .sp-cc-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    background: #1db954; color: #ffffff;
    border: 0; border-radius: 999px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    min-height: 48px;
  }
  .sp-connect-card .sp-cc-btn:hover { background: #1ed760; }
  .sp-connect-card .sp-cc-btn:active { transform: scale(0.97); }
  .sp-connect-card .sp-cc-btn svg { width: 18px; height: 18px; }

  .comment-row { margin-bottom: 16px; }
  .comment-row textarea {
    width: 100%; min-height: 50px;
    padding: 14px 18px;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 17px; line-height: 1.45;
    resize: none; overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .comment-row textarea::placeholder { color: var(--text-muted); }
  .comment-row textarea:focus { outline: none; border-color: var(--gold); background: rgba(212,164,92,0.04); }

  .cats { margin-bottom: 14px; }
  .cats-label {
    text-align: center; color: var(--text-muted);
    font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .cats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
  .cat-pill {
    appearance: none;
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 16px; font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s var(--ease-spring);
    display: flex; flex-direction: column; gap: 3px;
    min-height: 56px;
  }
  .cat-pill:hover { border-color: var(--gold-soft); background: var(--surface-2); transform: translateY(-1px); }
  .cat-pill:active { transform: scale(0.97); }
  .cat-pill .nm { font-weight: 700; font-size: 16px; }
  .cat-pill .ctx { font-size: 13px; color: var(--text-muted); font-weight: 500; }

  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px;
    gap: 10px;
  }
  .nav-btn {
    appearance: none; background: transparent; border: 0;
    color: var(--text-dim);
    font-size: 16px; font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
    transition: color 0.18s, transform 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 44px;
  }
  .nav-btn:hover:not(:disabled) { color: var(--text); }
  .nav-btn:active:not(:disabled) { transform: scale(0.96); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn svg { width: 14px; height: 14px; }

  /* ===== Empty state ===== */
  .empty-state {
    max-width: 360px; margin: auto;
    text-align: center;
    padding: 24px;
  }
  .empty-state .icon {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-bright);
  }
  .empty-state .icon svg { width: 32px; height: 32px; }
  .empty-state h3 { margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .empty-state p { margin: 0; color: var(--text-dim); font-size: 16px; line-height: 1.55; }

  /* ===== Sheet (menu) ===== */
  .scrim {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.32s var(--ease-out);
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 201;
    max-height: 88vh; max-height: 88dvh;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: rgba(18, 18, 22, 0.97);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border: 1px solid var(--line); border-bottom: 0;
    padding: 12px 18px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(102%);
    transition: transform 0.42s var(--ease);
    box-shadow: 0 -24px 60px -12px rgba(0, 0, 0, 0.6);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grab { width: 36px; height: 4px; margin: 0 auto 16px; background: var(--line-2); border-radius: 999px; }
  .sheet h3 { margin: 0 0 18px; font-size: 18px; font-weight: 700; text-align: center; letter-spacing: -0.01em; }
  .sheet-section { margin-bottom: 24px; }
  .sheet-section h4 {
    margin: 0 0 10px;
    color: var(--gold-bright);
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Menu rows: tappable items */
  .menu-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
  }

  /* ===== Spotify OAuth (Authorization Code with PKCE) + Web Playback SDK ===== */
  const K_SPOTIFY_VERIFIER = 'venchanie_spotify_verifier';
  const K_SPOTIFY_REFRESH = 'venchanie_spotify_refresh';

  function spotifyToken() {
    const expires = parseInt(lsGet(K_SPOTIFY_EXPIRES, '0'), 10);
    if (!expires || Date.now() > expires) {
      // Try refresh below; for now return null and caller can re-init after refresh
      return null;

  // PKCE helpers
  function spRandomString(length) {
    const arr = new Uint8Array(length);
    crypto.getRandomValues(arr);
    // base64url, trimmed
    return btoa(String.fromCharCode.apply(null, arr))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
      .substring(0, length);
  }
  async function spCodeChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  async function spotifyLogin() {
    const verifier = spRandomString(96);
    lsSet(K_SPOTIFY_VERIFIER, verifier);
    const challenge = await spCodeChallenge(verifier);
    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: 'code',
      redirect_uri: SPOTIFY_REDIRECT,
      code_challenge_method: 'S256',
      code_challenge: challenge,
      scope: SPOTIFY_SCOPES,
      show_dialog: 'false'
    });
    window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
  }

  async function spotifyExchangeCode(code) {
    const verifier = lsGet(K_SPOTIFY_VERIFIER, '');
    if (!verifier) return false;
    const body = new URLSearchParams({
      grant_type: 'authorization_code',
      code: code,
      redirect_uri: SPOTIFY_REDIRECT,
      client_id: SPOTIFY_CLIENT_ID,
      code_verifier: verifier
    });
    try {
      const r = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      });
      if (!r.ok) {
        console.warn('Spotify token exchange failed', r.status, await r.text());
        return false;
      }
      const d = await r.json();
      lsSet(K_SPOTIFY_TOKEN, d.access_token);
      lsSet(K_SPOTIFY_EXPIRES, String(Date.now() + d.expires_in * 1000 - 60000));
      if (d.refresh_token) lsSet(K_SPOTIFY_REFRESH, d.refresh_token);
      localStorage.removeItem(K_SPOTIFY_VERIFIER);
      return true;
    } catch (e) {
      console.warn('Spotify exchange error', e);
      return false;
    }
  }

  async function spotifyRefresh() {
    const refresh = lsGet(K_SPOTIFY_REFRESH, '');
    if (!refresh) return false;
    const body = new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: refresh,
      client_id: SPOTIFY_CLIENT_ID
    });
    try {
      const r = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      });
      if (!r.ok) return false;
      const d = await r.json();
      lsSet(K_SPOTIFY_TOKEN, d.access_token);
      lsSet(K_SPOTIFY_EXPIRES, String(Date.now() + d.expires_in * 1000 - 60000));
      if (d.refresh_token) lsSet(K_SPOTIFY_REFRESH, d.refresh_token);
      return true;
    } catch (e) { return false; }
  }

  async function spotifyParseCallback() {

  // SDK loader + player wrapper

  const spListeners = new Set();

  function spotifyInit() {
    if (spReady || !spotifyToken()) return;

  function spotifyCreatePlayer() {

  async function spotifySearchUri(artist, title) {

  /* ===== iTunes lookup with cache ===== */
  const itunesCache = new Map();
  async function lookupITunes(artist, title) {
    const key = `${artist}|${title}`.toLowerCase();
    if (itunesCache.has(key)) return itunesCache.get(key);
    let result = null;
    for (const c of ['us', 'ru', 'fr']) {
      try {
        const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(`${artist} ${title}`)}&entity=song&limit=1&media=music&country=${c}`);
        if (!r.ok) continue;
        const d = await r.json();
        const hit = d.results?.[0];
        if (hit?.trackViewUrl) {
          result = {
            embedUrl: hit.trackViewUrl.replace(/^https?:\/\/music\.apple\.com\//, 'https://embed.music.apple.com/'),
            artwork600: hit.artworkUrl100 ? hit.artworkUrl100.replace('100x100bb', '600x600bb') : null
          };
          break;
        }
      } catch (e) {}
    }
    itunesCache.set(key, result);
    return result;

    const canBack = seenIdx > 0;
    // Decide which player to render:
    //   spotify + token + ready → custom Spotify SDK player
    //   spotify + no token       → "Войти через Spotify" CTA card
    //   spotify + token + !ready → iframe fallback while SDK loads
    //   apple                    → iframe embed (as before)
    let playerHTML = '<div class="embed-wrap loading" id="embed-wrap"></div>';
    if (service === 'spotify') {
      if (!spotifyToken()) {
        playerHTML = `
          <div class="sp-connect-card">
            <div class="sp-cc-hint">${escapeHtml(t('sp.needLogin'))}</div>
            <button type="button" class="sp-cc-btn" id="sp-connect-btn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 11-.277-1.213c3.81-.871 7.077-.496 9.713 1.114a.623.623 0 01.206.856zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.779.779 0 01-.972-.515.78.78 0 01.514-.971c3.632-1.102 8.147-.568 11.234 1.325a.78.78 0 01.261 1.07zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.935.935 0 11-.542-1.79c3.532-1.072 9.404-.865 13.115 1.338a.935.935 0 01-.956 1.609z"/></svg>
              <span>${escapeHtml(t('sp.connect'))}</span>
            </button>
          </div>
        `;
      } else if (spReady) {
        playerHTML = `<div id="sp-player-host"></div>`;
      } else {
        playerHTML = '<div class="embed-wrap loading" id="embed-wrap"></div>';
      }
    }
    cardHost.innerHTML = `
      <div class="card" id="card">
        <div class="meta">
          <div class="title">${escapeHtml(song.title)}</div>
          <div class="by">${escapeHtml(song.artist)} ${yearStr}</div>
        </div>
        ${playerHTML}
        <div class="comment-row">
          <textarea id="comment-input" placeholder="${escapeHtml(t('card.commentPh'))}" rows="1"></textarea>
        </div>
        <div class="cats">
          <div class="cats-label">${escapeHtml(t('card.placeAt'))}</div>
          <div class="cats-grid">${catsHTML}</div>
        </div>
        <div class="nav-row">
          <button type="button" class="nav-btn" id="back-btn" ${canBack ? '' : 'disabled'}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span>${escapeHtml(t('card.back'))}</span>
          </button>
          <button type="button" class="nav-btn" id="skip-btn">
            <span>${escapeHtml(t('card.skip'))}</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    `;
    cardHost.scrollTop = 0;
    cardEl = document.getElementById('card');
    fAnimate(cardEl, { opacity: [0, 1], scale: [0.98, 1] }, { duration: 0.32, easing: [0.22, 1, 0.36, 1] });

    // Wire skip / back
    document.getElementById('skip-btn').addEventListener('click', () => act('skip'));
    document.getElementById('back-btn').addEventListener('click', () => goBack());
    cardHost.querySelectorAll('.cat-pill').forEach(b => b.addEventListener('click', () => act('assign', b.dataset.cat)));
    const ta = document.getElementById('comment-input');
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });

    // Wire Spotify CTA if shown
    const spConnectBtn = document.getElementById('sp-connect-btn');
    if (spConnectBtn) spConnectBtn.addEventListener('click', spotifyLogin);

    // Render the inline player — custom Spotify player OR iframe fallback
    if (service === 'spotify' && spotifyToken() && spReady) {
      mountSpotifyPlayer(song);
    } else {
      const wrap = document.getElementById('embed-wrap');
      if (wrap) {
        lookupITunes(song.artist, song.title).then(info => {
          if (currentSong?.id !== song.id) return;
          wrap.classList.remove('loading');
          if (!info?.embedUrl) {
            wrap.classList.add('error');
            wrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg><div style="margin-top:8px">${escapeHtml(t('embed.notFound'))}</div>`;
            return;
          }
          const iframe = document.createElement('iframe');
          iframe.src = info.embedUrl;
          iframe.allow = 'autoplay *; encrypted-media *;';
          iframe.setAttribute('sandbox', 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation');
          iframe.loading = 'lazy';
          wrap.appendChild(iframe);
        });
      }
    }

    // Setup swipe gestures on the card area (excluding iframe)
    setupSwipe(cardEl);
  }

  function mountSpotifyPlayer(song) {
    const host = document.getElementById('sp-player-host');
    if (!host) return;
    host.innerHTML = `
      <div class="sp-player">
        <div class="sp-art-row">
          <div class="sp-art" id="sp-art-${song.id}"></div>
          <div class="sp-meta-row">
            <div class="sp-title">${escapeHtml(song.title)}</div>
            <div class="sp-by">${escapeHtml(song.artist)}</div>
          </div>
        </div>
        <div class="sp-controls">
          <button type="button" class="sp-btn-sec" id="sp-back5" aria-label="${escapeHtml(t('pl.back5'))}">−5</button>
          <button type="button" class="sp-btn-play" id="sp-toggle" aria-label="${escapeHtml(t('pl.play'))}">
            <svg id="sp-toggle-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l14 8-14 8z"/></svg>
          </button>
          <button type="button" class="sp-btn-sec" id="sp-fwd5" aria-label="${escapeHtml(t('pl.fwd5'))}">+5</button>
        </div>
        <div class="sp-progress">
          <span class="sp-time" id="sp-cur">0:00</span>
          <div class="sp-scrub" id="sp-scrub">
            <div class="sp-scrub-track"></div>
            <div class="sp-scrub-fill" id="sp-fill"></div>
            <div class="sp-scrub-thumb" id="sp-thumb"></div>
          </div>
          <span class="sp-time end" id="sp-tot">0:00</span>
        </div>
      </div>
    `;
    // Artwork
    lookupITunes(song.artist, song.title).then(info => {
      if (currentSong?.id !== song.id) return;
      if (info?.artwork600) {
        const el = document.getElementById(`sp-art-${song.id}`);
        if (el) el.style.backgroundImage = `url("${info.artwork600}")`;
      }
    });

    // Load + play the track
    spotifySearchUri(song.artist, song.title).then(async uri => {
      if (currentSong?.id !== song.id) return;
      if (!uri) { showToast(t('embed.notFound')); return; }
      await spotifyPlayTrack(uri);
    });

    // Wire controls
    const toggleBtn = document.getElementById('sp-toggle');
    const toggleIcon = document.getElementById('sp-toggle-icon');
    const back5 = document.getElementById('sp-back5');
    const fwd5 = document.getElementById('sp-fwd5');
    const scrub = document.getElementById('sp-scrub');
    const fillEl = document.getElementById('sp-fill');
    const thumbEl = document.getElementById('sp-thumb');
    const curEl = document.getElementById('sp-cur');
    const totEl = document.getElementById('sp-tot');

    toggleBtn.addEventListener('click', spotifyToggle);
    back5.addEventListener('click', () => spotifySeekDelta(-5000));
    fwd5.addEventListener('click', () => spotifySeekDelta(5000));

    // Scrubber drag (pointer events)
    let scrubbing = false, pendingMs = 0;
    function updateScrubFromEvent(e) {
      const rect = scrub.getBoundingClientRect();
      const r = Math.max(0, Math.min(1, ((e.clientX ?? (e.touches?.[0]?.clientX || 0)) - rect.left) / rect.width));
      const ms = r * (spState.duration || 0);
      pendingMs = ms;
      fillEl.style.width = (r * 100) + '%';
      thumbEl.style.left = (r * 100) + '%';
      curEl.textContent = fmtMs(ms);
    }
    scrub.addEventListener('pointerdown', (e) => {
      scrubbing = true; scrub.setPointerCapture?.(e.pointerId);
      updateScrubFromEvent(e);
    });
    scrub.addEventListener('pointermove', (e) => { if (scrubbing) updateScrubFromEvent(e); });
    scrub.addEventListener('pointerup', async (e) => {
      if (!scrubbing) return;
      scrubbing = false;
      await spotifySeekMs(pendingMs);
    });

    // State subscription
    const unsubFn = onSpEvent((s) => {
      if (toggleIcon) {
        toggleIcon.innerHTML = s.paused ? '<path d="M5 4l14 8-14 8z"/>' : '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
      }
      if (!scrubbing && s.duration > 0) {
        const r = Math.max(0, Math.min(1, s.position / s.duration));
        fillEl.style.width = (r * 100) + '%';
        thumbEl.style.left = (r * 100) + '%';
        curEl.textContent = fmtMs(s.position);
        totEl.textContent = fmtMs(s.duration);
      }
    });
    // Cleanup if card replaced
    cardEl._spCleanup = () => { unsubFn?.(); };
    // Emit initial state
    emitSp();
  }

  function setupSwipe(el) {
    let startX = 0, startY = 0, startTime = 0, captured = false;
    el.addEventListener('touchstart', (e) => {
      // Skip if touch starts inside iframe or input
      const tgt = e.target;
      if (tgt.tagName === 'IFRAME' || tgt.closest('iframe, input, textarea, button')) return;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startTime = Date.now(); captured = true;
    }, { passive: true });
    el.addEventListener('touchend', (e) => {
      if (!captured) return; captured = false;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      const dt = Date.now() - startTime;
      if (dt > 600) return;
      if (Math.abs(dx) < 70) return;
      if (Math.abs(dy) > 50) return;
      if (dx < 0) { act('skip'); }
      else if (dx > 0 && seenIdx > 0) { goBack(); }
    }, { passive: true });
  }

  function renderEmpty() {
    currentSong = null;
    cardHost.innerHTML = `
      <div class="empty-state">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <h3>${escapeHtml(t('allDoneTitle'))}</h3>
        <p>${escapeHtml(t('allDoneText'))}</p>
      </div>
    `;
  }

  async function act(action, category) {
    if (!currentSong) return;
    const commentEl = document.getElementById('comment-input');
    const comment = commentEl ? commentEl.value.trim() : '';
    const payload = { song_id: currentSong.id, user: userName, action };
    if (category) payload.category = category;
    if (comment) payload.comment = comment;
    if (cardEl) {
      fAnimate(cardEl, { opacity: [1, 0], scale: [1, 0.96] }, { duration: 0.22 });
      await new Promise(r => setTimeout(r, 220));
    }
    const res = await apiAction(payload);
    if (!res.ok) { showToast(t('toast.failed')); return loadNext(); }
    if (action === 'assign') showToast(t('toast.assigned', { cat: t(`cat.${category}.short`) }));
    else if (action === 'skip') showToast(t('toast.skipped'));
    progressN++;
    await loadNext();
  }

  async function loadNext() {
    document.getElementById('progress-n').textContent = fmt(progressN);
    // If we're navigating forward in history (after going back), advance to existing
    if (seenIdx < seenStack.length - 1) {
      seenIdx++;
      renderCard(seenStack[seenIdx]);
      return;
    }
    const d = await apiNext();
    if (d?.total != null) { progressTotal = d.total; document.getElementById('progress-total').textContent = fmt(progressTotal); }
    if (d?.processed != null) { progressN = d.processed; document.getElementById('progress-n').textContent = fmt(progressN); }
    if (!d || !d.song) { renderEmpty(); return; }
    seenStack.push(d.song);
    seenIdx = seenStack.length - 1;
    renderCard(d.song);
  }
  function goBack() {
    if (seenIdx <= 0) return;
    seenIdx--;
    renderCard(seenStack[seenIdx]);
  }

  /* ===== Menu (sheet) ===== */
  const scrim = document.getElementById('scrim');
  const sheet = document.getElementById('sheet');
  document.getElementById('menu-btn').addEventListener('click', openMenu);
  scrim.addEventListener('click', closeMenu);
  function openMenu() {
    syncSegments();
    renderMine();
    scrim.classList.add('open');
    sheet.classList.add('open');
  }
  function closeMenu() { scrim.classList.remove('open'); sheet.classList.remove('open'); }

  function syncSegments() {
    document.querySelectorAll('#seg-service button').forEach(b => b.classList.toggle('active', b.dataset.val === service));
    document.querySelectorAll('#seg-lang button').forEach(b => b.classList.toggle('active', b.dataset.val === lang));
    // Update labels shown in collapsed-header rows
    const svcCur = document.getElementById('service-current');
    if (svcCur) svcCur.textContent = service === 'spotify' ? 'Spotify' : 'Apple Music';
    const langCur = document.getElementById('lang-current');
    if (langCur) langCur.textContent = lang === 'en' ? 'English' : 'Русский';
  }
  document.querySelectorAll('#seg-service button').forEach(b => {
    b.addEventListener('click', () => {
      const newSvc = b.dataset.val;
      if (newSvc === service) return;
      service = newSvc;
      lsSet(K_SERVICE, service);
      syncSegments();
      const name = service === 'spotify' ? 'Spotify' : 'Apple Music';
      showToast(t('toast.serviceChanged', { service: name }));
      if (service === 'spotify' && spotifyToken()) spotifyInit();
      // Re-render current card with new service
      if (currentSong) renderCard(currentSong);
    });
  });
  document.querySelectorAll('#seg-lang button').forEach(b => {
    b.addEventListener('click', () => {
      const newLang = b.dataset.val;
      if (newLang === lang || !T[newLang]) return;
      lang = newLang; lsSet(K_LANG, lang);
      applyStaticI18n();
      syncSegments();
      if (currentSong) renderCard(currentSong);
    });
  });

  // Top bar buttons (always visible) wire to overlays
  document.getElementById('search-btn').addEventListener('click', openSearch);
  document.getElementById('all-btn').addEventListener('click', openAllTracks);

  // Menu collapsibles: tap header → toggle
  document.querySelectorAll('.menu-fold-header').forEach(h => {
    h.addEventListener('click', () => {
      const fold = h.closest('.menu-fold');
      const isOpen = fold.classList.contains('open');
      // close all others (accordion style)
      document.querySelectorAll('.menu-fold.open').forEach(f => f.classList.remove('open'));
      if (!isOpen) fold.classList.add('open');
    });
  });

  async function renderMine() {
    const list = document.getElementById('mine-list');
    const countEl = document.getElementById('mine-count');
    list.innerHTML = `<div class="mine-empty">…</div>`;
    const songs = await apiMine();
    if (countEl) {
      if (songs.length === 0) {
        countEl.textContent = t('mineCount.empty');
      } else {
        let word;
        if (lang === 'ru') {
          const n = songs.length;
          const m10 = n % 10, m100 = n % 100;
          if (m10 === 1 && m100 !== 11) word = 'трек';
          else if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) word = 'трека';
          else word = 'треков';
        } else {
          word = songs.length === 1 ? 'track' : 'tracks';
        }
        countEl.textContent = `${songs.length} ${word}`;
      }
    }
    if (songs.length === 0) {
      list.innerHTML = `<div class="mine-empty">${escapeHtml(lang === 'ru' ? 'пока пусто — отбирай треки из карточек' : 'empty — start picking from cards')}</div>`;
      return;
    }
    list.innerHTML = songs.map(s => `
      <div class="mine-row" data-song-id="${s.id}">
        <div class="mine-cat">${escapeHtml(t(`cat.${s.category}.short`))}</div>
        <div class="mine-text">
          <div class="t">${escapeHtml(s.title)}</div>
          <div class="a">${escapeHtml(s.artist)}</div>
        </div>
        <button type="button" class="mine-remove" data-song-id="${s.id}" aria-label="${escapeHtml(lang === 'ru' ? 'убрать' : 'remove')}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
    list.querySelectorAll('.mine-remove').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.songId);
        const row = btn.closest('.mine-row');
        const title = row?.querySelector('.t')?.textContent || '';
        if (!confirm(t('confirmRemove', { title }))) return;
        const res = await apiAction({ song_id: id, user: userName, action: 'reset' });
        if (res.ok) { row.remove(); showToast(t('toast.removed')); loadNext(); }
        else { showToast(t('toast.failed')); }
      });
    });
  }

  /* ===== All-tracks overlay (separate from search) ===== */
  const allOv = document.getElementById('all-overlay');
  const aoResults = document.getElementById('ao-results');
  const aoCounter = document.getElementById('ao-counter');
  let aoSort = 'alpha';
  let aoOffset = 0;
  let aoTotal = 0;
  let aoLoading = false;
  let aoRunId = 0;

  document.getElementById('all-close').addEventListener('click', closeAllTracks);
  document.querySelectorAll('.sort-chip').forEach(b => {
    b.addEventListener('click', () => {
      aoSort = b.dataset.sort;
      document.querySelectorAll('.sort-chip').forEach(x => x.classList.toggle('active', x === b));
      aoOffset = 0;
      aoResults.innerHTML = '';
      loadAllTracksPage();
    });
  });
  let aoScrollAttached = false;
  function attachAoScroll() {
    if (aoScrollAttached) return;
    aoScrollAttached = true;
    aoResults.addEventListener('scroll', () => {
      if (aoLoading || aoOffset >= aoTotal) return;
      if (aoResults.scrollTop + aoResults.clientHeight > aoResults.scrollHeight - 200) {
        loadAllTracksPage();
      }
    });
  }
  function openAllTracks() {
    allOv.classList.add('open');
    attachAoScroll();
    aoOffset = 0;
    aoResults.innerHTML = `<div class="so-status">…</div>`;
    loadAllTracksPage();
  }
  function closeAllTracks() { allOv.classList.remove('open'); }
  async function loadAllTracksPage() {
    if (aoLoading) return;
    aoLoading = true;
    const myRun = ++aoRunId;
    try {
      const r = await fetch(`${API}/api/library/all?limit=50&offset=${aoOffset}&sort=${encodeURIComponent(aoSort)}`);
      if (!r.ok) { aoLoading = false; return; }
      const d = await r.json();
      if (myRun !== aoRunId) { aoLoading = false; return; }
      aoTotal = d.total || 0;
      aoCounter.textContent = fmt(aoTotal);
      const items = d.results || [];
      if (aoOffset === 0 && items.length === 0) {
        aoResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.empty'))}</div>`;
      } else {
        if (aoOffset === 0) aoResults.innerHTML = '';
        const html = items.map(s => searchRowHTML(s)).join('');
        aoResults.insertAdjacentHTML('beforeend', html);
        wireSearchRows(aoResults, items);
        aoOffset += items.length;
      }
    } catch (e) {}
    aoLoading = false;
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && allOv.classList.contains('open')) closeAllTracks();
  });

  /* ===== Search overlay ===== */
  const searchOv = document.getElementById('search-overlay');
  const smInput = document.getElementById('sm-input');
  const soResults = document.getElementById('so-results');
  document.getElementById('search-close').addEventListener('click', closeSearch);
  function openSearch() {
    searchOv.classList.add('open');
    smInput.value = '';
    soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.intro'))}</div>`;
    setTimeout(() => smInput.focus(), 200);
  }
  function closeSearch() { searchOv.classList.remove('open'); }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && searchOv.classList.contains('open')) closeSearch();
  });

  let searchTimer = null, searchRunId = 0;
  smInput.addEventListener('input', onSearchInput);
  function onSearchInput() {
    const q = smInput.value.trim();
    clearTimeout(searchTimer);
    if (!q) { soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.intro'))}</div>`; return; }
    if (q.length < 2) return;
    soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.typing'))}</div>`;
    const myRun = ++searchRunId;
    searchTimer = setTimeout(async () => {
      const results = await apiSearch(q);
      if (myRun !== searchRunId) return;
      if (results.length === 0) {
        soResults.innerHTML = `<div class="so-status">${escapeHtml(t('search.empty'))}</div>`;
        return;
      }
      soResults.innerHTML = `<div id="sr-list">${results.map(s => searchRowHTML(s)).join('')}</div>`;
      wireSearchRows(document.getElementById('sr-list'), results);
    }, 280);
  }
  // Shared between search overlay and all-tracks overlay
  function searchRowHTML(s) {
    const status = s.assigned_to ? `<div class="sr-status">${escapeHtml(t('search.assignedAs', { cat: t(`cat.${s.assigned_to}.short`), by: s.assigned_by || '' }))}</div>` : '';
    return `
      <div class="sr-row" data-song-id="${s.id}">
        <div class="sr-art" id="sr-art-${s.id}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div class="sr-text">
          <div class="sr-title">${escapeHtml(s.title)}</div>
          <div class="sr-artist">${escapeHtml(s.artist)}${s.year ? ` · ${s.year}` : ''}</div>
          ${status}
        </div>
        <button type="button" class="sr-add" aria-label="добавить">+</button>
      </div>
      <div class="sr-cats">
        <div class="sr-cats-inner">
          ${CATEGORIES.map(cat => `<button type="button" data-cat="${escapeHtml(cat)}" data-song-id="${s.id}">${escapeHtml(t(`cat.${cat}.short`))}</button>`).join('')}
        </div>
      </div>
    `;
  }
  function wireSearchRows(container, items) {
    container.querySelectorAll('.sr-row').forEach(row => {
      const addBtn = row.querySelector('.sr-add');
      if (addBtn && !addBtn._wired) {
        addBtn._wired = true;
        addBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSearchRow(row); });
      }
      if (!row._wired) {
        row._wired = true;
        row.addEventListener('click', () => toggleSearchRow(row));
      }
    });
    container.querySelectorAll('.sr-cats button').forEach(b => {
      if (b._wired) return;
      b._wired = true;
      b.addEventListener('click', async (e) => {
        e.stopPropagation();
        const songId = Number(b.dataset.songId);
        const cat = b.dataset.cat;
        const result = await apiAction({ song_id: songId, user: userName, action: 'assign', category: cat });
        if (result.ok) {
          showToast(t('toast.assigned', { cat: t(`cat.${cat}.short`) }));
          const row = container.querySelector(`.sr-row[data-song-id="${songId}"]`);
          if (row) {
            row.classList.remove('expanded');
            // Update the row's status line in place
            const txt = row.querySelector('.sr-text');
            let statusEl = txt.querySelector('.sr-status');
            const statusHtml = t('search.assignedAs', { cat: t(`cat.${cat}.short`), by: userName });
            if (statusEl) statusEl.textContent = statusHtml;
            else txt.insertAdjacentHTML('beforeend', `<div class="sr-status">${escapeHtml(statusHtml)}</div>`);
          }
        } else { showToast(t('toast.failed')); }
      });
    });
    // load artwork
    items.forEach(s => {
      lookupITunes(s.artist, s.title).then(info => {
        const el = document.getElementById(`sr-art-${s.id}`);
        if (el && info?.artwork600) {
          const big = new Image();
          big.onload = () => { el.style.backgroundImage = `url("${info.artwork600}")`; el.innerHTML = ''; };
          big.src = info.artwork600;
        }
      });
    });
  }
  function toggleSearchRow(row) {
    const wasExpanded = row.classList.contains('expanded');
    // Only collapse expanded rows within the same overlay
    const parent = row.closest('.so-results, .ao-results');
    if (parent) parent.querySelectorAll('.sr-row.expanded').forEach(r => r.classList.remove('expanded'));
    if (!wasExpanded) row.classList.add('expanded');
  }

  /* ===== Share FAB (uses native navigator.share) ===== */
  async function buildShareText() {
    try {
      const r = await fetch(`${API}/api/share-text?user=${encodeURIComponent(userName)}`);
      if (!r.ok) return '';
      const d = await r.json();
      return d.text || '';
    } catch (e) { return ''; }
  }
  async function doShare() {
    const text = await buildShareText();
    if (!text) { showToast(t('toast.failed')); return; }
    const payload = {
      title: t('share.title'),
      text: text,
      url: 'https://akoev.com/'
    };
    if (navigator.share) {
      try {
        await navigator.share(payload);
        return;
      } catch (e) {
        if (e?.name === 'AbortError') return; // user cancelled
      }
    }
    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(text);
      showToast(t('share.copied'));
    } catch (e) {
      // Last resort: prompt
      try { window.prompt(t('share.copied'), text); } catch (_) {}
    }
  }
  const shareFab = document.getElementById('share-fab');
  shareFab.addEventListener('click', doShare);

  /* ===== Toast ===== */
  const toastEl = document.getElementById('toast');
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  /* ===== Boot ===== */
  applyStaticI18n();

  // Re-render current card when SDK becomes ready
  onSpEvent(() => {
    if (currentSong && service === 'spotify') {
      const alreadyMounted = document.querySelector('.sp-player');
      if (!alreadyMounted && spReady) renderCard(currentSong);
    }
  });

  async function boot() {
    // If we returned from Spotify OAuth, exchange the auth code for a token
    if (location.search.includes('code=') || location.search.includes('error=')) {
      const ok = await spotifyParseCallback();
      if (ok) showToast(t('toast.spotifyOk'));
    }
    // If we already have a (still-valid) token, init SDK now
    if (spotifyToken()) {
      spotifyInit();
    } else if (lsGet(K_SPOTIFY_REFRESH, '')) {
      // Try silent refresh, then init
      const refreshed = await spotifyRefresh();
      if (refreshed) spotifyInit();
    }
    if (!service) {
      showScreen('obService');
    } else if (!userName) {
      showScreen('obWho');
    } else {
      showDiscovery();
    }
  }
  boot();
})();
</script>
</body>
</html>
