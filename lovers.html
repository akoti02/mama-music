<script>
(function() {
  'use strict';
  const API = 'https://api.akoev.com';
  const K_QUEUE = 'lovers_pending_v1';
  const MAIN_USER_KEY = 'venchanie_user_name_v2'; // shared with akoev.com main app
  const OWNER_NAMES = new Set(['Юля', 'Артур', 'Света']);
  const DEFAULT_GUEST = 'Lovers';

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function lsGet(k, d) { try { return localStorage.getItem(k) ?? d; } catch { return d; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
  function lsGetJSON(k, d) { try { const v = lsGet(k, null); return v ? JSON.parse(v) : d; } catch { return d; } }
  function lsSetJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

  // Identity: prefer the main app's name (Юля/Артур/Света from akoev.com).
  // If the main name isn't set yet AND a per-tab identity was picked here,
  // use that. Otherwise default to the guest label.
  const TAB_NAME = sessionStorage.getItem('lovers_dj_identity_v1') || '';
  let myName = (() => {
    const mainName = (lsGet(MAIN_USER_KEY, '') || '').trim();
    if (mainName && OWNER_NAMES.has(mainName)) return mainName;
    if (TAB_NAME && (OWNER_NAMES.has(TAB_NAME) || TAB_NAME === DEFAULT_GUEST)) return TAB_NAME;
    return DEFAULT_GUEST;
  })();

  /* ===== Toast ===== */
  const toastEl = document.getElementById('toast');
  let toastTimer = null;
  function showToast(msg, opts) {
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.toggle('error', !!opts?.error);
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  /* ===== Queue (offline-safe writes) ===== */
  function qGet() { return lsGetJSON(K_QUEUE, []); }
  function qSet(v) { lsSetJSON(K_QUEUE, v); }
  function qPush(item) { const q = qGet(); q.push({ _id: Date.now() + '-' + Math.random().toString(36).slice(2,8), ...item }); qSet(q); refreshUnsaved(); }
  function qRemove(id) { qSet(qGet().filter(x => x._id !== id)); refreshUnsaved(); }
  let draining = false;
  async function qDrain() {
    if (draining) return;
    draining = true;
    try {
      let q = qGet();
      while (q.length) {
        const item = q[0];
        const { _id, kind, payload } = item;
        try {
          const r = await fetchWithRetry(`${API}${kind}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }, 3, 20000);
          if (r.ok) { qRemove(_id); q = qGet(); continue; }
          // 409 ('already exists') is a legit terminal state for add — drop.
          // 408/429 are transient — keep. 4xx validation errors (400/403/404)
          // would never succeed on retry — drop with a console warning.
          if (r.status === 408 || r.status === 429) break;
          if (r.status >= 400 && r.status < 500) {
            console.warn('drop queue item (4xx)', kind, r.status);
            qRemove(_id); q = qGet(); continue;
          }
          break; // 5xx — keep and retry later
        } catch (e) { break; }
      }
    } finally { draining = false; refreshUnsaved(); }
  }
  // Fire-and-forget all queued items via sendBeacon. Used on page hide /
  // navigation away so iOS Safari can't kill the tab with unsent comments.
  function qFlushBeacon() {
    const q = qGet();
    if (!q.length || !navigator.sendBeacon) return;
    for (const { kind, payload } of q) {
      try {
        const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain' });
        navigator.sendBeacon(`${API}${kind}`, blob);
      } catch (e) { /* fire-and-forget */ }
    }
  }
  function refreshUnsaved() {
    const el = document.getElementById('unsaved');
    const n = qGet().length;
    if (n === 0) { el.classList.remove('show'); return; }
    document.getElementById('unsaved-label').textContent = `Не отправлено: ${n} · нажми, чтобы повторить`;
    el.classList.add('show');
  }
  document.getElementById('unsaved').addEventListener('click', () => qDrain().then(loadSongs));

  /* ===== fetch with retry ===== */
  async function fetchWithRetry(url, opts, retries = 3, timeoutMs = 20000) {
    let lastErr = null;
    for (let i = 0; i <= retries; i++) {
      try {
        const ctrl = new AbortController();
        const tm = setTimeout(() => ctrl.abort(), timeoutMs);
        const r = await fetch(url, Object.assign({}, opts || {}, { signal: ctrl.signal, cache: 'no-store' }));
        clearTimeout(tm);
        return r;
      } catch (e) {
        lastErr = e;
        if (i < retries) await new Promise(r => setTimeout(r, 400 * Math.pow(2, i)));
      }
    }
    throw lastErr || new Error('fetch failed');
  }

  /* ===== Identity =====
     Auto-detected from main app. If a stranger opens the link straight
     (no name in main-app storage) we show a small "это я" picker so an
     owner (Артур/Юля/Света) can claim ownership for this tab. Otherwise
     default to the group guest label. */
  function applyIdentity() {
    const strip = document.getElementById('me-strip');
    const fab = document.getElementById('add-fab');
    if (strip) { strip.hidden = false; document.getElementById('me-name').textContent = myName; }
    if (fab) fab.hidden = false;
    // Wire the small "I'm actually..." control so an owner visiting from a
    // device that doesn't have the main app's identity can claim it here.
    const ob = document.getElementById('ob-overlay'); if (ob) ob.remove();
    const change = document.getElementById('change-name');
    if (change) {
      change.textContent = (myName === DEFAULT_GUEST) ? 'это я: Артур / Юля / Света' : 'сменить';
      change.onclick = () => openIdentityPicker();
    }
  }
  function openIdentityPicker() {
    if (document.getElementById('id-picker')) return;
    const el = document.createElement('div');
    el.id = 'id-picker';
    el.className = 'ob-overlay';
    el.innerHTML = `<div class="ob-card">
      <h2>Кто ты?</h2>
      <p>Артур/Юля/Света — у вас полный доступ. Остальные участвуют как «${escapeHtml(DEFAULT_GUEST)}».</p>
      <button class="primary" data-pick="Юля">Юля</button>
      <button class="primary" data-pick="Артур" style="margin-top:8px">Артур</button>
      <button class="primary" data-pick="Света" style="margin-top:8px">Света</button>
      <button class="primary" data-pick="${escapeHtml(DEFAULT_GUEST)}" style="margin-top:8px;background:var(--surface-3);color:var(--text);border:1px solid var(--line-2)">${escapeHtml(DEFAULT_GUEST)}</button>
    </div>`;
    document.body.appendChild(el);
    el.querySelectorAll('button[data-pick]').forEach(b => {
      b.addEventListener('click', () => {
        const picked = b.dataset.pick;
        sessionStorage.setItem('lovers_dj_identity_v1', picked);
        // Owners also write to the main-app key so any other open tab uses
        // the same identity. Guests don't touch the shared key.
        if (OWNER_NAMES.has(picked)) lsSet(MAIN_USER_KEY, picked);
        myName = picked;
        el.remove();
        applyIdentity();
        loadSongs();
      });
    });
  }

  /* ===== Songs list ===== */
  async function loadSongs() {
    // Snapshot any in-progress comment input so the re-render doesn't wipe it.
    const pending = {};
    document.querySelectorAll('input[data-cmt-sid]').forEach(el => {
      const v = el.value;
      if (v && v.length) pending[el.dataset.cmtSid] = v;
    });
    try {
      const r = await fetchWithRetry(`${API}/api/lovers/songs`, {}, 2, 20000);
      if (!r.ok) throw new Error('http');
      const d = await r.json();
      renderSongs(d.songs || []);
    } catch (e) {
      document.getElementById('root').innerHTML = '<div class="empty"><p>Не удалось загрузить. Попробую снова через 30 с.</p></div>';
    }
    // Restore pending comment text after the new DOM is in place.
    for (const sid of Object.keys(pending)) {
      const el = document.querySelector(`input[data-cmt-sid="${sid}"]`);
      if (el) el.value = pending[sid];
    }
  }

  function renderSongs(songs) {
    const root = document.getElementById('root');
    if (!songs.length) {
      root.innerHTML = `<div class="empty">
        <p>Пока пусто.</p>
        <p>Нажми «Добавить песню» внизу.</p>
      </div>`;
      return;
    }
    const canRemove = (myName === 'Юля' || myName === 'Артур');
    // Flat list — no block grouping. Show progress at the top.
    const total = songs.length;
    const commented = songs.filter(s => (s.comments || []).length > 0).length;
    const progress = `<div class="progress-strip"><span><strong>${commented}</strong> из <strong>${total}</strong> с комментариями</span></div>`;
    root.innerHTML = progress + songs.map(s => renderSongCard(s, canRemove)).join('');
    wireSongs();
  }
  function renderSongCard(s, canRemove) {
    const hasYt = !!s.youtube_id;
    const ytThumb = hasYt ? `https://i.ytimg.com/vi/${s.youtube_id}/mqdefault.jpg` : '';
    const thumbStyle = hasYt ? `style="background-image:url('${ytThumb}')"` : '';
    const thumbExtraCls = hasYt ? '' : ' thumb-empty';
    const isOwner = (myName === 'Юля' || myName === 'Артур');
    const marks = s.removal_marks || [];
    const myMark = marks.find(m => m.by_name === myName);
    const ownerMarks = (isOwner && marks.length) ? `<div class="flagged"><span class="flag-icon">⚠</span><span>Пометили «не подходит»: <strong>${marks.map(m => escapeHtml(m.by_name)).join(', ')}</strong></span></div>` : '';
    const flagBtn = !isOwner
      ? `<button class="flag-btn ${myMark ? 'active' : ''}" data-flag="${s.id}">${myMark ? '✓ Не подходит · нажми, чтобы снять' : '🚫 Не подходит'}</button>`
      : '';
    const comments = (s.comments || []).map(c => {
      const isMine = c.by_name === myName;
      const canDel = isMine || isOwner;
      return `<div class="comment">
        <div class="c-by">${escapeHtml(c.by_name)}${canDel ? ` <button class="c-del" data-del-comment-id="${c.id || ''}" data-del-comment-by="${escapeHtml(c.by_name)}">×</button>` : ''}</div>
        <div class="c-text">${escapeHtml(c.comment)}</div>
      </div>`;
    }).join('');
    return `<div class="song${marks.length ? ' has-flags' : ''}" data-sid="${s.id}">
      <div class="thumb${thumbExtraCls}" ${thumbStyle} data-yt="${s.youtube_id || ''}" title="${hasYt ? '' : 'Видео ещё не нашлось'}"></div>
      <div class="song-body">
        <div class="song-title">${escapeHtml(s.title)}</div>
        <div class="song-artist">${escapeHtml(s.artist)}</div>
        <div class="song-meta">от <strong>${escapeHtml(s.added_by || '—')}</strong>${hasYt ? '' : ' · <em style="color:var(--text-muted)">видео ищется…</em>'}</div>
        ${ownerMarks}
        ${canRemove ? `<button class="song-remove" data-rm="${s.id}">Удалить песню</button>` : ''}
        ${flagBtn}
        <div class="comments">${comments}</div>
        <div class="add-comment">
          <input type="text" placeholder="Коммент от ${escapeHtml(myName)}..." data-cmt-sid="${s.id}" maxlength="500">
          <button data-cmt-send="${s.id}">Отправить</button>
        </div>
      </div>
    </div>`;
  }
  function wireSongs() {
    document.querySelectorAll('.thumb[data-yt]').forEach(t => {
      const yt = t.dataset.yt;
      if (!yt) return;
      t.addEventListener('click', () => openPlayer(yt));
    });
    document.querySelectorAll('button[data-rm]').forEach(b => {
      b.addEventListener('click', () => removeSong(parseInt(b.dataset.rm, 10)));
    });
    document.querySelectorAll('button[data-cmt-send]').forEach(b => {
      b.addEventListener('click', () => {
        const sid = parseInt(b.dataset.cmtSend, 10);
        const input = document.querySelector(`input[data-cmt-sid="${sid}"]`);
        sendComment(sid, input);
      });
    });
    document.querySelectorAll('input[data-cmt-sid]').forEach(i => {
      i.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const sid = parseInt(i.dataset.cmtSid, 10);
          sendComment(sid, i);
        }
      });
    });
    document.querySelectorAll('button.c-del[data-del-comment-id]').forEach(b => {
      const cid = parseInt(b.dataset.delCommentId, 10);
      if (!cid) return;
      b.addEventListener('click', () => deleteComment(cid));
    });
    document.querySelectorAll('button.flag-btn[data-flag]').forEach(b => {
      b.addEventListener('click', async () => {
        if (b.disabled) return;
        b.disabled = true;
        // Optimistic UI flip
        const wasActive = b.classList.contains('active');
        b.classList.toggle('active', !wasActive);
        b.textContent = !wasActive ? '✓ Помечено как не подходит' : '🚫 Не подходит';
        await toggleFlag(parseInt(b.dataset.flag, 10), wasActive);
        // loadSongs() will re-render and re-wire; if not yet, leave disabled
        // so the user can't double-click before drain finishes.
      });
    });
  }
  function deleteComment(commentId) {
    if (!commentId) return;
    qPush({ kind: '/api/lovers/comment/delete', payload: { comment_id: commentId, by: myName } });
    qDrain().then(() => loadSongs());
  }
  async function toggleFlag(songId, currentlyActive) {
    const kind = currentlyActive ? '/api/lovers/unmark-remove' : '/api/lovers/mark-remove';
    qPush({ kind, payload: { song_id: songId, by: myName } });
    showToast(currentlyActive ? 'Пометка снята' : 'Пометили как не подходит');
    try { await qDrain(); } catch {}
    // Always re-render — even on network failure — so the disabled button is
    // replaced and the user can act again. Pending changes stay in the queue.
    await loadSongs();
  }

  /* ===== Add comment ===== */
  function sendComment(songId, inputEl) {
    const txt = inputEl.value.trim();
    if (!txt) return;
    // Persist to queue FIRST, then clear UI. Otherwise a quota error would
    // wipe the user's text from both UI and storage.
    qPush({ kind: '/api/lovers/comment', payload: { song_id: songId, by: myName, comment: txt } });
    inputEl.value = '';
    showToast('Коммент отправляю…');
    qDrain().then(() => loadSongs());
  }

  /* ===== Remove song (Юля only) ===== */
  function removeSong(songId) {
    if (myName !== 'Юля' && myName !== 'Артур') return;
    if (!confirm('Точно удалить эту песню из общего LOVERS?')) return;
    qPush({ kind: '/api/lovers/remove', payload: { song_id: songId, by: myName } });
    qDrain().then(() => loadSongs());
  }

  /* ===== Add song ===== */
  const modal = document.getElementById('add-modal');
  document.getElementById('add-fab').addEventListener('click', () => {
    document.getElementById('add-artist').value = '';
    document.getElementById('add-title').value = '';
    document.getElementById('add-comment').value = '';
    document.getElementById('add-status').textContent = '';
    document.getElementById('add-status').classList.remove('error');
    modal.classList.add('open');
    setTimeout(() => document.getElementById('add-artist').focus(), 200);
  });
  document.getElementById('add-cancel').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('add-submit').addEventListener('click', async () => {
    const artist = document.getElementById('add-artist').value.trim();
    const title = document.getElementById('add-title').value.trim();
    const comment = document.getElementById('add-comment').value.trim();
    if (!artist || !title) { document.getElementById('add-status').textContent = 'Заполни артиста и название'; document.getElementById('add-status').classList.add('error'); return; }
    const btn = document.getElementById('add-submit');
    btn.disabled = true;
    document.getElementById('add-status').textContent = 'Ищу видео на YouTube…';
    document.getElementById('add-status').classList.remove('error');
    try {
      const r = await fetchWithRetry(`${API}/api/lovers/add`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ artist, title, by: myName, comment })
      }, 2, 25000);
      const d = await r.json();
      if (!r.ok && r.status !== 409) {
        document.getElementById('add-status').textContent = d.error || 'Не удалось добавить';
        document.getElementById('add-status').classList.add('error');
        btn.disabled = false;
        return;
      }
      if (r.status === 409) {
        document.getElementById('add-status').textContent = 'Эта песня уже в подборке.';
        document.getElementById('add-status').classList.add('error');
        // For an existing song the server didn't save the new comment.
        // Queue it as a separate comment so it lands.
        if (comment && d.song_id) {
          qPush({ kind: '/api/lovers/comment', payload: { song_id: d.song_id, by: myName, comment } });
          qDrain();
        }
      }
      modal.classList.remove('open');
      showToast(r.status === 409 ? 'Уже было — открыл' : 'Добавлено');
      btn.disabled = false;
      loadSongs();
    } catch (e) {
      document.getElementById('add-status').textContent = 'Нет связи. Сохраню в очередь — отправится когда сеть появится.';
      document.getElementById('add-status').classList.add('error');
      btn.disabled = false;
      // Queue the add with the comment in the same payload — server handles
      // both fields, so the comment lands together with the song.
      qPush({ kind: '/api/lovers/add', payload: { artist, title, by: myName, comment } });
      modal.classList.remove('open');
    }
  });

  /* ===== Player ===== */
  const player = document.getElementById('player');
  function openPlayer(ytId) {
    if (!ytId) return;
    document.getElementById('player-inner').innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    player.classList.add('open');
  }
  function closePlayer() {
    player.classList.remove('open');
    document.getElementById('player-inner').innerHTML = '';
  }
  document.getElementById('player-close').addEventListener('click', closePlayer);
  player.addEventListener('click', e => { if (e.target === player) closePlayer(); });

  /* ===== Lifecycle ===== */
  window.addEventListener('online', () => qDrain().then(loadSongs));
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { qDrain().then(loadSongs); }
    else { qFlushBeacon(); } // fire on home-screen swipe / app switch
  });
  window.addEventListener('pagehide', () => { qFlushBeacon(); });
  // If user changes identity in the main app tab while this one is open,
  // reload so the right name is used for further actions. Debounce so two
  // tabs flipping identity at once don't reload-storm each other.
  let storageReloadTimer = null;
  window.addEventListener('storage', e => {
    if (e.key !== MAIN_USER_KEY || e.newValue === e.oldValue) return;
    if (document.getElementById('id-picker')) return; // user is mid-pick
    if (storageReloadTimer) clearTimeout(storageReloadTimer);
    storageReloadTimer = setTimeout(() => location.reload(), 1500);
  });
  // Periodic refresh — suspends while tab is hidden (saves request budget,
  // and avoids stomping the comment input when mom is typing on the other tab).
  setInterval(() => {
    if (document.visibilityState !== 'visible') return;
    qDrain(); loadSongs();
  }, 60000);

  /* ===== Boot ===== */
  applyIdentity();
  qDrain().then(loadSongs);
})();
</script>
</body>
</html>
