<title>LOVERS · совместная подборка</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #07070a;
    --surface: rgba(22,22,26,0.78);
    --surface-2: #131318;
    --surface-3: rgba(255,255,255,0.045);
    --line: rgba(255,255,255,0.09);
    --line-2: rgba(255,255,255,0.16);
    --text: #f5f5f7;
    --text-dim: #b0b0b8;
    --text-muted: #84848a;
    --gold: #d4a45c;
    --gold-bright: #ecc380;
    --bad: #d96666;
    --green: #7dd3a3;
    --pink: #f9a8d4;
    --radius: 16px;
    --radius-lg: 24px;
    --ease-out: cubic-bezier(0.22,1,0.36,1);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    --font-display: 'Instrument Serif', 'Inter', system-ui, serif;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg); color: var(--text);
    font-size: 16px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 28px 16px calc(120px + env(safe-area-inset-bottom));
    max-width: 720px; margin: 0 auto;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  header { margin-bottom: 28px; text-align: center; }
  .crest {
    width: 56px; height: 56px; margin: 0 auto 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--gold-bright));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 20px 44px -10px rgba(249,168,212,0.45);
  }
  .crest svg { width: 26px; height: 26px; color: #0a0a0d; }
  h1 {
    font-family: var(--font-display);
    font-weight: 400; font-size: 36px; line-height: 1.05;
    letter-spacing: -0.018em; margin: 0;
  }
  h1 em { font-style: italic; color: var(--gold-bright); }
  .sub {
    margin-top: 10px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em;
    color: var(--text-muted); font-weight: 700;
  }
  .me-strip {
    margin: 18px auto 0;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 13px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px; color: var(--text-dim);
  }
  .me-strip strong { color: var(--text); font-weight: 700; }
  .me-strip button { background: none; border: none; color: var(--gold-bright); font-weight: 600; cursor: pointer; font-size: 12px; padding: 0; }

  /* Onboarding name screen */
  .ob-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 28px;
  }
  .ob-card {
    width: 100%; max-width: 380px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px;
    text-align: center;
  }
  .ob-card h2 {
    font-family: var(--font-display);
    font-weight: 400; font-size: 28px; margin: 0 0 6px;
    letter-spacing: -0.015em;
  }
  .ob-card p { margin: 0 0 18px; color: var(--text-dim); font-size: 14px; }
  .ob-card input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface-3);
    border: 1px solid var(--line-2);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    margin-bottom: 14px;
    outline: none;
  }
  .ob-card input:focus { border-color: var(--gold-bright); }
  .ob-card button.primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .ob-card button.primary:active { opacity: 0.86; }

  /* Songs list */
  .empty {
    margin: 70px auto 30px;
    text-align: center; color: var(--text-muted); font-size: 14px;
  }
  .empty p { margin: 8px 0; }
  .song {
    display: flex; gap: 14px;
    padding: 14px;
    background: var(--surface-3);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 12px;
  }
  .song .thumb {
    width: 64px; height: 64px; flex-shrink: 0;
    border-radius: 12px;
    background: var(--surface-2) center/cover no-repeat;
    position: relative;
    cursor: pointer;
  }
  .song .thumb::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.35) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fff'><path d='M8 5v14l11-7z'/></svg>") center/22px no-repeat;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .song .thumb:hover::after, .song .thumb:active::after { opacity: 1; }
  .song-body { flex: 1; min-width: 0; }
  .song-title { font-size: 15px; font-weight: 600; letter-spacing: -0.005em; }
  .song-artist { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .song-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; }
  .song-meta strong { color: var(--gold-bright); font-weight: 600; }
  .song-remove {
    margin-top: 8px;
    font-size: 11px; color: var(--bad);
    background: none; border: none;
    padding: 0; cursor: pointer;
    text-decoration: underline;
  }
  .song-remove:active { opacity: 0.7; }
  .comments {
    margin-top: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .comment {
    padding: 8px 12px;
    background: rgba(212,164,92,0.07);
    border-left: 2px solid rgba(212,164,92,0.55);
    border-radius: 4px 10px 10px 4px;
    font-size: 14px; line-height: 1.45;
  }
  .comment .c-by {
    font-size: 11px; color: var(--gold-bright);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 700; margin-bottom: 2px;
  }
  .comment .c-text { color: var(--text); }
  .comment .c-text.italic { font-family: var(--font-display); font-style: italic; font-size: 15px; }
  .comment .c-del {
    margin-left: 8px; font-size: 10px; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 0;
    text-decoration: underline;
  }
  .add-comment {
    margin-top: 8px;
    display: flex; gap: 6px;
  }
  .add-comment input {
    flex: 1; padding: 9px 12px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .add-comment input:focus { border-color: var(--gold-bright); }
  .add-comment button {
    padding: 9px 14px;
    background: var(--gold-bright);
    color: #0a0a0d;
    border: none; border-radius: 999px;
    font-weight: 700; font-size: 12px;
    cursor: pointer;
  }
  .add-comment button:disabled { opacity: 0.4; cursor: default; }

  /* FAB add song */
  .fab {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    z-index: 50;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 22px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
    border: none; border-radius: 999px;
    font-weight: 700; font-size: 14px;
    box-shadow: 0 16px 40px -8px rgba(212,164,92,0.55);
    cursor: pointer;
  }
  .fab:active { transform: translateX(-50%) translateY(1px); }
  .fab svg { width: 18px; height: 18px; }

  /* Add-song modal */
  .modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal.open { display: flex; }
  .modal-card {
    width: 100%; max-width: 420px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px;
  }
  .modal-card h3 {
    font-family: var(--font-display);
    font-weight: 400; font-size: 24px; margin: 0 0 4px;
  }
  .modal-card p { color: var(--text-dim); font-size: 13px; margin: 0 0 16px; }
  .modal-card label {
    display: block; font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    font-weight: 700; margin: 12px 0 6px;
  }
  .modal-card input {
    width: 100%; padding: 12px 14px;
    background: var(--surface-3);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    color: var(--text); font-size: 15px;
    font-family: inherit; outline: none;
  }
  .modal-card input:focus { border-color: var(--gold-bright); }
  .modal-actions {
    display: flex; gap: 10px; margin-top: 18px;
  }
  .modal-actions button {
    flex: 1; padding: 12px;
    border-radius: 10px; font-weight: 700; font-size: 14px;
    border: none; cursor: pointer;
    font-family: inherit;
  }
  .modal-actions .cancel {
    background: var(--surface-3); color: var(--text);
    border: 1px solid var(--line);
  }
  .modal-actions .submit {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0a0a0d;
  }
  .modal-actions .submit:disabled { opacity: 0.5; cursor: default; }
  .modal-status { margin-top: 12px; font-size: 12px; color: var(--text-dim); min-height: 16px; }
  .modal-status.error { color: var(--bad); }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 90px;
    transform: translate(-50%, 20px);
    background: rgba(30,30,34,0.95);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s var(--ease-out);
    z-index: 300;
    max-width: calc(100vw - 32px);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  .toast.error { background: #d96666; }

  /* Player overlay (YouTube modal) */
  .player {
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .player.open { display: flex; }
  .player-inner { width: 100%; max-width: 600px; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; }
  .player iframe { width: 100%; height: 100%; border: 0; }
  .player-close {
    position: absolute; top: 16px; right: 16px;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.12);
    border: none; border-radius: 50%;
    color: #fff; font-size: 22px;
    cursor: pointer;
  }

  /* Unsaved-changes pill (for offline scenarios) */
  .unsaved {
    position: fixed; top: 12px; left: 50%; transform: translate(-50%, -8px);
    z-index: 1500;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 13px;
    background: rgba(217,102,102,0.95); color: #fff;
    border-radius: 999px;
    font-size: 12px; font-weight: 600;
    box-shadow: 0 6px 20px rgba(217,102,102,0.35);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s var(--ease-out);
    cursor: pointer;
  }
  .unsaved.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .unsaved .d { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4 } 50% { opacity: 1 } }
</style>
</head>
<body>

<header>
  <div class="crest"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.5-9.5-9.5C1 8 3.5 5 7 5c2 0 3.5 1 5 3 1.5-2 3-3 5-3 3.5 0 6 3 4.5 6.5C19.5 16.5 12 21 12 21z"/></svg></div>
  <h1>LOVERS · <em>совместная подборка</em></h1>
  <div class="sub">мама + Lovers · только эта категория</div>
  <div class="me-strip" id="me-strip" hidden>я: <strong id="me-name"></strong> · <button id="change-name">сменить</button></div>
</header>

<div id="root"><div class="empty"><p>Загружаю…</p></div></div>

<button class="fab" id="add-fab" hidden>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Добавить песню
</button>

<!-- Onboarding -->
<div class="ob-overlay" id="ob-overlay">
  <div class="ob-card">
    <h2>Как тебя зовут?</h2>
    <p>Это увидят все в этой подборке рядом с твоими песнями и комментариями.</p>
    <input type="text" id="ob-name" placeholder="Имя" autocomplete="name" maxlength="40">
    <button class="primary" id="ob-go">Продолжить</button>
  </div>
</div>

<!-- Add song modal -->
<div class="modal" id="add-modal">
  <div class="modal-card">
    <h3>Новая песня</h3>
    <p>Найдём видео на YouTube автоматически.</p>
    <label for="add-artist">Артист</label>
    <input type="text" id="add-artist" placeholder="Например: Frank Sinatra" maxlength="120">
    <label for="add-title">Название</label>
    <input type="text" id="add-title" placeholder="Например: Fly Me To The Moon" maxlength="160">
    <label for="add-comment">Комментарий (необязательно)</label>
    <input type="text" id="add-comment" placeholder="Почему эта песня?" maxlength="500">
    <div class="modal-status" id="add-status"></div>
    <div class="modal-actions">
      <button class="cancel" id="add-cancel">Отмена</button>
      <button class="submit" id="add-submit">Добавить</button>
    </div>
  </div>
</div>

<!-- Player -->
<div class="player" id="player">
  <button class="player-close" id="player-close" aria-label="Закрыть">✕</button>
  <div class="player-inner" id="player-inner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status"></div>

<!-- Unsaved pill -->
<button class="unsaved" id="unsaved" type="button">
  <span class="d"></span>
  <span id="unsaved-label">Не отправлено</span>
</button>

<script>
(function() {
  'use strict';
  const API = 'https://api.akoev.com';
  const K_NAME = 'lovers_user_name_v1';
  const K_QUEUE = 'lovers_pending_v1';

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function lsGet(k, d) { try { return localStorage.getItem(k) ?? d; } catch { return d; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
  function lsGetJSON(k, d) { try { const v = lsGet(k, null); return v ? JSON.parse(v) : d; } catch { return d; } }
  function lsSetJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

  let myName = lsGet(K_NAME, '') || '';

  /* ===== Toast ===== */
  const toastEl = document.getElementById('toast');
  let toastTimer = null;
  function showToast(msg, opts) {
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.toggle('error', !!opts?.error);
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  /* ===== Queue (offline-safe writes) ===== */
  function qGet() { return lsGetJSON(K_QUEUE, []); }
  function qSet(v) { lsSetJSON(K_QUEUE, v); }
  function qPush(item) { const q = qGet(); q.push({ _id: Date.now() + '-' + Math.random().toString(36).slice(2,8), ...item }); qSet(q); refreshUnsaved(); }
  function qRemove(id) { qSet(qGet().filter(x => x._id !== id)); refreshUnsaved(); }
  let draining = false;
  async function qDrain() {
    if (draining) return;
    draining = true;
    try {
      let q = qGet();
      while (q.length) {
        const item = q[0];
        const { _id, kind, payload } = item;
        try {
          const r = await fetchWithRetry(`${API}${kind}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }, 3, 20000);
          if (r.ok) { qRemove(_id); q = qGet(); continue; }
          if (r.status >= 400 && r.status < 500) { qRemove(_id); q = qGet(); continue; }
          break;
        } catch (e) { break; }
      }
    } finally { draining = false; refreshUnsaved(); }
  }
  function refreshUnsaved() {
    const el = document.getElementById('unsaved');
    const n = qGet().length;
    if (n === 0) { el.classList.remove('show'); return; }
    document.getElementById('unsaved-label').textContent = `Не отправлено: ${n} · нажми, чтобы повторить`;
    el.classList.add('show');
  }
  document.getElementById('unsaved').addEventListener('click', () => qDrain().then(loadSongs));

  /* ===== fetch with retry ===== */
  async function fetchWithRetry(url, opts, retries = 3, timeoutMs = 20000) {
    let lastErr = null;
    for (let i = 0; i <= retries; i++) {
      try {
        const ctrl = new AbortController();
        const tm = setTimeout(() => ctrl.abort(), timeoutMs);
        const r = await fetch(url, Object.assign({}, opts || {}, { signal: ctrl.signal, cache: 'no-store' }));
        clearTimeout(tm);
        return r;
      } catch (e) {
        lastErr = e;
        if (i < retries) await new Promise(r => setTimeout(r, 400 * Math.pow(2, i)));
      }
    }
    throw lastErr || new Error('fetch failed');
  }

  /* ===== Onboarding ===== */
  function showOnboarding() {
    document.getElementById('ob-overlay').style.display = 'flex';
    document.getElementById('me-strip').hidden = true;
    document.getElementById('add-fab').hidden = true;
    setTimeout(() => document.getElementById('ob-name').focus(), 200);
  }
  function hideOnboarding() {
    document.getElementById('ob-overlay').style.display = 'none';
    document.getElementById('me-strip').hidden = false;
    document.getElementById('me-name').textContent = myName;
    document.getElementById('add-fab').hidden = false;
  }
  document.getElementById('ob-go').addEventListener('click', () => {
    const v = document.getElementById('ob-name').value.trim();
    if (!v) { document.getElementById('ob-name').focus(); return; }
    myName = v; lsSet(K_NAME, v);
    hideOnboarding();
    loadSongs();
  });
  document.getElementById('ob-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('ob-go').click(); });
  document.getElementById('change-name').addEventListener('click', () => { document.getElementById('ob-name').value = myName; showOnboarding(); });

  /* ===== Songs list ===== */
  async function loadSongs() {
    try {
      const r = await fetchWithRetry(`${API}/api/lovers/songs`, {}, 2, 20000);
      if (!r.ok) throw new Error('http');
      const d = await r.json();
      renderSongs(d.songs || []);
    } catch (e) {
      document.getElementById('root').innerHTML = '<div class="empty"><p>Не удалось загрузить. Попробую снова через 30 с.</p></div>';
    }
  }

  function renderSongs(songs) {
    const root = document.getElementById('root');
    if (!songs.length) {
      root.innerHTML = `<div class="empty">
        <p>Пока пусто.</p>
        <p>Нажми «Добавить песню» внизу.</p>
      </div>`;
      return;
    }
    const canRemove = myName === 'Юля';
    root.innerHTML = songs.map(s => {
      const ytThumb = s.youtube_id ? `https://i.ytimg.com/vi/${s.youtube_id}/mqdefault.jpg` : '';
      const thumbStyle = ytThumb ? `style="background-image:url('${ytThumb}')"` : '';
      const comments = (s.comments || []).map(c => {
        const isMine = c.by_name === myName;
        const canDel = isMine || myName === 'Юля';
        return `<div class="comment">
          <div class="c-by">${escapeHtml(c.by_name)}${canDel ? ` <button class="c-del" data-cid="${c.song_id ? '' : ''}" data-comment-id="${c.song_id ? c.song_id : ''}" data-del-cid="${c.created_at}-${escapeHtml(c.by_name)}">×</button>` : ''}</div>
          <div class="c-text">${escapeHtml(c.comment)}</div>
        </div>`;
      }).join('');
      return `<div class="song" data-sid="${s.id}">
        <div class="thumb" ${thumbStyle} data-yt="${s.youtube_id || ''}"></div>
        <div class="song-body">
          <div class="song-title">${escapeHtml(s.title)}</div>
          <div class="song-artist">${escapeHtml(s.artist)}</div>
          <div class="song-meta">добавил${s.added_by.endsWith('а') || s.added_by === 'Юля' || s.added_by === 'Света' ? 'а' : ''} <strong>${escapeHtml(s.added_by)}</strong></div>
          ${canRemove ? `<button class="song-remove" data-rm="${s.id}">Удалить песню</button>` : ''}
          <div class="comments">${comments}</div>
          <div class="add-comment">
            <input type="text" placeholder="Коммент от ${escapeHtml(myName)}..." data-cmt-sid="${s.id}" maxlength="500">
            <button data-cmt-send="${s.id}">Отправить</button>
          </div>
        </div>
      </div>`;
    }).join('');
    wireSongs();
  }
  function wireSongs() {
    document.querySelectorAll('.thumb[data-yt]').forEach(t => {
      const yt = t.dataset.yt;
      if (!yt) return;
      t.addEventListener('click', () => openPlayer(yt));
    });
    document.querySelectorAll('button[data-rm]').forEach(b => {
      b.addEventListener('click', () => removeSong(parseInt(b.dataset.rm, 10)));
    });
    document.querySelectorAll('button[data-cmt-send]').forEach(b => {
      b.addEventListener('click', () => {
        const sid = parseInt(b.dataset.cmtSend, 10);
        const input = document.querySelector(`input[data-cmt-sid="${sid}"]`);
        sendComment(sid, input);
      });
    });
    document.querySelectorAll('input[data-cmt-sid]').forEach(i => {
      i.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const sid = parseInt(i.dataset.cmtSid, 10);
          sendComment(sid, i);
        }
      });
    });
  }

  /* ===== Add comment ===== */
  function sendComment(songId, inputEl) {
    const txt = inputEl.value.trim();
    if (!txt) return;
    inputEl.value = '';
    qPush({ kind: '/api/lovers/comment', payload: { song_id: songId, by: myName, comment: txt } });
    showToast('Коммент отправляю…');
    qDrain().then(() => loadSongs());
  }

  /* ===== Remove song (Юля only) ===== */
  function removeSong(songId) {
    if (myName !== 'Юля') return;
    if (!confirm('Точно удалить эту песню из общего LOVERS?')) return;
    qPush({ kind: '/api/lovers/remove', payload: { song_id: songId, by: myName } });
    qDrain().then(() => loadSongs());
  }

  /* ===== Add song ===== */
  const modal = document.getElementById('add-modal');
  document.getElementById('add-fab').addEventListener('click', () => {
    document.getElementById('add-artist').value = '';
    document.getElementById('add-title').value = '';
    document.getElementById('add-comment').value = '';
    document.getElementById('add-status').textContent = '';
    document.getElementById('add-status').classList.remove('error');
    modal.classList.add('open');
    setTimeout(() => document.getElementById('add-artist').focus(), 200);
  });
  document.getElementById('add-cancel').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('add-submit').addEventListener('click', async () => {
    const artist = document.getElementById('add-artist').value.trim();
    const title = document.getElementById('add-title').value.trim();
    const comment = document.getElementById('add-comment').value.trim();
    if (!artist || !title) { document.getElementById('add-status').textContent = 'Заполни артиста и название'; document.getElementById('add-status').classList.add('error'); return; }
    const btn = document.getElementById('add-submit');
    btn.disabled = true;
    document.getElementById('add-status').textContent = 'Ищу видео на YouTube…';
    document.getElementById('add-status').classList.remove('error');
    try {
      const r = await fetchWithRetry(`${API}/api/lovers/add`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ artist, title, by: myName })
      }, 2, 25000);
      const d = await r.json();
      if (!r.ok && r.status !== 409) {
        document.getElementById('add-status').textContent = d.error || 'Не удалось добавить';
        document.getElementById('add-status').classList.add('error');
        btn.disabled = false;
        return;
      }
      // If 409 → already exists. We still add the comment if any.
      if (r.status === 409) {
        document.getElementById('add-status').textContent = 'Эта песня уже в подборке.';
        document.getElementById('add-status').classList.add('error');
      }
      // Add the comment if provided
      if (comment && d.song_id) {
        qPush({ kind: '/api/lovers/comment', payload: { song_id: d.song_id, by: myName, comment } });
        qDrain();
      }
      modal.classList.remove('open');
      showToast(r.status === 409 ? 'Уже было — открыл' : 'Добавлено');
      btn.disabled = false;
      loadSongs();
    } catch (e) {
      document.getElementById('add-status').textContent = 'Нет связи. Попробую позже.';
      document.getElementById('add-status').classList.add('error');
      btn.disabled = false;
      // Still queue the add so it goes when network returns
      qPush({ kind: '/api/lovers/add', payload: { artist, title, by: myName, _local_comment: comment } });
    }
  });

  /* ===== Player ===== */
  const player = document.getElementById('player');
  function openPlayer(ytId) {
    if (!ytId) return;
    document.getElementById('player-inner').innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    player.classList.add('open');
  }
  function closePlayer() {
    player.classList.remove('open');
    document.getElementById('player-inner').innerHTML = '';
  }
  document.getElementById('player-close').addEventListener('click', closePlayer);
  player.addEventListener('click', e => { if (e.target === player) closePlayer(); });

  /* ===== Lifecycle ===== */
  window.addEventListener('online', () => qDrain().then(loadSongs));
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { qDrain().then(loadSongs); }
  });
  // Periodic refresh
  setInterval(() => { qDrain(); loadSongs(); }, 30000);

  /* ===== Boot ===== */
  if (!myName) showOnboarding();
  else { hideOnboarding(); qDrain().then(loadSongs); }
})();
</script>
</body>
</html>
