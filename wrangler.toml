name = "akoev-site"
compatibility_date = "2026-05-01"
account_id = "1a8fda11ea2b5f1ed7a7e2e072a273ca"
main = "_worker.js"

routes = [
  { pattern = "akoev.com", custom_domain = true },
  { pattern = "www.akoev.com", custom_domain = true }
]

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the Worker on EVERY request (including HTML hits), not just on asset
# misses. Without this Cloudflare edge serves cached index.html directly,
# bypassing _worker.js — which means our no-store headers + guest-lock
# redirect never fire and stale HTML can stick on phones for hours.
run_worker_first = true
